---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-python
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: compile
spec:
  description: >
    Python compile -- install dependencies into a copyable ./vendor
    virtualenv and validate syntax (py_compile). Python is interpreted, so
    "the artifact" is the populated virtualenv itself, which the Dockerfile
    COPYs in rather than re-running the install (see verify-artifacts).
  params:
    - name: build-tool
      default: "pip"
    - name: build-version
      default: "3.12"
    - name: build-file
      default: "requirements.txt"
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
  workspaces:
    - name: source
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-username/{name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic, identical script for every Python app -- writes PIP_EXTRA_INDEX_URL
    # exports (pip's own documented convention for a private package index)
    # to a file the compile step sources. No-op when extra-creds-manifest is
    # "[]" (every app that hasn't configured an extra credential).
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            urls = []
            for cred in manifest:
                name, host = cred["name"], cred["matchId"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                urls.append(f"https://{user}:{token}@{host}/simple/")
            env_file = home / ".pip-extra-creds.env"
            env_file.write_text(f"export PIP_EXTRA_INDEX_URL='{' '.join(urls)}'\n")
            print(f"Wrote {len(manifest)} pip private-index credential(s) to {env_file}")

        # Generic, identical for every language: export this app's declared
        # external-service credentials (DB/Redis/Kafka/curl-scp-wget targets
        # etc.) as a sourceable env file the compile step reads before
        # invoking the build tool. No-op when the workspace isn't bound or no
        # external-service credentials declared.
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time instead of embedding the value as
        # literal text into the generated export line -- the value never
        # passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-character content
        # (quotes, $(...), newlines) can never break or inject into the line.
        svc_lines: list[str] = []
        # NOTE: each $(workspaces.<name>.path) must appear literally here --
        # Tekton substitutes these as plain text before the script runs, so
        # it cannot resolve one built from a Python loop variable.
        for svc_dir in (pathlib.Path("$(workspaces.extra-service-creds.path)"),
                        pathlib.Path("$(workspaces.extra-generic-build-creds.path)")):
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:python-$(params.build-version)-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty -- point it at
        # the source workspace for pip's own cache/config discovery.
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo """ Python compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        mkdir -p "$HOME"
        [ -f "$HOME/.pip-extra-creds.env" ] && . "$HOME/.pip-extra-creds.env"
        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Always upgrade pip first -- avoids version notice noise and ensures
        # consistent behaviour across base images that ship older pip versions
        pip install --upgrade pip --quiet --user --break-system-packages 2>/dev/null || true

        # Final, copyable artifact: a real virtualenv at ./vendor, populated
        # by whichever tool the app uses. The Dockerfile COPYs this directory
        # in and puts its bin/ on PATH -- console-script entry points
        # (uvicorn, gunicorn, flask, etc.) keep working, unlike a bare
        # PYTHONPATH-only package dump.
        python -m venv ./vendor
        . ./vendor/bin/activate

        if [ -f "$BUILD_FILE" ] && [ "$BUILD_TOOL" = "pip" ]; then
          pip install -r "$BUILD_FILE" --quiet
        elif [ "$BUILD_TOOL" = "poetry" ]; then
          pip install poetry --quiet
          poetry install --no-interaction --quiet
        elif [ "$BUILD_TOOL" = "pdm" ]; then
          pip install pdm --quiet
          pdm install --no-self 2>/dev/null || pdm install
        elif [ "$BUILD_TOOL" = "pipenv" ]; then
          pip install pipenv --quiet
          PIPENV_VENV_IN_PROJECT=0 pipenv install --deploy --quiet
        elif [ "$BUILD_TOOL" = "uv" ]; then
          pip install uv --quiet
          uv pip install -r "${BUILD_FILE:-requirements.txt}"
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt --quiet --no-warn-script-location
        fi
        deactivate

        # Syntax validation -- catches import errors and syntax mistakes early.
        # PYTHONPYCACHEPREFIX redirects bytecode writes to /tmp so py_compile
        # never tries to create __pycache__ dirs in the (possibly read-only) source tree.
        echo """ Syntax check """
        mkdir -p /tmp/pycache
        find . -name "*.py" \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          -not -path "./vendor/*" \
          -not -path "./.compile-home/*" \
          -not -path "*/__pycache__/*" \
          -not -path "*/__pycache__" \
          | PYTHONPYCACHEPREFIX=/tmp/pycache xargs python -m py_compile 2>&1 \
          && echo "All .py files syntax-valid"

        echo """ Python compile complete -- vendor/ ready for Dockerfile COPY """

# Source: platform/tekton/tasks/build/compile-task.yaml
---
# "" Language Compile Task """"""""""""""""""""""""""""""""""
# Compiles application source into artifacts (JAR/WAR/dist) before tests.
# Results are written to the shared `source` workspace so unit-tests and
# Kaniko (build-image-local) can consume them without recompiling.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-lang-compile
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: compile
spec:
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
  steps:
    - name: compile
      # Fixed image (not $(params.build-version)): that param holds language
      # runtime versions (e.g. python 3.12, go 1.22, dotnet 10.0) which don't
      # correspond to eclipse-temurin tags. Non-maven/gradle build tools skip
      # this step's actual work (see case below), so any JDK image suffices.
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-21
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"

        echo "-- Compile stage --  build-tool=$BUILD_TOOL"

        case "$BUILD_TOOL" in
          maven)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            echo """ Maven: compiling (skip tests) """
            mvn package -DskipTests -B $EXTRA
            echo ""
            echo """ Artifacts produced: """
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          gradle)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            echo """ Gradle: assembling (skip tests) """
            ./gradlew assemble $EXTRA
            echo ""
            echo """ Artifacts produced: """
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          npm)
            if command -v npm >/dev/null 2>&1; then
              echo """ npm: installing and building """
              npm install --silent && npm run build --if-present
            else
              echo """ npm compile: skipped (npm not in this image -- handled by multi-stage Dockerfile) """
            fi
            ;;
          pip|python)
            echo """ Python: no compile step -- source copied directly into image """
            ;;
          go)
            if command -v go >/dev/null 2>&1; then
              echo """ Go: building """
              go build ./...
            else
              echo """ Go compile: skipped (use multi-stage Dockerfile with RUN go build) """
            fi
            ;;
          dotnet)
            if command -v dotnet >/dev/null 2>&1; then
              echo """ .NET: publishing """
              dotnet publish -c Release -o ./publish --nologo -q
            else
              echo """ dotnet compile: skipped (dotnet not in this image -- handled by multi-stage Dockerfile) """
            fi
            ;;
          none|skip|"")
            echo """ Compile step skipped (build-tool=none) """
            ;;
          *)
            echo """ Unknown build-tool=$BUILD_TOOL -- skipping compile """
            ;;
        esac

        echo ""
        echo """ Compile stage complete """

# Source: platform/tekton/tasks/build/hadolint-task.yaml
---
# Hadolint -- Dockerfile lint -- own pod, onError:continue in the pipeline.
# Runs in parallel with the Kaniko build after pre-build passes so findings
# land in scan-results without adding to the critical path.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-hadolint
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: build
spec:
  params:
    - name: dockerfile-path
      default: "./Dockerfile"
  workspaces:
    - name: source
    - name: results
  steps:
    - name: hadolint
      image: k8secops/k8secops:hadolint-v2.12.0-debian
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/dockerfile-lint
        DF_REL=$(echo "$(params.dockerfile-path)" | sed 's|^\./||')
        DF="$(workspaces.source.path)/$DF_REL"
        OUT="$(workspaces.results.path)/dockerfile-lint/hadolint.json"
        echo "Hadolint: $DF"
        hadolint "$DF" -f json > "$OUT" 2>/dev/null || true
        COUNT=$(grep -o '"code"' "$OUT" 2>/dev/null | wc -l | tr -d ' ')
        echo "Findings: ${COUNT:-0}  ->  dockerfile-lint/hadolint.json"


# Source: platform/tekton/tasks/build/malware-scan.yaml
---
# "" ClamAV malware scan """"""""""""""""""""""""""""""""""""
# Scans the locally built image tar for malware before push.
# Step 1: freshclam updates virus definitions into the results
#         workspace so they persist across the two steps.
#         Runs as root -- freshclam needs write access to the DB dir.
# Step 2: clamscan reads from that same DB dir and scans the tar.
#         Runs as the clamav user (non-root).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-clamav
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: image-scan
spec:
  description: "ClamAV malware scan on built image tar. GPL v2. No token."
  params:
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
  results:
    - name: INFECTED_COUNT
  steps:
    - name: update-signatures
      image: k8secops/k8secops:clamav-stable
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        DB="$(workspaces.results.path)/malware/db"
        mkdir -p "$DB"
        echo "Updating ClamAV virus definitions..."
        # Try live update; fall back to bundled definitions on network failure
        if freshclam --datadir="$DB" --quiet 2>/dev/null; then
          echo "Virus definitions updated"
        else
          echo "Network update failed -- copying bundled definitions"
          cp -r /var/lib/clamav/. "$DB/" 2>/dev/null || true
        fi

    - name: scan
      image: k8secops/k8secops:clamav-stable
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      script: |
        #!/bin/sh
        DB="$(workspaces.results.path)/malware/db"
        TAR="$(workspaces.image-tar.path)/image.tar"
        OUT="$(workspaces.results.path)/malware/clamav.txt"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")

        echo "-- ClamAV malware scan --"
        echo "  Image : $(params.image-ref)"
        echo "  Tar   : $TAR ($TAR_SIZE)"
        echo ""

        clamscan \
          --database="$DB" \
          --recursive \
          --infected \
          --no-summary \
          "$TAR" > "$OUT" 2>&1 || true

        INFECTED=$(grep -c "FOUND" "$OUT" 2>/dev/null || echo "0")
        printf '%s' "$INFECTED" > "$(results.INFECTED_COUNT.path)"
        echo "ClamAV: $INFECTED infected file(s) found"
        SIZE=$(du -sh "$OUT" 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: malware/clamav.txt  ($SIZE, $INFECTED infected)"
        if [ "$INFECTED" -gt "0" ]; then
          echo ""
          echo "INFECTED FILES:"
          grep "FOUND" "$OUT" || true
        fi

# Source: platform/tekton/tasks/build/notify-build-status-task.yaml
---
# "" Notify Build Status (finally task, isolated build namespace) """
# Opt-in, see values.yaml imageBuildIsolation. Lives in gitops-image-builds.
# Mirrors gitops-notify-status's shape but posts to the isolated build's
# own callback endpoint (api/pipelines_build.py).
#
# IMPORTANT: params here are pipeline-level only ($(tasks.status), always
# resolvable) -- never a specific task's $(tasks.<name>.results.*). If any
# upstream task in the chain fails, build-image-candidate (and clamav-scan)
# never run, and Tekton silently SKIPS a finally task that references an
# unresolvable result instead of running it with an empty value -- which
# would mean the operator never learns the build failed. The candidate
# image ref/digest are reported separately, inline, by build-image-
# candidate itself the moment it succeeds (see gitops-build-image-candidate's
# notify-built step) -- decoupled from this pipeline-completion signal.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-notify-build-status
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: notify
spec:
  params:
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-status
      type: string
      default: "Unknown"
  steps:
    - name: notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, os

        token = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({
            "status": "$(params.pipeline-status)",
        }).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/build-status",
                data=payload,
                headers=headers,
                method="POST")
            urllib.request.urlopen(req, timeout=10)
        except Exception as e:
            print(f"Build-status notify failed: {e}")

# Source: platform/tekton/tasks/build/pre-build-task.yaml
---
# "" Build image locally -- NO push """""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-pre-build
  namespace: gitops-image-builds
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Verifies compiled artifacts exist and validates Dockerfile COPY sources
    before Kaniko runs. Runs in its own pod so a failure here is isolated --
    it does not cancel hadolint and gives a fast, clear error before spending
    time on the build.
  params:
    - name: build-tool
      default: "maven"
    - name: language
      default: "java"
    - name: dockerfile-path
      default: "./Dockerfile"
    - name: build-context
      default: "."
  workspaces:
    - name: source
  steps:
    - name: verify-artifacts
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # Hard-requires a pre-built, copyable artifact for every language --
        # the compile Task already produces it (see compile-*-task.yaml), and
        # the Dockerfile must COPY it, never re-run the build tool inside
        # Kaniko. This is a deliberate, fleet-wide breaking change: apps with
        # a Dockerfile that re-installs/rebuilds inside Kaniko will fail here
        # until restructured to COPY the artifact instead. Required so that
        # build-time credentials (private Maven/npm/NuGet/Go-module/PyPI
        # repos, see the extra-credentials feature) reach the install step --
        # they're only available here, in the compile Task, never inside
        # Kaniko's separately-privileged build.
        import pathlib, sys

        build_tool    = "$(params.build-tool)"
        language      = "$(params.language)"
        source_dir    = pathlib.Path("$(workspaces.source.path)")
        build_context = "$(params.build-context)"
        # Artifacts (vendor/, node_modules/, bin/, publish-output/) are created
        # by the compile Task's workingDir, which is source/<build-context> --
        # look for them there, not at the workspace root, or subdirectory
        # buildContexts (e.g. a monorepo app in "operator/") always fail here
        # even though compile succeeded.
        context_dir = source_dir if build_context in (".", "./", "") \
                      else source_dir / build_context.strip("./")

        def require(path: pathlib.Path, what: str, fix: str):
            missing = not path.exists() or (path.is_dir() and not any(path.iterdir()))
            if missing:
                print(f"ERROR: {what} not found at {path.relative_to(source_dir)} -- "
                      f"compile stage may have failed, or the Dockerfile re-runs the "
                      f"build tool instead of copying the compile stage's output.")
                print(f"  FIX: {fix}")
                sys.exit(1)
            print(f"-- {what} ready for Kaniko: {path.relative_to(source_dir)} --")

        if build_tool in ("maven", "gradle"):
            jars = [p for p in source_dir.rglob("*.jar")
                    if ".m2" not in str(p) and "test-classes" not in str(p)
                    and "original-" not in p.name]
            if not jars:
                print("ERROR: No JAR found -- compile stage may have failed.")
                sys.exit(1)
            print("-- Build artifacts ready for Kaniko: --")
            for j in sorted(jars):
                print(f"  {j.stat().st_size // 1024} KB  {j.relative_to(source_dir)}")
        elif build_tool in ("npm", "yarn", "pnpm"):
            require(context_dir / "node_modules", "node_modules/",
                     "Dockerfile should COPY node_modules instead of running npm/yarn/pnpm install.")
            if language in ("react", "nextjs"):
                found = [d for d in ("dist", "build", ".next") if (context_dir / d).exists()]
                if not found:
                    print("ERROR: No dist/, build/, or .next/ directory found -- "
                          "the compile stage's 'npm run build' may have failed.")
                    sys.exit(1)
                print(f"-- Build output ready: {', '.join(found)} --")
        elif build_tool == "go":
            require(context_dir / "bin", "Compiled Go binary (bin/)",
                    "Dockerfile should COPY the bin/ directory instead of running 'go build'.")
        elif build_tool == "dotnet":
            require(context_dir / "publish-output", "dotnet publish output (publish-output/)",
                    "Dockerfile should COPY publish-output/ instead of running 'dotnet publish'.")
        elif build_tool == "pip":
            require(context_dir / "vendor", "Python virtualenv (vendor/)",
                    "Dockerfile should COPY vendor/ instead of running pip/poetry/pdm/pipenv/uv install.")
        else:
            print(f"-- build-tool={build_tool}: artifacts managed by Dockerfile --")

    - name: validate-dockerfile
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import re, pathlib, sys

        source_dir = pathlib.Path("$(workspaces.source.path)")
        df_rel     = "$(params.dockerfile-path)".lstrip("./")
        df_path    = source_dir / df_rel if df_rel else source_dir / "Dockerfile"

        # Single-stage, COPY-only by design (no RUN install/build) -- the
        # compile Task already produced the final artifact (vendor/, bin/,
        # publish-output/, node_modules+dist) in the source workspace; these
        # generated Dockerfiles just package it. This is what lets build-time
        # credentials (private Maven/npm/NuGet/Go-module/PyPI repos) actually
        # reach the install step, and matches what verify-artifacts now
        # hard-requires for every language.
        DEFAULT_DOCKERFILES = {
            "python": "FROM python:3.12-slim\nWORKDIR /app\nCOPY . .\n"
                      "ENV PATH=\"/app/vendor/bin:$PATH\"\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "nodejs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            # `serve` is a tooling install (static file server), not an
            # application dependency -- always from the public npm registry,
            # never needs the app's private-repo credentials, so installing
            # it here doesn't reintroduce the problem this change fixes.
            "react":  "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN npm install -g serve 2>/dev/null || true\n"
                      "CMD [\"serve\", \"-s\", \"build\", \"-l\", \"3000\"]\n",
            "nextjs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "CMD [\"npm\", \"start\"]\n",
            "go":     "FROM alpine:3.20\nWORKDIR /app\nCOPY bin/ ./bin/\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "dotnet": "FROM mcr.microsoft.com/dotnet/aspnet:9.0\nWORKDIR /app\n"
                      "COPY publish-output/. .\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
        }

        if not df_path.exists():
            default = DEFAULT_DOCKERFILES.get("$(params.language)")
            if default:
                print(f"No Dockerfile at {df_path} -- generating default for $(params.language)")
                df_path.write_text(default)
            else:
                print(f"ERROR: Dockerfile not found at {df_path}")
                sys.exit(1)

        lines = df_path.read_text().splitlines()
        from_count = sum(1 for l in lines if re.match(r'^\s*FROM\s+', l, re.I))
        if from_count > 1:
            # Multi-stage Dockerfiles still pass through verify-artifacts (the
            # PREVIOUS step) like every other language now -- that step
            # already hard-failed if the compile-stage artifact is missing,
            # regardless of single- vs multi-stage. This branch only skips
            # the host-filesystem COPY-source check below, which doesn't
            # apply to `COPY --from=<stage>` instructions. Build artifacts
            # are deliberately NOT excluded from the Docker context here
            # (unlike the old re-install-inside-Kaniko pattern) -- a
            # multi-stage Dockerfile may legitimately need to COPY them in.
            print(f"  Multi-stage build ({from_count} FROM stages) -- "
                  f"skipping host COPY-source check (handled by verify-artifacts already).")
            sys.exit(0)

        print("  Single-stage build -- checking COPY sources:")
        missing, found = [], []
        for line in lines:
            line = line.strip()
            if re.match(r'^COPY\s+--from=', line, re.I):
                continue
            m = re.match(r'^COPY\s+(.+)$', line, re.I)
            if not m:
                continue
            parts = m.group(1).split()
            for src in parts[:-1]:
                if src.startswith('--'):
                    continue
                src_clean = src.lstrip('./')
                if '*' in src_clean or '?' in src_clean:
                    matches = list(source_dir.glob(src_clean))
                    (found if matches else missing).append(
                        f"  {'OK' if matches else 'MISSING'} {src}")
                else:
                    full = source_dir / src_clean
                    if full.exists():
                        found.append(f"  OK {src}  ({full.stat().st_size // 1024} KB)")
                    else:
                        candidates = list(source_dir.rglob(f"*{pathlib.Path(src_clean).name}*"))
                        hint = f"  -> did you mean: {candidates[0].relative_to(source_dir)} ?" if candidates else ""
                        missing.append(f"  MISSING {src}{hint}")

        for f in found: print(f)
        if missing:
            print("\nERROR: Dockerfile COPY sources missing:")
            for m in missing: print(m)
            sys.exit(1)
        print(f"\nAll {len(found)} COPY source(s) verified OK")

