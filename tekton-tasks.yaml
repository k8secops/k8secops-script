apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-go
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Go compile â€” go build ./... Validates compilation before image build."
  params:
    - name: build-tool
      default: "go"
    - name: build-version
      default: "1.22"
    - name: build-file
      default: "go.mod"
  workspaces:
    - name: source
  steps:
    - name: compile
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        # uid 1000 has no /etc/passwd entry. The golang image sets GOPATH=/go
        # which is root-owned â€” go mod download fails writing to /go/pkg/mod.
        # Override GOPATH and GOCACHE to the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GOPATH
          value: "$(workspaces.source.path)/.gopath"
        - name: GOCACHE
          value: "$(workspaces.source.path)/.gopath/cache"
        - name: GOMODCACHE
          value: "$(workspaces.source.path)/.gopath/pkg/mod"
      script: |
        #!/bin/sh
        set -e
        echo "â”€â”€ Go compile: version=$(params.build-version) â”€â”€"

        mkdir -p "$GOPATH/pkg/mod" "$GOCACHE"

        go mod download
        go build ./...
        echo "â”€â”€ Go compile complete â”€â”€"

