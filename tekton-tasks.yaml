# "" OWASP Dependency-Check """""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sca-owasp
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sca
spec:
  description: "OWASP Dependency-Check. Apache 2.0. No token."
  params:
    - name: language
      type: string
  workspaces:
    - name: source
    - name: results
    - name: vulndb-cache
  results:
    - name: VULN_COUNT
  steps:
    - name: dep-check
      image: k8secops/k8secops:owasp-dependency-check-10.0.4
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "300m", memory: "1Gi"}
        limits:   {cpu: "1000m", memory: "3Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sca
        DB_DIR=$(workspaces.vulndb-cache.path)/owasp
        DB_FILE=$DB_DIR/odc.mv.db
        STATUS_FILE=$(workspaces.results.path)/sca/owasp-status.json
        RESULTS_DIR=$(workspaces.results.path)/sca

        # DB is populated (best-effort) by the gitops-vulndb-seed task earlier
        # in this same pipeline, from the persistent cache server in
        # gitops-tooling (see values.yaml vulnDbCacheServer). If that server
        # hasn't refreshed yet or was unreachable, DB_FILE just won't exist --
        # skip cleanly rather than trying to update it here (this per-run PVC
        # is deleted with the namespace at run end, so any update here would
        # be wasted work anyway).
        if [ ! -f $DB_FILE ]; then
          echo 'OWASP SKIP: NVD database not available in this run (cache server not yet warm or unreachable)'
          echo eyJzdGF0dXMiOiJza2lwcGVkIiwicmVhc29uIjoiZGJfbm90X2ZvdW5kIn0= | base64 -d > $STATUS_FILE
          echo -n 0 > $(results.VULN_COUNT.path)
          exit 0
        fi
        
        DB_SIZE=$(du -sh $DB_FILE 2>/dev/null | cut -f1 || echo unknown)
        echo OWASP: NVD database ready $DB_SIZE - running scan with --noupdate
        echo eyJzdGF0dXMiOiJydW5uaW5nIn0= | base64 -d > $STATUS_FILE
        
        timeout 600 \
          /usr/share/dependency-check/bin/dependency-check.sh \
            --scan . \
            --format JSON \
            --format SARIF \
            --out $RESULTS_DIR \
            --project $(params.language)-scan \
            --data $DB_DIR \
            --noupdate \
          2>&1 | tail -20
        
        REPORT=$RESULTS_DIR/dependency-check-report.json
        
        echo  | base64 -d > /tmp/_odc.py
        python3 /tmp/_odc.py $REPORT $STATUS_FILE 2>/dev/null || true
        COUNT=$(cat /tmp/_odc_cnt 2>/dev/null || echo 0)
        echo -n $COUNT > $(results.VULN_COUNT.path)
        exit 0

