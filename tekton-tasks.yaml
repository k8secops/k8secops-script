        set -e
        BUILD_TOOL="$(params.build-tool)"
        echo """ Node.js compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file). Node.js
        # natively reads NODE_EXTRA_CA_CERTS -- no file copy needed.
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          export NODE_EXTRA_CA_CERTS="$CUSTOM_CA_CERT_FILE"
          echo "Trusting custom CA for private npm registry: $CUSTOM_CA_CERT_FILE"
        fi

        mkdir -p "$HOME"

        # Use npm-cache PVC when bound, otherwise fall back to source workspace
        if [ "$(workspaces.npm-cache.bound)" = "true" ]; then
          export npm_config_cache="$(workspaces.npm-cache.path)/.npm"
        else
          export npm_config_cache="$HOME/.npm"
        fi
        mkdir -p "$npm_config_cache"

        # Each build tool's actual logic lives in its own small, focused
        # script under scripts/nodejs/ -- open exactly the one you need to
        # change, nothing else.
        case "$BUILD_TOOL" in
          yarn)
            # corepack enable makes `yarn` respect a project's pinned
            # packageManager version (Yarn Berry / 2+) instead of silently
            # falling back to the classic Yarn 1.x bundled in the base
            # image -- same reason pnpm needs it below.
            corepack enable
            yarn install --frozen-lockfile --silent
            yarn build 2>/dev/null || true
            ;;
          pnpm)
            corepack enable && pnpm install --frozen-lockfile --silent
            pnpm run build --if-present 2>/dev/null || true
            ;;
          *)
            npm install --silent
            npm run build --if-present
            ;;
        esac
        echo """ Node.js compile complete """

