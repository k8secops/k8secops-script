﻿---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-secrets-scan
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: secrets
spec:
  description: >
    Gitleaks (pattern-based) + TruffleHog (entropy + credential verification).
    Individual tools can be disabled via run-gitleaks / run-trufflehog params.
    At least one tool should be enabled. Findings are written to scan-results
    and passed to AI analysis. The task never hard-fails on detections.
  params:
    - name: run-gitleaks
      type: string
      default: "true"
      description: "Set to 'false' to skip Gitleaks"
    - name: run-trufflehog
      type: string
      default: "true"
      description: "Set to 'false' to skip TruffleHog"
  workspaces:
    - name: source
    - name: results
  results:
    - name: LEAK_COUNT
      type: string
    - name: VERIFIED_COUNT
      type: string
  steps:
    # â”€â”€ Gitleaks â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Pattern-based scanning â€” catches secrets by regex across entire history.
    # --exit-code 0: findings surface in AI report, not a hard pipeline failure.
    - name: gitleaks
      image: k8secops/k8secops:gitleaks-v8.18.4
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.results.path)/secrets

        if [ "$(params.run-gitleaks)" != "true" ]; then
          echo "Gitleaks: disabled for this app â€” skipping"
          echo -n "0" > $(results.LEAK_COUNT.path)
          exit 0
        fi

        gitleaks detect \
          --source . \
          --report-format sarif \
          --report-path $(workspaces.results.path)/secrets/gitleaks.sarif \
          --exit-code 0 \
          --no-git 2>/dev/null || true

        COUNT=$(python3 -c "
        import json
        try:
            d = json.load(open('$(workspaces.results.path)/secrets/gitleaks.sarif'))
            print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
        except: print(0)
        " 2>/dev/null || echo "0")

        echo -n "$COUNT" > $(results.LEAK_COUNT.path)
        echo "Gitleaks: $COUNT potential secret(s) found"
        if [ "$COUNT" -gt "0" ]; then
          echo "WARNING: detected patterns â€” review AI report at human gate"
        fi

    # â”€â”€ TruffleHog â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Entropy analysis + live credential verification. Only verified=true
    # findings (proven real credentials) are counted in VERIFIED_COUNT.
    - name: trufflehog
      image: k8secops/k8secops:trufflehog-3.95.5
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 65532 has no /etc/passwd entry â€” set HOME so git works internally
        - name: HOME
          value: "$(workspaces.results.path)"
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.results.path)/secrets

        if [ "$(params.run-trufflehog)" != "true" ]; then
          echo "TruffleHog: disabled for this app â€” skipping"
          echo -n "0" > $(results.VERIFIED_COUNT.path)
          exit 0
        fi

        printf '%s\n' '\.lock$' 'node_modules/' 'vendor/' '\.git/' \
          > $(workspaces.results.path)/secrets/trufflehog-exclude.txt

        trufflehog filesystem . \
          --json \
          --no-update \
          --exclude-paths=$(workspaces.results.path)/secrets/trufflehog-exclude.txt \
          > $(workspaces.results.path)/secrets/trufflehog.json 2>/dev/null || true

        VERIFIED=$(python3 -c "
        import json
        count = 0
        try:
            for line in open('$(workspaces.results.path)/secrets/trufflehog.json'):
                try:
                    if json.loads(line).get('Verified', False):
                        count += 1
                except: pass
        except: pass
        print(count)
        " 2>/dev/null || echo "0")

        echo -n "$VERIFIED" > $(results.VERIFIED_COUNT.path)
        echo "TruffleHog: $VERIFIED verified (live) secret(s)"
        if [ "$VERIFIED" -gt "0" ]; then
          echo "CRITICAL: $VERIFIED verified credential(s) found â€” rotate immediately"
        fi

