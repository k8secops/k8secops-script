apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-python
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Python compile â€” install dependencies and validate syntax (py_compile). Python is interpreted so no binary artifact is produced."
