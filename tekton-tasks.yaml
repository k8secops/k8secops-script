# â”€â”€ Semgrep â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-semgrep
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "Semgrep SAST â€” OSS rules, all languages, no token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: scan
      image: k8secops/k8secops:semgrep-1.77.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "300m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sast
        # No SEMGREP_APP_TOKEN â€” uses free public rules
        semgrep \
          --config auto \
          --sarif \
          --output $(workspaces.results.path)/sast/semgrep.sarif \
          --no-git-ignore \
          --exclude ".git" --exclude "node_modules" --exclude "vendor" \
          . 2>/dev/null || true
        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sast/semgrep.sarif'))
            print(sum(len(r.get('results',[])) for r in d.get('runs',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Semgrep: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/semgrep.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/semgrep.sarif  ($SIZE, $COUNT findings)"

