# "" SonarQube (Community Edition, in-cluster, no token) """
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-sonarqube
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "SonarQube CE -- in-cluster, no external token required."
  params:
    - name: sonarqube-url
      default: "http://gitops-platform-sonarqube.gitops-tooling.svc.cluster.local:9000"
    - name: project-key
      type: string
    - name: language
      type: string
  workspaces:
    - name: source
    - name: results
  results:
    - name: QUALITY_GATE
  steps:
    - name: wait-sonarqube
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: SONAR_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: sonarqubeAdminPassword
      script: |
        #!/usr/bin/env python3
        import urllib.request, urllib.parse, time, sys, json, os, base64

        base_url   = "$(params.sonarqube-url)"
        admin_pass = os.environ.get("SONAR_ADMIN_PASSWORD", "admin")
        creds      = base64.b64encode(f"admin:{admin_pass}".encode()).decode()
        auth_hdr   = {"Authorization": f"Basic {creds}"}

        # Wait for SonarQube to be UP
        for i in range(40):
            try:
                d = json.loads(urllib.request.urlopen(f"{base_url}/api/system/status", timeout=5).read())
                if d.get("status") == "UP":
                    print("SonarQube ready"); break
            except Exception as e:
                print(f"Waiting {i+1}/40: {e}")
            time.sleep(10)
        else:
            print("SonarQube timeout -- proceeding without token")
            open("$(workspaces.results.path)/sonar-token", "w").write("")
            sys.exit(0)

        # Generate a short-lived analysis token for this pipeline run
        token_name = f"tekton-$(params.project-key)-{int(time.time())}"
        data = urllib.parse.urlencode({"name": token_name, "login": "admin"}).encode()
        try:
            req = urllib.request.Request(
                f"{base_url}/api/user_tokens/generate",
                data=data,
                headers={**auth_hdr, "Content-Type": "application/x-www-form-urlencoded"},
                method="POST",
            )
            resp = json.loads(urllib.request.urlopen(req, timeout=10).read())
            token = resp.get("token", "")
            open("$(workspaces.results.path)/sonar-token", "w").write(token)
            print(f"SonarQube analysis token created: {token_name}")
        except Exception as e:
            print(f"Token creation failed: {e} -- scan will be unauthenticated")
            open("$(workspaces.results.path)/sonar-token", "w").write("")

    - name: sonar-scan
      image: k8secops/k8secops:sonar-scanner-cli-5.0.1
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      script: |
        #!/bin/sh
        TOKEN=$(cat $(workspaces.results.path)/sonar-token 2>/dev/null || true)
        TOKEN_ARG=""
        if [ -n "$TOKEN" ]; then
          TOKEN_ARG="-Dsonar.token=$TOKEN"
        fi
        # -Dsonar.java.binaries=. allows Java analysis without pre-compiled classes;
        # the sensor falls back to source-only analysis instead of EXECUTION FAILURE.
        sonar-scanner \
          -Dsonar.projectKey=$(params.project-key) \
          -Dsonar.host.url=$(params.sonarqube-url) \
          -Dsonar.qualitygate.wait=false \
          -Dsonar.java.binaries=. \
          -Dsonar.coverage.exclusions="**/*test*/**,**/vendor/**" \
          $TOKEN_ARG \
          2>&1 | tee /tmp/sonar-output.txt || true
        # Record whether the scan submitted an analysis to SonarQube
        if grep -q "EXECUTION SUCCESS" /tmp/sonar-output.txt 2>/dev/null; then
          echo "submitted" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: analysis submitted"
          echo "Report: SonarQube server at $(params.sonarqube-url)/dashboard?id=$(params.project-key)"
        else
          echo "failed" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: scan did not submit an analysis (see output above)"
          echo "Report: none (scan failed to submit)"
        fi

    - name: get-quality-gate
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, urllib.request, urllib.error, time, sys, base64, os

        base_url   = "$(params.sonarqube-url)"
        status_file = "$(workspaces.results.path)/sonar-scan-status"
        result_path = "$(results.QUALITY_GATE.path)"

        scan_status = open(status_file).read().strip() if os.path.exists(status_file) else "unknown"
        if scan_status != "submitted":
            print(f"Scan did not submit an analysis -- skipping quality gate check")
            open(result_path, "w").write("UNKNOWN")
            sys.exit(0)

        token = open("$(workspaces.results.path)/sonar-token").read().strip()
        auth_hdr = ({"Authorization": "Basic " +
            base64.b64encode(f"{token}:".encode()).decode()} if token else {})

        url = f"{base_url}/api/qualitygates/project_status?projectKey=$(params.project-key)"
        for i in range(12):
            try:
                req = urllib.request.Request(url, headers=auth_hdr)
                d   = json.loads(urllib.request.urlopen(req, timeout=10).read())
                qg  = d.get("projectStatus", {}).get("status", "UNKNOWN")
                if qg in ("OK", "ERROR", "WARN"):
                    open(result_path, "w").write(qg)
                    icon = """ if qg == "OK" else "--"
                    print(f"Quality gate: {qg} {icon}")
                    sys.exit(0)
                print(f"Attempt {i+1}: status={qg}, waiting")
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors="replace")
                if e.code == 404:
                    print(f"Attempt {i+1}: analysis not yet indexed (404) -- retrying")
                else:
                    print(f"Attempt {i+1}: HTTP {e.code}: {body[:120]}")
            except Exception as e:
                print(f"Attempt {i+1}: {e}")
            time.sleep(10)
        print("Quality gate check timed out -- writing UNKNOWN")
        open(result_path, "w").write("UNKNOWN")

---
# "" SonarQube for .NET (dotnet-sonarscanner, in-cluster) ""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-sonarqube-dotnet
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "SonarQube CE for .NET via dotnet-sonarscanner -- in-cluster, no external token required."
  params:
    - name: sonarqube-url
      default: "http://gitops-platform-sonarqube.gitops-tooling.svc.cluster.local:9000"
    - name: project-key
      type: string
    - name: language
      type: string
    - name: build-version
      default: "8.0"
    - name: build-file
      default: "."
  workspaces:
    - name: source
    - name: results
  results:
    - name: QUALITY_GATE
  steps:
    - name: wait-sonarqube
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: SONAR_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: sonarqubeAdminPassword
      script: |
        #!/usr/bin/env python3
        import urllib.request, urllib.parse, time, sys, json, os, base64

        base_url   = "$(params.sonarqube-url)"
        admin_pass = os.environ.get("SONAR_ADMIN_PASSWORD", "admin")
        creds      = base64.b64encode(f"admin:{admin_pass}".encode()).decode()
        auth_hdr   = {"Authorization": f"Basic {creds}"}

        # Wait for SonarQube to be UP
        for i in range(40):
            try:
                d = json.loads(urllib.request.urlopen(f"{base_url}/api/system/status", timeout=5).read())
                if d.get("status") == "UP":
                    print("SonarQube ready"); break
            except Exception as e:
                print(f"Waiting {i+1}/40: {e}")
            time.sleep(10)
        else:
            print("SonarQube timeout -- proceeding without token")
            open("$(workspaces.results.path)/sonar-token", "w").write("")
            sys.exit(0)

        # Generate a short-lived analysis token for this pipeline run
        token_name = f"tekton-$(params.project-key)-{int(time.time())}"
        data = urllib.parse.urlencode({"name": token_name, "login": "admin"}).encode()
        try:
            req = urllib.request.Request(
                f"{base_url}/api/user_tokens/generate",
                data=data,
                headers={**auth_hdr, "Content-Type": "application/x-www-form-urlencoded"},
                method="POST",
            )
            resp = json.loads(urllib.request.urlopen(req, timeout=10).read())
            token = resp.get("token", "")
            open("$(workspaces.results.path)/sonar-token", "w").write(token)
            print(f"SonarQube analysis token created: {token_name}")
        except Exception as e:
            print(f"Token creation failed: {e} -- scan will be unauthenticated")
            open("$(workspaces.results.path)/sonar-token", "w").write("")

    - name: sonar-scan
      image: k8secops/k8secops:dotnet-sdk-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and dotnet
        # can't create ~/.dotnet, ~/.nuget, or its first-run dirs.
        - name: HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.results.path)/.dotnet-home/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "1"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        export PATH="$PATH:$HOME/.dotnet/tools"

        TOKEN=$(cat $(workspaces.results.path)/sonar-token 2>/dev/null || true)
        TOKEN_ARG=""
        if [ -n "$TOKEN" ]; then
          TOKEN_ARG="/d:sonar.token=$TOKEN"
        fi

        if dotnet tool install --global dotnet-sonarscanner \
            && dotnet sonarscanner begin /k:"$(params.project-key)" /d:sonar.host.url="$(params.sonarqube-url)" $TOKEN_ARG \
            && dotnet build "$(params.build-file)" -c Release \
            && dotnet sonarscanner end $TOKEN_ARG; then
          echo "submitted" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: analysis submitted"
          echo "Report: SonarQube server at $(params.sonarqube-url)/dashboard?id=$(params.project-key)"
        else
          echo "failed" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: scan did not submit an analysis (see output above)"
          echo "Report: none (scan failed to submit)"
        fi

    - name: get-quality-gate
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, urllib.request, urllib.error, time, sys, base64, os

        base_url   = "$(params.sonarqube-url)"
        status_file = "$(workspaces.results.path)/sonar-scan-status"
        result_path = "$(results.QUALITY_GATE.path)"

        scan_status = open(status_file).read().strip() if os.path.exists(status_file) else "unknown"
        if scan_status != "submitted":
            print(f"Scan did not submit an analysis -- skipping quality gate check")
            open(result_path, "w").write("UNKNOWN")
            sys.exit(0)

        token = open("$(workspaces.results.path)/sonar-token").read().strip()
        auth_hdr = ({"Authorization": "Basic " +
            base64.b64encode(f"{token}:".encode()).decode()} if token else {})

        url = f"{base_url}/api/qualitygates/project_status?projectKey=$(params.project-key)"
        for i in range(12):
            try:
                req = urllib.request.Request(url, headers=auth_hdr)
                d   = json.loads(urllib.request.urlopen(req, timeout=10).read())
                qg  = d.get("projectStatus", {}).get("status", "UNKNOWN")
                if qg in ("OK", "ERROR", "WARN"):
                    open(result_path, "w").write(qg)
                    icon = """ if qg == "OK" else "--"
                    print(f"Quality gate: {qg} {icon}")
                    sys.exit(0)
                print(f"Attempt {i+1}: status={qg}, waiting")
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors="replace")
                if e.code == 404:
                    print(f"Attempt {i+1}: analysis not yet indexed (404) -- retrying")
                else:
                    print(f"Attempt {i+1}: HTTP {e.code}: {body[:120]}")
            except Exception as e:
                print(f"Attempt {i+1}: {e}")
            time.sleep(10)
        print("Quality gate check timed out -- writing UNKNOWN")
        open(result_path, "w").write("UNKNOWN")

---
# "" Language-specific SAST dispatcher """""""""""""""""""""
# The operator replaces this task ref with the correct one per language:
#   java   ' gitops-sast-spotbugs
#   python ' gitops-sast-bandit
#   nodejs ' gitops-sast-eslint-security
#   go     ' gitops-sast-gosec
#   dotnet ' gitops-sast-roslyn
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-language
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/role: dispatcher
spec:
  description: "Language-specific SAST. Operator replaces taskRef per language."
  params:
    - name: language
      type: string
    - name: build-tool
      type: string
    - name: build-version
      type: string
    - name: build-file
      type: string
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: route
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # This step is replaced by operator with language-specific task
        # Fallback: just mark 0 findings
        open("$(results.FINDING_COUNT.path)","w").write("0")
        print("Language SAST: using fallback (operator should patch this)")

---
# "" Bandit (Python) """""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-bandit
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: python
spec:
  params:
    - name: build-version
      default: "3.12"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: bandit
      image: k8secops/k8secops:python-$(params.build-version)-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `pip install --user` has nowhere writable to land.
        - name: HOME
          value: "$(workspaces.results.path)/.bandit-home"
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        pip install --quiet --user bandit[sarif] --break-system-packages
        mkdir -p $(workspaces.results.path)/sast
        python3 -m bandit -r . -f sarif -o $(workspaces.results.path)/sast/bandit.sarif \
          -l MEDIUM -i MEDIUM \
          --exclude .git,node_modules,vendor --exit-zero 2>/dev/null || true
        python3 -m bandit -r . -f json -o $(workspaces.results.path)/sast/bandit.json \
          -l MEDIUM -i MEDIUM \
          --exclude .git,node_modules,vendor --exit-zero 2>/dev/null || true
        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sast/bandit.json'))
            print(len(d.get('results',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Bandit: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/bandit.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/bandit.sarif  ($SIZE, $COUNT findings)"

