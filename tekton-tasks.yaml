---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-build-image-local
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Builds container image using Kaniko with --no-push.
    Image is saved as a tar file in the image-tar workspace.
    Push happens ONLY after human approval in a separate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: language
      type: string
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
    - name: dockerfile-path
      default: "./Dockerfile"
    - name: context
      default: "./"
    - name: operator-api-url
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
    - name: pipeline-run-id
      default: ""
    - name: registry-mirror
      default: ""
      description: "Optional registry mirror URL for Kaniko base image pulls (e.g. kind-registry:5000). Leave empty to pull directly from Docker Hub."
  workspaces:
    - name: source
    - name: image-tar
    - name: kaniko-cache
    - name: registry-credentials
      description: "Docker config.json for authenticating base image pulls from Docker Hub"
  results:
    - name: IMAGE_TAR_PATH
    - name: IMAGE_FULL_REF
  steps:
    # Kaniko: build image from source and save as tar. No push.
    # Pre-build checks (verify-artifacts, validate-dockerfile) and
    # Dockerfile linting (hadolint) run in their own pods before this task.
    - name: build-local
      image: k8secops/k8secops:gitops-builder-1.0.0
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: false
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.registry-credentials.path)
      script: |
        #!/bin/sh
        set -e

        DF="$(params.dockerfile-path)"
        DF="${DF#./}"
        CTX="$(params.context)"
        CTX="${CTX#./}"

        echo "Building image: $(params.image-registry)/$(params.image-name):$(params.image-tag)"
        echo "Dockerfile:     $(workspaces.source.path)/$DF"
        echo "Context:        $(workspaces.source.path)/$CTX"

        MIRROR_FLAG=""
        if [ -n "$(params.registry-mirror)" ]; then
          MIRROR_FLAG="--registry-mirror=$(params.registry-mirror)"
          echo "Using registry mirror: $(params.registry-mirror)"
        fi

        # kaniko-cache workspace is an emptyDir (each pipeline run gets a
        # fresh, short-lived namespace -- see build_namespace_provisioner.py
        # -- so a local cache dir never survives past this one run). Layer
        # caching that actually persists across runs/branches of the same
        # app instead goes to a remote cache repo, stored via the same
        # registry credentials this task already uses to push the final
        # image (registry-credentials workspace / DOCKER_CONFIG below).
        CACHE_REPO="$(params.image-registry)/$(params.image-name)-cache"

        # Compile/precompile tasks materialize real credentials (private
        # registry tokens, external-service secrets, .netrc/.npmrc/NuGet
        # configs) into these per-language HOME directories under the same
        # workspace root Kaniko builds from. --ignore-path excludes them from
        # the image's filesystem snapshot regardless of what the Dockerfile's
        # COPY/ADD instructions do -- including the platform's own default
        # generated Dockerfiles (pre-build-task.yaml) AND any custom
        # Dockerfile an app supplies, both of which commonly do `COPY . .`.
        # .gopath/.nuget hold downloaded dependency caches, not credentials
        # directly, but never belong in a shipped image either.
        # shellcheck disable=SC2086
        /kaniko/executor \
          --dockerfile="$(workspaces.source.path)/$DF" \
          --context="dir://$(workspaces.source.path)/$CTX" \
          --destination="$(params.image-registry)/$(params.image-name):$(params.image-tag)" \
          --no-push \
          --tar-path="$(workspaces.image-tar.path)/image.tar" \
          --snapshot-mode=full \
          --cache=true \
          --cache-dir="$(workspaces.kaniko-cache.path)" \
          --cache-repo="$CACHE_REPO" \
          --cache-ttl=168h \
          --log-format=text \
          --verbosity=info \
          --ignore-path="$(workspaces.source.path)/.compile-home" \
          --ignore-path="$(workspaces.source.path)/.dotnet-home" \
          --ignore-path="$(workspaces.source.path)/.precompile-home" \
          --ignore-path="$(workspaces.source.path)/.gopath" \
          --ignore-path="$(workspaces.source.path)/.nuget" \
          $MIRROR_FLAG

        echo "Image saved: $(workspaces.image-tar.path)/image.tar"
    - name: record-ref
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import os, sys, urllib.request, json
        tar_path = "$(workspaces.image-tar.path)/image.tar"
        full_ref = "$(params.image-registry)/$(params.image-name):$(params.image-tag)"
        open("$(results.IMAGE_TAR_PATH.path)","w").write(tar_path)
        open("$(results.IMAGE_FULL_REF.path)","w").write(full_ref)
        if not os.path.exists(tar_path):
            print(f"ERROR: image tar not found at {tar_path}")
            sys.exit(1)
        size_mb = os.path.getsize(tar_path) // 1024 // 1024
        print(f"Built image: {full_ref}  ({size_mb} MB)")
        token   = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)",
                               "imageRef": full_ref, "sizeMb": size_mb}).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-built",
                data=payload, headers=headers, method="POST")
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image built {full_ref}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")


# Source: platform/tekton/tasks/build/compile-dotnet-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-dotnet
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  description: >
    .NET compile -- dotnet restore + build + publish.
    The SDK image version is determined by the HIGHER of (configured version) or
    (TargetFramework found in the .csproj), so a net8.0 project always gets the
    .NET 8 SDK even if the user configured 6.0. Fails fast with a clear message
    on version mismatch so developers know to update their app configuration.
  params:
    - name: build-tool
      default: "dotnet"
    - name: build-version
      default: "8.0"
    - name: build-file
      default: ""
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
  workspaces:
    - name: source
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-username/{name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic, identical script for every .NET app -- writes a
    # packageSourceCredentials block (NuGet's own documented convention) into
    # $HOME/.nuget/NuGet/NuGet.Config, keyed by the SAME source name the
    # customer's own committed NuGet.config/.csproj already declares under
    # matchId -- this step never invents a new package source, only supplies
    # credentials for one the customer's repo already references. No-op when
    # extra-creds-manifest is "[]" (every app that hasn't configured one).
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.dotnet-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            nuget_dir = home / ".nuget" / "NuGet"
            nuget_dir.mkdir(parents=True, exist_ok=True)
            blocks = []
            for cred in manifest:
                name = cred["name"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                blocks.append(
                    f"    <{cred['matchId']}>\n"
                    f"      <add key=\"Username\" value=\"{user}\" />\n"
                    f"      <add key=\"ClearTextPassword\" value=\"{token}\" />\n"
                    f"    </{cred['matchId']}>")
            (nuget_dir / "NuGet.Config").write_text(
                "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<configuration>\n"
                "  <packageSourceCredentials>\n" + "\n".join(blocks) +
                "\n  </packageSourceCredentials>\n</configuration>\n")
            print(f"Wrote {len(manifest)} NuGet source credential(s) to {nuget_dir}/NuGet.Config")

        # Generic, identical for every language: export this app's declared
        # external-service credentials (DB/Redis/Kafka/curl-scp-wget targets
        # etc.) as a sourceable env file the compile step reads before
        # invoking the build tool. No-op when the workspace isn't bound or no
        # external-service credentials declared.
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time instead of embedding the value as
        # literal text into the generated export line -- the value never
        # passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-character content
        # (quotes, $(...), newlines) can never break or inject into the line.
        svc_lines: list[str] = []
        # NOTE: each $(workspaces.<name>.path) must appear literally here --
        # Tekton substitutes these as plain text before the script runs, so
        # it cannot resolve one built from a Python loop variable.
        # An unbound optional workspace substitutes to an EMPTY STRING, not an
        # absent/error value -- pathlib.Path("") resolves to ".", the step's own
        # cwd, which always exists. Checking is_dir() alone therefore never skips
        # an unbound workspace; it silently iterates the step's cwd instead
        # (confirmed live: cwd was "/" for the materialize step, so this only
        # ever produced empty output rather than bogus creds -- but it's a latent
        # bug the moment cwd contains real files). Check the raw substitution for
        # emptiness first, before constructing a Path at all.
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    # "" Version detection """""""""""""""""""""""""""""""""""""""""""""""""""""
    # Read TargetFramework(s) from the csproj and write the required SDK major
    # version to a shared file. This runs in a minimal python image that is
    # available in all Kind clusters.
    - name: detect-version
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import os, re, glob, sys

        configured = "$(params.build-version)"
        build_file  = "$(params.build-file)".strip()

        # Find the .csproj to inspect
        if build_file:
            candidates = [build_file]
        else:
            candidates = glob.glob("**/*.csproj", recursive=True)
            candidates = [c for c in candidates if "test" not in c.lower()]

        if not candidates:
            print(f"No .csproj found -- using configured version {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        csproj = candidates[0]
        print(f"Inspecting: {csproj}")
        content = open(csproj).read()

        # Extract TargetFramework(s) -- handles net6.0, net8.0, netstandard2.0, etc.
        targets = re.findall(r"<TargetFrameworks?>\s*([^<]+)\s*</TargetFrameworks?>", content)
        if not targets:
            print(f"No TargetFramework found in {csproj} -- using {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        # Parse the highest .NET version required (ignore netstandard)
        versions = []
        for target_list in targets:
            for t in re.split(r'[;,\s]+', target_list.strip()):
                m = re.match(r'net(\d+)\.(\d+)$', t.strip())
                if m:
                    versions.append((int(m.group(1)), int(m.group(2)), t))

        if not versions:
            print(f"Only netstandard targets found -- using {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        # Use the highest required version (at least as high as configured)
        versions.sort(reverse=True)
        required_major, required_minor, required_label = versions[0]
        required_str = f"{required_major}.{required_minor}"

        cfg_parts = configured.split(".")
        cfg_major  = int(cfg_parts[0]) if cfg_parts else 6
        cfg_minor  = int(cfg_parts[1]) if len(cfg_parts) > 1 else 0

        if required_major > cfg_major or (required_major == cfg_major and required_minor > cfg_minor):
            print(f"WARNING: csproj targets {required_label} but app was configured for .NET {configured}.")
            print(f"  Using .NET {required_str} SDK automatically.")
            print(f"  ACTION: Edit your app in the platform UI and set .NET version to {required_str}.")
            sdk = required_str
        else:
            sdk = configured

        print(f"SDK version resolved: {sdk}")
        open("/workspace/sdk-version.txt", "w").write(sdk)

    # "" Compile """""""""""""""""""""""""""""""""""""""""""""""""""""""""""""""
    # SDK 9.0 is backward compatible: builds net6.0, net7.0, net8.0, net9.0.
    # Using the latest SDK avoids NETSDK1045 errors when the csproj targets a
    # version higher than the user-configured version (a common misconfiguration).
    - name: compile
      image: k8secops/k8secops:dotnet-sdk-9.0
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      # Run as the same user as git-clone (65532) so it owns the workspace files
      # and can create obj/ bin/ publish/ without capability tricks.
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        # 65532 has no home in /etc/passwd -- redirect all .NET/NuGet cache to workspace
        - name: HOME
          value: "$(workspaces.source.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.source.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.source.path)/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        BUILD_FILE="$(params.build-file)"

        echo """ .NET compile: SDK=$(params.build-version) """
        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file). .NET on Linux
        # is OpenSSL-backed and respects SSL_CERT_FILE as the complete trust bundle,
        # so append rather than replace -- otherwise public NuGet.org would break.
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          COMBINED_CA="$HOME/.combined-ca-bundle.pem"
          cat /etc/ssl/certs/ca-certificates.crt "$CUSTOM_CA_CERT_FILE" > "$COMBINED_CA" 2>/dev/null \
            || cp "$CUSTOM_CA_CERT_FILE" "$COMBINED_CA"
          export SSL_CERT_FILE="$COMBINED_CA"
          echo "Trusting custom CA for private NuGet feed: $CUSTOM_CA_CERT_FILE"
        fi

        dotnet --version

        # Produces the final, deployable publish output here, in the compile
        # Task, rather than relying on the Dockerfile's own `dotnet publish`
        # inside Kaniko. Two reasons this changed from validate-only:
        #  1. Credentials for private NuGet feeds (extra build-artifact-repo
        #     credentials) are only available here, not inside Kaniko's
        #     separate, differently-privileged build step.
        #  2. The platform now requires every language's Dockerfile to COPY a
        #     pre-built artifact rather than re-run the build tool inside
        #     Kaniko (see verify-artifacts) -- consistent with how Java/Maven
        #     already worked. Publishing to a workspace-relative path (not an
        #     external /out) avoids the permission issue previously hit,
        #     because this step already runs as the same non-root uid (65532)
        #     that owns the whole workspace.
        OUT_DIR="$(workspaces.source.path)/$(params.build-context)/publish-output"
        if [ -n "$BUILD_FILE" ]; then
          echo """ dotnet restore: $BUILD_FILE """
          dotnet restore "$BUILD_FILE"
          echo """ dotnet build: $BUILD_FILE """
          dotnet build "$BUILD_FILE" -c Release --no-restore

          case "$BUILD_FILE" in
            *.sln)
              # `dotnet publish` does not support solution files (a documented CLI
              # limitation) -- restore/build above already work fine against the
              # .sln, but publish needs a single project. Find the one executable
              # project the solution references (Sdk="Microsoft.NET.Sdk.Web" covers
              # ASP.NET Core apps, which rarely set OutputType explicitly) and
              # publish that instead of guessing.
              echo """ dotnet publish: $BUILD_FILE is a solution -- locating its publishable project """
              SLN_DIR="$(dirname "$BUILD_FILE")"
              CANDIDATES=""
              for proj in $(dotnet sln "$BUILD_FILE" list 2>/dev/null | tail -n +3); do
                PROJ_PATH="$SLN_DIR/$proj"
                [ -f "$PROJ_PATH" ] || continue
                if grep -qE 'Sdk="Microsoft\.NET\.Sdk\.Web"|<OutputType>\s*Exe\s*</OutputType>' "$PROJ_PATH" 2>/dev/null; then
                  CANDIDATES="${CANDIDATES}${PROJ_PATH}
        "
                fi
              done
              CANDIDATE_COUNT=$(printf '%s' "$CANDIDATES" | grep -c . || true)
              if [ "$CANDIDATE_COUNT" -eq 1 ]; then
                PUBLISH_TARGET=$(printf '%s' "$CANDIDATES" | head -1)
                echo """ Publishing solution's single executable project: $PUBLISH_TARGET """
                dotnet publish "$PUBLISH_TARGET" -c Release --no-build -o "$OUT_DIR"
              else
                echo "ERROR: could not identify a single publishable project (Sdk.Web or OutputType=Exe) in $BUILD_FILE -- found $CANDIDATE_COUNT candidate(s). Set buildFile to the specific .csproj to publish instead of the .sln." >&2
                exit 1
              fi
              ;;
            *)
              echo """ dotnet publish: $BUILD_FILE -> $OUT_DIR """
              dotnet publish "$BUILD_FILE" -c Release --no-build -o "$OUT_DIR"
              ;;
          esac
        else
          echo """ dotnet restore """
          dotnet restore
          echo """ dotnet build """
          dotnet build -c Release --no-restore
          echo """ dotnet publish -> $OUT_DIR """
          dotnet publish -c Release --no-build -o "$OUT_DIR"
        fi

        echo """ Build artifacts """
        find "$OUT_DIR" -maxdepth 1 -type f 2>/dev/null \
          | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
        echo """ .NET compile complete """

# Source: platform/tekton/tasks/build/compile-go-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-go
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Go compile -- go build ./... Validates compilation before image build."
  params:
    - name: build-tool
      default: "go"
    - name: build-version
      default: "1.22"
    - name: build-file
      default: "go.mod"
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
    - name: goprivate
      default: ""
      description: "Comma-joined module-path prefixes for GOPRIVATE -- non-sensitive hostnames, baked in per-app by pipeline_builder.py. Empty for apps with no private Go module credential."
  workspaces:
    - name: source
    - name: go-cache
      optional: true
      description: "Persistent Go module cache (GOPATH/pkg/mod). Shared across runs."
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-username/{name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic, identical script for every Go app -- writes .netrc into $HOME
    # (Go's own standard mechanism for authenticating `go get`/`go mod
    # download` against private module hosts). No-op when extra-creds-manifest
    # is "[]" (every app that hasn't configured an extra credential).
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib, stat

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            lines = []
            for cred in manifest:
                name, host = cred["name"], cred["matchId"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                lines.append(f"machine {host}\nlogin {user}\npassword {token}")
            netrc = home / ".netrc"
            netrc.write_text("\n".join(lines) + "\n")
            netrc.chmod(stat.S_IRUSR | stat.S_IWUSR)   # go requires .netrc to not be world/group readable
            print(f"Wrote {len(manifest)} Go module host credential(s) to {netrc}")

        # Generic, identical for every language: export this app's declared
        # external-service credentials (DB/Redis/Kafka/curl-scp-wget targets
        # etc.) as a sourceable env file the compile step reads before
        # invoking the build tool. No-op when the workspace isn't bound or no
        # external-service credentials declared.
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time instead of embedding the value as
        # literal text into the generated export line -- the value never
        # passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-character content
        # (quotes, $(...), newlines) can never break or inject into the line.
        svc_lines: list[str] = []
        # NOTE: each $(workspaces.<name>.path) must appear literally here --
        # Tekton substitutes these as plain text before the script runs, so
        # it cannot resolve one built from a Python loop variable.
        # An unbound optional workspace substitutes to an EMPTY STRING --
        # pathlib.Path("") resolves to ".", the step's own cwd, which
        # always exists, so is_dir() alone never skips an unbound
        # workspace. Check the raw substitution for emptiness first.
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        # uid 1000 has no /etc/passwd entry. The golang image sets GOPATH=/go
        # which is root-owned -- go mod download fails writing to /go/pkg/mod.
        # Override GOPATH and GOCACHE to the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GOPATH
          value: "$(workspaces.source.path)/.gopath"
        - name: GOCACHE
          value: "$(workspaces.source.path)/.gopath/cache"
        - name: GOMODCACHE
          value: "$(workspaces.source.path)/.gopath/pkg/mod"
        - name: GOPRIVATE
          value: "$(params.goprivate)"
      script: |
        #!/bin/sh
        set -e
        echo """ Go compile: version=$(params.build-version) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file). Go respects
        # SSL_CERT_FILE as the complete trust bundle, so append rather than
        # replace -- otherwise the public Go module proxy would break.
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          COMBINED_CA="$HOME/.combined-ca-bundle.pem"
          cat /etc/ssl/certs/ca-certificates.crt "$CUSTOM_CA_CERT_FILE" > "$COMBINED_CA" 2>/dev/null \
            || cp "$CUSTOM_CA_CERT_FILE" "$COMBINED_CA"
          export SSL_CERT_FILE="$COMBINED_CA"
          echo "Trusting custom CA for private Go module proxy: $CUSTOM_CA_CERT_FILE"
        fi

        mkdir -p "$GOPATH/pkg/mod" "$GOCACHE"

        go mod download
        go build ./...
        # Final, copyable artifact for verify-artifacts / the Dockerfile's
        # COPY step -- `-o dir/` builds every main package found under ./...
        # into that directory, robust whether the repo has one main at the
        # root or several under cmd/*, no assumption about layout needed.
        mkdir -p ./bin
        go build -o ./bin/ ./...
        echo """ Go compile complete -- binaries: """
        ls -la ./bin/

