# "" Build image locally -- NO push """""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-pre-build
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Verifies compiled artifacts exist and validates Dockerfile COPY sources
    before Kaniko runs. Runs in its own pod so a failure here is isolated --
    it does not cancel hadolint and gives a fast, clear error before spending
    time on the build.
  params:
    - name: build-tool
      default: "maven"
    - name: language
      default: "java"
    - name: dockerfile-path
      default: "./Dockerfile"
    - name: build-context
      default: "."
  workspaces:
    - name: source
  steps:
    - name: verify-artifacts
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # Hard-requires a pre-built, copyable artifact for every language --
        # the compile Task already produces it (see compile-*-task.yaml), and
        # the Dockerfile must COPY it, never re-run the build tool inside
        # Kaniko. This is a deliberate, fleet-wide breaking change: apps with
        # a Dockerfile that re-installs/rebuilds inside Kaniko will fail here
        # until restructured to COPY the artifact instead. Required so that
        # build-time credentials (private Maven/npm/NuGet/Go-module/PyPI
        # repos, see the extra-credentials feature) reach the install step --
        # they're only available here, in the compile Task, never inside
        # Kaniko's separately-privileged build.
        import pathlib, sys

        build_tool    = "$(params.build-tool)"
        language      = "$(params.language)"
        source_dir    = pathlib.Path("$(workspaces.source.path)")
        build_context = "$(params.build-context)"
        # Artifacts (vendor/, node_modules/, bin/, publish-output/) are created
        # by the compile Task's workingDir, which is source/<build-context> --
        # look for them there, not at the workspace root, or subdirectory
        # buildContexts (e.g. a monorepo app in "operator/") always fail here
        # even though compile succeeded.
        context_dir = source_dir if build_context in (".", "./", "") \
                      else source_dir / build_context.strip("./")

        def require(path: pathlib.Path, what: str, fix: str):
            missing = not path.exists() or (path.is_dir() and not any(path.iterdir()))
            if missing:
                print(f"ERROR: {what} not found at {path.relative_to(source_dir)} -- "
                      f"compile stage may have failed, or the Dockerfile re-runs the "
                      f"build tool instead of copying the compile stage's output.")
                print(f"  FIX: {fix}")
                sys.exit(1)
            print(f"-- {what} ready for Kaniko: {path.relative_to(source_dir)} --")

        if build_tool in ("maven", "gradle"):
            jars = [p for p in source_dir.rglob("*.jar")
                    if ".m2" not in str(p) and "test-classes" not in str(p)
                    and "original-" not in p.name]
            if not jars:
                print("ERROR: No JAR found -- compile stage may have failed.")
                sys.exit(1)
            print("-- Build artifacts ready for Kaniko: --")
            for j in sorted(jars):
                print(f"  {j.stat().st_size // 1024} KB  {j.relative_to(source_dir)}")
        elif build_tool in ("npm", "yarn", "pnpm"):
            require(context_dir / "node_modules", "node_modules/",
                     "Dockerfile should COPY node_modules instead of running npm/yarn/pnpm install.")
            if language in ("react", "nextjs"):
                found = [d for d in ("dist", "build", ".next") if (context_dir / d).exists()]
                if not found:
                    print("ERROR: No dist/, build/, or .next/ directory found -- "
                          "the compile stage's 'npm run build' may have failed.")
                    sys.exit(1)
                print(f"-- Build output ready: {', '.join(found)} --")
        elif build_tool == "go":
            require(context_dir / "bin", "Compiled Go binary (bin/)",
                    "Dockerfile should COPY the bin/ directory instead of running 'go build'.")
        elif build_tool == "dotnet":
            require(context_dir / "publish-output", "dotnet publish output (publish-output/)",
                    "Dockerfile should COPY publish-output/ instead of running 'dotnet publish'.")
        elif build_tool == "pip":
            require(context_dir / "vendor", "Python virtualenv (vendor/)",
                    "Dockerfile should COPY vendor/ instead of running pip/poetry/pdm/pipenv/uv install.")
        else:
            print(f"-- build-tool={build_tool}: artifacts managed by Dockerfile --")

    - name: validate-dockerfile
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import re, pathlib, sys

        source_dir = pathlib.Path("$(workspaces.source.path)")
        df_rel     = "$(params.dockerfile-path)".lstrip("./")
        df_path    = source_dir / df_rel if df_rel else source_dir / "Dockerfile"

        # Single-stage, COPY-only by design (no RUN install/build) -- the
        # compile Task already produced the final artifact (vendor/, bin/,
        # publish-output/, node_modules+dist) in the source workspace; these
        # generated Dockerfiles just package it. This is what lets build-time
        # credentials (private Maven/npm/NuGet/Go-module/PyPI repos) actually
        # reach the install step, and matches what verify-artifacts now
        # hard-requires for every language.
        DEFAULT_DOCKERFILES = {
            "python": "FROM python:3.12-slim\nWORKDIR /app\nCOPY . .\n"
                      "ENV PATH=\"/app/vendor/bin:$PATH\"\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "nodejs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            # `serve` is a tooling install (static file server), not an
            # application dependency -- always from the public npm registry,
            # never needs the app's private-repo credentials, so installing
            # it here doesn't reintroduce the problem this change fixes.
            "react":  "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN npm install -g serve 2>/dev/null || true\n"
                      "CMD [\"serve\", \"-s\", \"build\", \"-l\", \"3000\"]\n",
            "nextjs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "CMD [\"npm\", \"start\"]\n",
            "go":     "FROM alpine:3.20\nWORKDIR /app\nCOPY bin/ ./bin/\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "dotnet": "FROM mcr.microsoft.com/dotnet/aspnet:9.0\nWORKDIR /app\n"
                      "COPY publish-output/. .\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
        }

        if not df_path.exists():
            default = DEFAULT_DOCKERFILES.get("$(params.language)")
            if default:
                print(f"No Dockerfile at {df_path} -- generating default for $(params.language)")
                df_path.write_text(default)
            else:
                print(f"ERROR: Dockerfile not found at {df_path}")
                sys.exit(1)

        lines = df_path.read_text().splitlines()
        from_count = sum(1 for l in lines if re.match(r'^\s*FROM\s+', l, re.I))
        if from_count > 1:
            # Multi-stage Dockerfiles still pass through verify-artifacts (the
            # PREVIOUS step) like every other language now -- that step
            # already hard-failed if the compile-stage artifact is missing,
            # regardless of single- vs multi-stage. This branch only skips
            # the host-filesystem COPY-source check below, which doesn't
            # apply to `COPY --from=<stage>` instructions. Build artifacts
            # are deliberately NOT excluded from the Docker context here
            # (unlike the old re-install-inside-Kaniko pattern) -- a
            # multi-stage Dockerfile may legitimately need to COPY them in.
            print(f"  Multi-stage build ({from_count} FROM stages) -- "
                  f"skipping host COPY-source check (handled by verify-artifacts already).")
            sys.exit(0)

        print("  Single-stage build -- checking COPY sources:")
        missing, found = [], []
        for line in lines:
            line = line.strip()
            if re.match(r'^COPY\s+--from=', line, re.I):
                continue
            m = re.match(r'^COPY\s+(.+)$', line, re.I)
            if not m:
                continue
            parts = m.group(1).split()
            for src in parts[:-1]:
                if src.startswith('--'):
                    continue
                src_clean = src.lstrip('./')
                if '*' in src_clean or '?' in src_clean:
                    matches = list(source_dir.glob(src_clean))
                    (found if matches else missing).append(
                        f"  {'OK' if matches else 'MISSING'} {src}")
                else:
                    full = source_dir / src_clean
                    if full.exists():
                        found.append(f"  OK {src}  ({full.stat().st_size // 1024} KB)")
                    else:
                        candidates = list(source_dir.rglob(f"*{pathlib.Path(src_clean).name}*"))
                        hint = f"  -> did you mean: {candidates[0].relative_to(source_dir)} ?" if candidates else ""
                        missing.append(f"  MISSING {src}{hint}")

        for f in found: print(f)
        if missing:
            print("\nERROR: Dockerfile COPY sources missing:")
            for m in missing: print(m)
            sys.exit(1)
        print(f"\nAll {len(found)} COPY source(s) verified OK")


# Source: platform/tekton/tasks/build/precompile-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-precompile
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: precompile
spec:
  description: >
    Runs a customer-supplied script (committed to their own repo) before
    compile -- the customer's script handles its own tool installation
    (e.g. downloading a cloud CLI to pull files from S3/GCS/Blob storage,
    sed-substituting config placeholders, anything). Generic across every
    language -- unlike compile, there's no language-specific build tool
    involved, just "run this script." A failure here blocks compile from
    ever starting (no onError:continue) since it's a prerequisite the
    build depends on, not an optional/advisory step.
  params:
    - name: precompile-script
      description: "Path to the script (relative to build-context) to execute. Required -- this task is only included in the Pipeline when set."
    - name: precompile-image
      default: "k8secops/k8secops:python-3.12-slim"
      description: "Image to run the script in. Defaults to the same lightweight image every language's materialize-build-creds step already uses (Python+pip available for pip-installable cloud CLIs like awscli) -- override for anything heavier."
    - name: build-context
      default: "."
      description: "Same convention as compile -- the script's workingDir, so relative paths behave like the build itself."
  workspaces:
    - name: source
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none. This is how a customer delivers cloud credentials (AWS keys, a GCP service-account JSON, etc.) or a private-repo CA cert to this script."
  steps:
    # Generic, language-agnostic export loop -- same FILE__ convention every
    # compile task already uses (see compile-python-task.yaml), trimmed down
    # to just the secret-manager part (no Maven/npm-registry-specific logic,
    # not relevant to a general setup script).
    - name: materialize-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.precompile-home"
      script: |
        #!/usr/bin/env python3
        import pathlib, os

        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        # FILE__-prefixed keys point {name}_FILE straight at the already-mounted
        # Secret file -- no copy needed. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time so the value never passes through this
        # script's shell quoting/escaping, only the platform-controlled path does.
        svc_lines: list[str] = []
        # An unbound optional workspace substitutes to an EMPTY STRING --
        # pathlib.Path("") resolves to ".", the step's own cwd, which
        # always exists, so is_dir() alone never skips an unbound
        # workspace. Check the raw substitution for emptiness first.
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")
        else:
            print("No secret-manager credentials declared for this app -- skipping")

    - name: run-precompile-script
      image: $(params.precompile-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.precompile-home"
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      script: |
        #!/bin/sh
        set -e
        SCRIPT="$(params.precompile-script)"
        echo """ Running precompile script: $SCRIPT (image: $(params.precompile-image)) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        if [ ! -f "$SCRIPT" ]; then
          echo "Precompile script not found at '$SCRIPT' (relative to build-context '$(params.build-context)')" >&2
          exit 1
        fi

        chmod +x "$SCRIPT" 2>/dev/null || true
        case "$SCRIPT" in
          /*|./*) EXEC="$SCRIPT" ;;
          *)      EXEC="./$SCRIPT" ;;
        esac
        "$EXEC"
        echo """ Precompile script completed """

