    gitops-platform.io/language: dotnet
spec:
  params:
    - name: build-version
      default: "8.0"
    - name: build-file
      default: "."
    - name: coverage-threshold
      default: "80"
    - name: test-file
      default: ""
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: run-tests
      # Must use the SAME SDK version as the project's TargetFramework so the
      # matching runtime is present when testhost executes the test binaries.
      # SDK 9.0 can cross-COMPILE net8.0 but cannot RUN net8.0 binaries because
      # it only ships the 9.0 runtime. The user-configured build-version must
      # match the project's TargetFramework (e.g. 8.0 for <TargetFramework>net8.0).
      image: k8secops/k8secops:dotnet-sdk-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # Use 65532 to match compile-dotnet (same user owns workspace files).
        # 65532 has no /etc/passwd entry â€” redirect dotnet/nuget dirs to results workspace.
        - name: HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.results.path)/.dotnet-home/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "1"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/tests
        # Use test-file (test project .csproj) if specified; fall back to build-file
        TEST_FILE="$(params.test-file)"
        if [ -z "$TEST_FILE" ]; then TEST_FILE="$(params.build-file)"; fi
        dotnet test \
          --logger "trx;LogFileName=$(workspaces.results.path)/tests/results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory $(workspaces.results.path)/tests \
          "$TEST_FILE" 2>&1 || true
        find $(workspaces.results.path)/tests -name "coverage.cobertura.xml" \
          -exec cp {} $(workspaces.results.path)/tests/coverage.cobertura.xml \; 2>/dev/null || true
        # Remove test-build artifacts only within the project directory â€” not the
        # whole workspace, which would catch .sonarqube/bin/ owned by another user.
        BUILD_FILE="$(params.build-file)"
        if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "." ]; then
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          rm -rf "${PROJECT_DIR}/obj" "${PROJECT_DIR}/bin" 2>/dev/null || true
        fi

    - name: parse-results
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "100m", memory: "128Mi"}
        limits:   {cpu: "200m", memory: "256Mi"}
      script: |
        #!/usr/bin/env python3
        import pathlib, xml.etree.ElementTree as ET

        report_dir = pathlib.Path("$(workspaces.results.path)/tests")
        passed = failed = 0
        try:
            tree = ET.parse(report_dir / "results.trx")
            ns = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
            counters = tree.find(".//t:ResultSummary/t:Counters", ns)
            if counters is not None:
                passed = int(counters.get("passed",0))
                failed = int(counters.get("failed",0))
        except: pass

        coverage = 0.0
        cov_path = report_dir / "coverage.cobertura.xml"
        if cov_path.exists():
            try:
                coverage = round(float(ET.parse(cov_path).getroot().get("line-rate","0")) * 100, 1)
            except: pass

        open("$(results.TESTS_PASSED.path)","w").write(str(passed))
        open("$(results.TESTS_FAILED.path)","w").write(str(failed))
        open("$(results.COVERAGE_PCT.path)","w").write(str(coverage))
        print(f".NET tests: {passed} passed, {failed} failed, coverage {coverage}%")

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        if failed > 0:
            print(f"FAIL: {failed} test(s) failed"); sys.exit(1)
        if coverage < threshold:
            print(f"FAIL: coverage {coverage}% below threshold {threshold}%"); sys.exit(1)
        print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")

