---
# "" Python Unit Tests """"""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-python
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: python
spec:
  params:
    - name: build-tool
      default: pip
    - name: build-version
      default: "3.12"
    - name: build-file
      default: requirements.txt
    - name: build-context
      default: "."
    - name: coverage-threshold
      default: "80"
    - name: test-dir
      default: ""
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
    - name: extra-test-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} for this app's declared test-env-var credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared external-service credentials (DB/Redis/Kafka/curl-scp-wget targets etc.), shared with the compile task. Absent for apps with none."
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
    - name: TESTS_EXECUTED
      description: "'true' if a test runner actually produced a report, 'false' if the runner itself never ran (broken install, no test binary, etc.) -- distinguishes that from a genuine zero-test project."
  steps:
    - name: export-extra-env
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time (below) instead of embedding the
        # value as literal text into the generated export line -- the value
        # never passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-line content or a
        # literal quote/$( ) in the value can never break or inject into
        # the generated line.
        ENVFILE="$(workspaces.results.path)/.extra-env"
        : > "$ENVFILE"
        if [ "$(workspaces.extra-test-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-test-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi
        if [ "$(workspaces.extra-service-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-service-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi

    - name: test
      image: k8secops/k8secops:python-$(params.build-version)-slim
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `pip install --user` has nowhere writable to land.
        - name: HOME
          value: "$(workspaces.results.path)/.pytest-home"
      script: |
        #!/bin/bash
        [ -f "$(workspaces.results.path)/.extra-env" ] && . "$(workspaces.results.path)/.extra-env"
        mkdir -p "$HOME"
        export PATH="$HOME/.local/bin:$PATH"

        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        BUILD_CONTEXT="$(params.build-context)"

        # ai-preflight computes build-file/test-dir relative to the REPO
        # ROOT (it validates against the whole-repo file tree), but this
        # step's workingDir is repo-root/build-context (to land in the same
        # directory compile installed into). Strip a leading build-context/
        # prefix so a value like build-context=operator, test-dir=operator/tests
        # doesn't double-join into operator/operator/tests, which never exists.
        _strip_ctx() {
          # Strip a trailing slash first -- build-context can arrive as
          # either "operator" or "operator/" (ai-preflight passes it through
          # verbatim from the app's configured value), and a bare "/*" glob
          # against an already-slash-terminated prefix never matches.
          ctx="${BUILD_CONTEXT%/}"
          if [ -n "$ctx" ] && [ "$ctx" != "." ]; then
            case "$1" in
              "$ctx"/*) echo "${1#"$ctx"/}" ;;
              *) echo "$1" ;;
            esac
          else
            echo "$1"
          fi
        }
        BUILD_FILE="$(_strip_ctx "$BUILD_FILE")"

        # Reuse the vendor venv compile already built -- poetry/pdm/pipenv/uv
        # all install real dependencies into it, not just plain pip, and
        # re-installing from scratch here with bare pip would silently drop
        # whichever of those four tools the app actually uses (none of their
        # install commands were ever repeated in this task before). Same
        # shared "source" workspace and same build-context-joined workingDir
        # as compile, so ./vendor is exactly where compile left it.
        if [ -f ./vendor/bin/activate ]; then
          . ./vendor/bin/activate
          pip install --quiet pytest pytest-cov
        else
          echo "No ./vendor venv found from compile -- installing fresh (fallback)"
          pip install --quiet --user pytest pytest-cov --break-system-packages
          # Each build tool's actual install logic lives in its own small,
          # focused script under scripts/python/ -- open exactly the one
          # you need to change, nothing else.
          case "$BUILD_TOOL" in
            poetry)
              pip install --quiet --user poetry --break-system-packages
              poetry install --no-interaction --quiet
              ;;
            pdm)
              pip install --quiet --user pdm --break-system-packages
              pdm install --no-self --quiet 2>/dev/null || pdm install --quiet
              ;;
            pipenv)
              pip install --quiet --user pipenv --break-system-packages
              PIPENV_VENV_IN_PROJECT=0 pipenv install --deploy --quiet
              ;;
            uv)
              pip install --quiet --user uv --break-system-packages
              uv pip install --system -r "${BUILD_FILE:-requirements.txt}"
              ;;
            *)
              if [ -f "$BUILD_FILE" ]; then
                pip install --quiet --user -r "$BUILD_FILE" --break-system-packages 2>/dev/null || true
              fi
              ;;
          esac
          if [ -f "pyproject.toml" ]; then pip install --quiet --user -e ".[test]" --break-system-packages 2>/dev/null || true; fi
        fi

        # Test-only deps (mocking libs, etc.) declared separately from the
        # runtime build file -- same directory, requirements-dev.txt by
        # convention. Best-effort like the installs above: silently no-ops
        # for apps that don't split their deps this way.
        DEV_FILE="$(dirname "$BUILD_FILE")/requirements-dev.txt"
        if [ -f "$DEV_FILE" ]; then
          if [ -n "$VIRTUAL_ENV" ]; then
            pip install --quiet -r "$DEV_FILE" 2>/dev/null || true
          else
            pip install --quiet --user -r "$DEV_FILE" --break-system-packages 2>/dev/null || true
          fi
        fi

        mkdir -p $(workspaces.results.path)/tests
        # Use test-dir if provided, otherwise pytest auto-discovers from repo root
        TEST_DIR="$(_strip_ctx "$(params.test-dir)")"
        TEST_DIR="${TEST_DIR:-.}"
        python -m pytest \
          --junitxml=$(workspaces.results.path)/tests/junit.xml \
          --cov=. \
          --cov-report=xml:$(workspaces.results.path)/tests/coverage.xml \
          --cov-report=term-missing \
          -v "$TEST_DIR" 2>&1 | tee /tmp/pytest-out.txt || true

        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET, re, pathlib

        # Parse JUnit
        passed = failed = 0
        executed = False
        try:
            tree = ET.parse("$(workspaces.results.path)/tests/junit.xml")
            root = tree.getroot()
            suite = root if root.tag == "testsuite" else root.find("testsuite")
            if suite is not None:
                passed = int(suite.get("tests",0)) - int(suite.get("failures",0)) - int(suite.get("errors",0))
                failed = int(suite.get("failures",0)) + int(suite.get("errors",0))
                executed = True
        except: pass

        # Parse coverage
        coverage = 0.0
        try:
            tree = ET.parse("$(workspaces.results.path)/tests/coverage.xml")
            coverage = round(float(tree.getroot().get("line-rate","0")) * 100, 1)
        except: pass

        open("$(results.TESTS_PASSED.path)","w").write(str(passed))
        open("$(results.TESTS_FAILED.path)","w").write(str(failed))
        open("$(results.COVERAGE_PCT.path)","w").write(str(coverage))
        open("$(results.TESTS_EXECUTED.path)","w").write("true" if executed else "false")
        print(f"Python tests: {passed} passed, {failed} failed, coverage {coverage}%, executed={executed}")
        PYEOF

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        executed  = open("$(results.TESTS_EXECUTED.path)").read().strip() == "true"
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": executed and failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed, "testsExecuted": executed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        # Never fail the Tekton task/pipeline on test results -- the developer
        # and reviewer decide at the human gate what to do with an image that
        # has failing tests or low coverage, not this task. Results are
        # already persisted above via the /coverage callback regardless of
        # outcome; this only affects this step's own exit code.
        if not executed:
            print("WARNING: test runner did not produce a report -- treat as unverified, not as a clean 0-test result. Check the test step's logs above.")
        elif failed > 0:
            print(f"NOTE: {failed} test(s) failed -- proceeding; visible at the human gate for review")
        elif coverage < threshold:
            print(f"NOTE: coverage {coverage}% below threshold {threshold}% -- proceeding; visible at the human gate for review")
        else:
            print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")


