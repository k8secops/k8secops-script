﻿---
# â”€â”€ Language Compile Task â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Compiles application source into artifacts (JAR/WAR/dist) before tests.
# Results are written to the shared `source` workspace so unit-tests and
# Kaniko (build-image-local) can consume them without recompiling.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-lang-compile
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
  steps:
    - name: compile
      # Fixed image (not $(params.build-version)): that param holds language
      # runtime versions (e.g. python 3.12, go 1.22, dotnet 10.0) which don't
      # correspond to eclipse-temurin tags. Non-maven/gradle build tools skip
      # this step's actual work (see case below), so any JDK image suffices.
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-21
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"

        echo "â•â• Compile stage â•â•  build-tool=$BUILD_TOOL"

        case "$BUILD_TOOL" in
          maven)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            echo "â”€â”€ Maven: compiling (skip tests) â”€â”€"
            mvn package -DskipTests -B $EXTRA
            echo ""
            echo "â”€â”€ Artifacts produced: â”€â”€"
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          gradle)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            echo "â”€â”€ Gradle: assembling (skip tests) â”€â”€"
            ./gradlew assemble $EXTRA
            echo ""
            echo "â”€â”€ Artifacts produced: â”€â”€"
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          npm)
            if command -v npm >/dev/null 2>&1; then
              echo "â”€â”€ npm: installing and building â”€â”€"
              npm install --silent && npm run build --if-present
            else
              echo "â”€â”€ npm compile: skipped (npm not in this image â€” handled by multi-stage Dockerfile) â”€â”€"
            fi
            ;;
          pip|python)
            echo "â”€â”€ Python: no compile step â€” source copied directly into image â”€â”€"
            ;;
          go)
            if command -v go >/dev/null 2>&1; then
              echo "â”€â”€ Go: building â”€â”€"
              go build ./...
            else
              echo "â”€â”€ Go compile: skipped (use multi-stage Dockerfile with RUN go build) â”€â”€"
            fi
            ;;
          dotnet)
            if command -v dotnet >/dev/null 2>&1; then
              echo "â”€â”€ .NET: publishing â”€â”€"
              dotnet publish -c Release -o ./publish --nologo -q
            else
              echo "â”€â”€ dotnet compile: skipped (dotnet not in this image â€” handled by multi-stage Dockerfile) â”€â”€"
            fi
            ;;
          none|skip|"")
            echo "â”€â”€ Compile step skipped (build-tool=none) â”€â”€"
            ;;
          *)
            echo "â”€â”€ Unknown build-tool=$BUILD_TOOL â€” skipping compile â”€â”€"
            ;;
        esac

        echo ""
        echo "â”€â”€ Compile stage complete â”€â”€"

