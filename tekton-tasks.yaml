---
# "" tflint -- Terraform HCL linter """""""""""""""""""""""""
# Complements checkov's security/compliance focus with HCL-level correctness
# checks (unused variables/declarations, invalid provider attribute usage,
# deprecated syntax, naming convention violations).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-tflint
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "tflint Terraform linter. MPL-2.0. No token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: tflint
      image: k8secops/k8secops:tflint-v0.54.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "500m", memory: "1Gi"}
      env:
        - name: HOME
          value: "$(workspaces.results.path)/.tflint-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/iac
        OUT="$(workspaces.results.path)/iac/tflint.sarif"

        echo "-- tflint scan --"
        echo "  Directory: $(workspaces.source.path)"

        # --init only fetches ruleset plugins declared in a repo's own
        # .tflint.hcl -- a harmless no-op when no such config exists, so
        # always safe to attempt. Never blocks the scan on network failure.
        tflint --init 2>/dev/null || true

        # --recursive is the critical flag here -- without it tflint only
        # lints the current directory and silently misses every submodule
        # (modules/, environments/*, etc.), which is how most real Terraform
        # repos are actually laid out.
        tflint --recursive --format=sarif . > "$OUT" 2>/tmp/tflint.err || true

        if [ ! -s "$OUT" ]; then
          printf '{"version":"2.1.0","runs":[]}' > "$OUT"
        fi

        COUNT=$(python3 -c "
        import json
        try:
            d = json.load(open('$OUT'))
            print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
        except Exception:
            print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "tflint findings: $COUNT"
        echo "Report: iac/tflint.sarif"

