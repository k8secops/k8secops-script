---
# "" Java Unit Tests """"""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-java
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: java
spec:
  params:
    - name: build-tool
      default: maven
    - name: build-version
      default: "21"
    - name: build-file
      default: pom.xml
    - name: build-context
      default: "."
    - name: coverage-threshold
      default: "80"
    - name: test-module
      default: ""
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
    - name: extra-test-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} for this app's declared test-env-var credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared external-service credentials (DB/Redis/Kafka/curl-scp-wget targets etc.), shared with the compile task. Absent for apps with none."
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
    - name: TESTS_EXECUTED
      description: "'true' if a test runner actually produced a report, 'false' if the runner itself never ran (broken install, no test binary, etc.) -- distinguishes that from a genuine zero-test project."
  steps:
    # Generic, identical step for every language -- exports each declared
    # test-time secret (its filename IS the literal env var name the
    # customer's test code already reads) to a file the test step below
    # sources. No-op when extra-test-creds isn't bound (every app that
    # hasn't configured a test-env-var credential).
    - name: export-extra-env
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time (below) instead of embedding the
        # value as literal text into the generated export line -- the value
        # never passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-line content or a
        # literal quote/$( ) in the value can never break or inject into
        # the generated line.
        ENVFILE="$(workspaces.results.path)/.extra-env"
        : > "$ENVFILE"
        if [ "$(workspaces.extra-test-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-test-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi
        if [ "$(workspaces.extra-service-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-service-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi

    - name: run-tests
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/sh
        [ -f "$(workspaces.results.path)/.extra-env" ] && . "$(workspaces.results.path)/.extra-env"
        mkdir -p $(workspaces.results.path)/tests
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        TEST_MODULE="$(params.test-module)"
        # Each build tool's actual logic lives in its own small, focused
        # script under scripts/java/ -- open exactly the one you need to
        # change, nothing else.
        case "$BUILD_TOOL" in
          maven)
            # Prefer the Maven Wrapper if the project ships one -- same
            # preference compile-java-task.yaml already applies. Without this,
            # a project pinned to a specific Maven version via mvnw could
            # compile with one Maven version and test with a different
            # system-installed one.
            MVN="mvn"
            [ -x "./mvnw" ] && MVN="./mvnw" && echo "  (using Maven Wrapper)"
            F_ARG=""
            if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ]; then
              F_ARG="-f $BUILD_FILE"
            fi
            # For multi-module projects, run tests only in the specified module
            if [ -n "$TEST_MODULE" ]; then
              $MVN test -pl "$TEST_MODULE" -Dmaven.test.failure.ignore=true -B $F_ARG 2>&1 | tee /tmp/mvn-out.txt || true
              $MVN jacoco:report -pl "$TEST_MODULE" -B $F_ARG 2>/dev/null || true
            else
              $MVN test -Dmaven.test.failure.ignore=true -B $F_ARG 2>&1 | tee /tmp/mvn-out.txt || true
              $MVN jacoco:report -B $F_ARG 2>/dev/null || true
            fi
            ;;
          ant)
            ANT_VERSION="1.10.15"
            ANT_HOME="/tmp/apache-ant-${ANT_VERSION}"
            if [ ! -d "$ANT_HOME" ]; then
              curl -sSL "https://archive.apache.org/dist/ant/binaries/apache-ant-${ANT_VERSION}-bin.tar.gz" -o /tmp/ant.tar.gz
              tar -xzf /tmp/ant.tar.gz -C /tmp
            fi
            export ANT_HOME
            export PATH="$ANT_HOME/bin:$PATH"
            F_ARG=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.xml" ] && F_ARG="-f $BUILD_FILE"
            # "test" is the near-universal JUnit-ant-task target name by
            # convention (no standardized lifecycle to rely on, unlike
            # Maven/Gradle) -- best-effort, same as everything else here.
            echo "  Ant: running 'test' target"
            ant test $F_ARG 2>&1 | tee /tmp/ant-out.txt || true
            ;;
          *)
            ARGS="build test jacocoTestReport"
            if [ -n "$TEST_MODULE" ]; then
              ARGS=":${TEST_MODULE}:test :${TEST_MODULE}:jacocoTestReport"
            fi
            if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ]; then
              ARGS="$ARGS -b $BUILD_FILE"
            fi
            ./gradlew $ARGS 2>&1 | tee /tmp/gradle-out.txt || true
            ;;
        esac
        find . -name "TEST-*.xml" -exec cp {} $(workspaces.results.path)/tests/ \; 2>/dev/null || true
        find . -name "jacoco.xml" -exec cp {} $(workspaces.results.path)/tests/coverage.xml \; 2>/dev/null || true

    - name: parse-results
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "100m", memory: "128Mi"}
        limits:   {cpu: "200m", memory: "256Mi"}
      script: |
        #!/usr/bin/env python3
        import pathlib, xml.etree.ElementTree as ET

        report_dir = pathlib.Path("$(workspaces.results.path)/tests")
        passed = failed = 0
        executed = False
        for xml_file in report_dir.glob("TEST-*.xml"):
            try:
                ts = ET.parse(xml_file).getroot()
                passed += int(ts.get("tests",0)) - int(ts.get("failures",0)) - int(ts.get("errors",0))
                failed += int(ts.get("failures",0)) + int(ts.get("errors",0))
                executed = True
            except: pass

        coverage = 0.0
        cov_file = report_dir / "coverage.xml"
        if cov_file.exists():
            try:
                for counter in ET.parse(cov_file).getroot().findall(".//counter[@type='LINE']"):
                    covered = int(counter.get("covered",0))
                    total   = covered + int(counter.get("missed",0))
                    if total > 0:
                        coverage = round(covered / total * 100, 1)
            except: pass

        open("$(results.TESTS_PASSED.path)","w").write(str(passed))
        open("$(results.TESTS_FAILED.path)","w").write(str(failed))
        open("$(results.COVERAGE_PCT.path)","w").write(str(coverage))
        open("$(results.TESTS_EXECUTED.path)","w").write("true" if executed else "false")
        print(f"Java tests: {passed} passed, {failed} failed, coverage {coverage}%, executed={executed}")

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        executed  = open("$(results.TESTS_EXECUTED.path)").read().strip() == "true"
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": executed and failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed, "testsExecuted": executed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        # Never fail the Tekton task/pipeline on test results -- the developer
        # and reviewer decide at the human gate what to do with an image that
        # has failing tests or low coverage, not this task. Results are
        # already persisted above via the /coverage callback regardless of
        # outcome; this only affects this step's own exit code.
        if not executed:
            print("WARNING: test runner did not produce a report -- treat as unverified, not as a clean 0-test result. Check the test step's logs above.")
        elif failed > 0:
            print(f"NOTE: {failed} test(s) failed -- proceeding; visible at the human gate for review")
        elif coverage < threshold:
            print(f"NOTE: coverage {coverage}% below threshold {threshold}% -- proceeding; visible at the human gate for review")
        else:
            print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")


