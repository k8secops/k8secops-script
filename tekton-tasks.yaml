---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-java
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Java compile -- Maven or Gradle (wrapper-aware). Produces JARs/WARs for image build and tests."
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
  workspaces:
    - name: source
    - name: maven-cache
      optional: true
      description: "Persistent Maven local repository cache (~/.m2). Shared across runs to avoid re-downloading dependencies."
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-username/{name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic, identical script for every Java app -- only extra-creds-manifest
    # and the mounted Secret's contents vary per app/run. No-op (does nothing)
    # when extra-creds-manifest is "[]" or the workspace isn't bound, so this
    # step is a harmless no-op for every app that hasn't configured an extra
    # build-artifact-repo credential.
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        build_tool = "$(params.build-tool)"
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        elif build_tool == "maven":
            m2 = home / ".m2"
            m2.mkdir(parents=True, exist_ok=True)
            servers = []
            for cred in manifest:
                name = cred["name"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                servers.append(
                    f"    <server>\n      <id>{cred['matchId']}</id>\n"
                    f"      <username>{user}</username>\n      <password>{token}</password>\n"
                    f"    </server>")
            (m2 / "settings.xml").write_text(
                "<settings>\n  <servers>\n" + "\n".join(servers) + "\n  </servers>\n</settings>\n")
            print(f"Wrote {len(manifest)} Maven <server> credential(s) to {m2}/settings.xml")
        elif build_tool == "gradle":
            # Gradle's own documented convention: ORG_GRADLE_PROJECT_xxx env
            # vars become project property `xxx` automatically. The customer's
            # build.gradle already references project.findProperty('<matchId>Username'/'Password')
            # for this to work -- standard Gradle credential pattern, no platform-invented convention.
            env_file = home / ".gradle-extra-creds.env"
            lines = []
            for cred in manifest:
                name = cred["name"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                lines.append(f"export ORG_GRADLE_PROJECT_{cred['matchId']}Username='{user}'")
                lines.append(f"export ORG_GRADLE_PROJECT_{cred['matchId']}Password='{token}'")
            env_file.write_text("\n".join(lines) + "\n")
            print(f"Wrote {len(manifest)} Gradle credential env-export(s) to {env_file}")
        else:
            print(f"build-tool={build_tool}: extra build-artifact-repo credentials not applicable -- skipping")

        # Generic, identical for every language: export this app's declared
        # external-service credentials (DB/Redis/Kafka/curl-scp-wget targets
        # etc.) as a sourceable env file the compile step reads before
        # invoking the build tool -- same consolidated-Secret-as-files
        # mechanism as extra-build-creds above, just exported as literal env
        # vars instead of a tool-specific config file. No-op when the
        # workspace isn't bound or no external-service credentials declared.
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time instead of embedding the value as
        # literal text into the generated export line -- the value never
        # passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-character content
        # (quotes, $(...), newlines) can never break or inject into the line.
        svc_lines: list[str] = []
        # NOTE: each $(workspaces.<name>.path) must appear literally here --
        # Tekton substitutes these as plain text before the script runs, so
        # it cannot resolve one built from a Python loop variable.
        # An unbound optional workspace substitutes to an EMPTY STRING --
        # pathlib.Path("") resolves to ".", the step's own cwd, which
        # always exists, so is_dir() alone never skips an unbound
        # workspace. Check the raw substitution for emptiness first.
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      env:
        # uid 1000 has no /etc/passwd entry -- Maven writes local repo to
        # $HOME/.m2/repository and Gradle writes cache to $HOME/.gradle.
        # Redirect both into the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GRADLE_USER_HOME
          value: "$(workspaces.source.path)/.gradle"
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo """ Java compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file). The JDK's
        # own cacerts is copied (not replaced) before importing, so Maven
        # Central/the Gradle Plugin Portal keep working alongside the private repo.
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          CUSTOM_TRUSTSTORE="$HOME/.custom-truststore.jks"
          cp "$JAVA_HOME/lib/security/cacerts" "$CUSTOM_TRUSTSTORE"
          keytool -importcert -noprompt -trustcacerts -alias customca \
            -file "$CUSTOM_CA_CERT_FILE" -keystore "$CUSTOM_TRUSTSTORE" -storepass changeit
          TRUST_OPTS="-Djavax.net.ssl.trustStore=$CUSTOM_TRUSTSTORE -Djavax.net.ssl.trustStorePassword=changeit"
          export MAVEN_OPTS="$MAVEN_OPTS $TRUST_OPTS"
          export GRADLE_OPTS="$GRADLE_OPTS $TRUST_OPTS"
          echo "Trusting custom CA for private Maven/Gradle repo: $CUSTOM_CA_CERT_FILE"
        fi

        mkdir -p "$HOME/.m2" "$GRADLE_USER_HOME"

        # Each build tool's actual logic lives in its own small, focused
        # script under scripts/java/ -- open exactly the one you need to
        # change, nothing else. Only this shared preamble (params, HOME/
        # CA-trust setup) lives in the Task YAML itself.
        case "$BUILD_TOOL" in
          maven)
            # Use persistent cache PVC if mounted, otherwise fall back to source workspace
            if [ "$(workspaces.maven-cache.bound)" = "true" ]; then
              MVN_REPO="$(workspaces.maven-cache.path)/repository"
              mkdir -p "$MVN_REPO"
            else
              MVN_REPO="$(workspaces.source.path)/.m2/repository"
            fi
            MVN_FLAGS="-Dmaven.repo.local=$MVN_REPO -DskipTests -B"

            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            # Prefer Maven Wrapper if the project ships one
            MVN="mvn"
            [ -x "./mvnw" ] && MVN="./mvnw" && echo "  (using Maven Wrapper)"
            $MVN package $MVN_FLAGS $EXTRA
            echo """ Artifacts """
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          gradle)
            # Extra build-artifact-repo credentials (if declared) -- written by
            # the materialize-build-creds step above; no-op if absent.
            [ -f "$HOME/.gradle-extra-creds.env" ] && . "$HOME/.gradle-extra-creds.env"
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            # Prefer Gradle Wrapper if the project ships one
            GRADLE="gradle"
            [ -x "./gradlew" ] && GRADLE="./gradlew" && echo "  (using Gradle Wrapper)"
            $GRADLE assemble $EXTRA
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          ant)
            # Ant has no lifecycle plugin repository the way Maven/Gradle
            # do -- it's a self-contained JAR-based tool, so it's simplest
            # to just download it here rather than bake a 4th build-tool
            # image. Pinned to a fixed version + archive.apache.org (the
            # stable, non-mirror-redirected URL) for reproducibility.
            ANT_VERSION="1.10.15"
            ANT_HOME="/tmp/apache-ant-${ANT_VERSION}"
            if [ ! -d "$ANT_HOME" ]; then
              echo "  Downloading Apache Ant ${ANT_VERSION}..."
              curl -sSL "https://archive.apache.org/dist/ant/binaries/apache-ant-${ANT_VERSION}-bin.tar.gz" -o /tmp/ant.tar.gz
              tar -xzf /tmp/ant.tar.gz -C /tmp
            fi
            export ANT_HOME
            export PATH="$ANT_HOME/bin:$PATH"
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.xml" ] && EXTRA="-f $BUILD_FILE"
            # No standardized "skip tests" flag across Ant projects the way
            # Maven/Gradle have one -- runs the build.xml's own default
            # target, which is the only universal entry point every valid
            # Ant project defines.
            echo """ Ant: building (default target) """
            ant $EXTRA
            echo ""
            echo """ Artifacts produced: """
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          *)
            echo "Unknown Java build-tool=$BUILD_TOOL"; exit 1 ;;
        esac
        echo """ Java compile complete """

