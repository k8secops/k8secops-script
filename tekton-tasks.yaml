# â”€â”€ ESLint Security (Node.js) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-eslint-security
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: nodejs
spec:
  params:
    - name: build-version
      default: "20"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: eslint-security
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `npm install --global` has no writable prefix to install into.
        - name: HOME
          value: "$(workspaces.results.path)/.eslint-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        npm config set prefix "$HOME/.npm-global" 2>/dev/null || true
        export PATH="$HOME/.npm-global/bin:$PATH"
        npm install --global --silent \
          eslint eslint-plugin-security \
          eslint-plugin-no-unsanitized 2>/dev/null || true
        mkdir -p $(workspaces.results.path)/sast
        cat > /tmp/eslint-sec.json << 'EOF'
        {
          "plugins": ["security"],
          "extends": ["plugin:security/recommended"],
          "rules": {
            "security/detect-eval-with-expression": "error",
            "security/detect-non-literal-fs-filename": "error",
            "security/detect-child-process": "error",
            "security/detect-unsafe-regex": "error",
            "security/detect-pseudoRandomBytes": "error"
          }
        }
        EOF
        eslint . --ext .js,.ts \
          --format json \
          --ignore-pattern node_modules \
          --ignore-pattern dist \
          --config /tmp/eslint-sec.json \
          --no-eslintrc \
          -o $(workspaces.results.path)/sast/eslint.json \
          . 2>/dev/null || true
        COUNT=$(node -e "
        try{const d=require('$(workspaces.results.path)/sast/eslint.json');
          console.log(d.reduce((s,f)=>s+f.messages.length,0));}
        catch(e){console.log(0);}" 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "ESLint Security: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/eslint.json 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/eslint.json  ($SIZE, $COUNT findings)"

---
# â”€â”€ SpotBugs (Java) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-spotbugs
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: java
spec:
  params:
    - name: build-tool
      default: maven
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
    - name: results
    - name: cache
      optional: true
  results:
    - name: FINDING_COUNT
  steps:
    - name: spotbugs
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        RESULTS="$(workspaces.results.path)/sast"
        CACHE="/tmp/spotbugs-cache"
        mkdir -p "$RESULTS" "$CACHE"

        # Compile â€” skip tests, quiet
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        if [ "$BUILD_TOOL" = "maven" ]; then
          EXTRA=""
          if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ]; then
            EXTRA="-f $BUILD_FILE"
          fi
          mvn compile -DskipTests -B -q $EXTRA 2>&1 || {
            echo "Maven compile failed â€” skipping SpotBugs"
            echo -n "0" > $(results.FINDING_COUNT.path)
            exit 0
          }
          CLASS_DIRS=$(find . -type d -name "classes" -path "*/target/*" 2>/dev/null | head -5 | tr '\n' ' ')
        else
          EXTRA=""
          if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ]; then
            EXTRA="-b $BUILD_FILE"
          fi
          ./gradlew classes -q $EXTRA 2>&1 || {
            echo "Gradle classes failed â€” skipping SpotBugs"
            echo -n "0" > $(results.FINDING_COUNT.path)
            exit 0
          }
          CLASS_DIRS=$(find . -type d -name "main" -path "*/build/classes/java/*" 2>/dev/null | head -5 | tr '\n' ' ')
        fi

        if [ -z "$CLASS_DIRS" ]; then
          echo "No compiled classes found â€” skipping SpotBugs"
          echo -n "0" > $(results.FINDING_COUNT.path)
          exit 0
        fi
        echo "Compiled classes: $CLASS_DIRS"

        # Download SpotBugs + FindSecBugs plugin
        SB_TGZ="$CACHE/spotbugs.tgz"
        FSB_JAR="$CACHE/fsb.jar"
        if [ ! -f "$SB_TGZ" ]; then
          curl -sL "https://github.com/spotbugs/spotbugs/releases/download/4.8.3/spotbugs-4.8.3.tgz" \
            -o "$SB_TGZ"
          tar xzf "$SB_TGZ" -C "$CACHE"
        fi
        if [ ! -f "$FSB_JAR" ]; then
          curl -sL "https://github.com/find-sec-bugs/find-sec-bugs/releases/download/version-1.13.0/findsecbugs-plugin-1.13.0.jar" \
            -o "$FSB_JAR"
        fi

        SB_BIN=$(find "$CACHE" -name "spotbugs" -path "*/bin/*" 2>/dev/null | head -1)
        XML_OUT="$RESULTS/spotbugs.xml"

        "$SB_BIN" -textui -pluginList "$FSB_JAR" \
          -xml:withMessages -output "$XML_OUT" \
          -effort:max -priority 2 \
          $CLASS_DIRS 2>&1 || true

        COUNT=$(grep -c '<BugInstance' "$XML_OUT" 2>/dev/null || echo 0)
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "SpotBugs: $COUNT findings"
        SIZE=$(du -sh "$XML_OUT" 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/spotbugs.xml  ($SIZE, $COUNT findings)"

---
# â”€â”€ Roslyn Security (.NET) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-roslyn
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: dotnet
spec:
  params:
    - name: build-version
      default: "8.0"
    - name: build-file
      default: "."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: roslyn
      image: k8secops/k8secops:dotnet-sdk-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and dotnet
        # can't create ~/.dotnet, ~/.nuget, or its first-run dirs.
        - name: HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.results.path)/.dotnet-home/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "1"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/sast

        # Inject security analyzers
        if [ ! -f Directory.Build.props ]; then
        cat > Directory.Build.props << 'EOF'
        <Project>
          <ItemGroup>
            <PackageReference Include="SecurityCodeScan.VS2019" Version="5.6.7">
              <PrivateAssets>all</PrivateAssets>
              <IncludeAssets>analyzers</IncludeAssets>
            </PackageReference>
          </ItemGroup>
          <PropertyGroup>
            <EnableNETAnalyzers>true</EnableNETAnalyzers>
            <AnalysisLevel>latest</AnalysisLevel>
          </PropertyGroup>
        </Project>
        EOF
        fi

        dotnet build --no-incremental -warnaserror > $(workspaces.results.path)/sast/roslyn.txt 2>&1 || true

        COUNT=$(grep -E "SCS[0-9]+|CA[0-9]{4}" $(workspaces.results.path)/sast/roslyn.txt | grep -iE "error|warning" | wc -l)
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Roslyn Security: $COUNT findings"

