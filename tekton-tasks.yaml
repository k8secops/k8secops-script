        fi

    - name: test
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `go install`/the module cache have nowhere writable to land.
        # `apk add` also requires root, so python3 can't be installed --
        # results are parsed with awk/grep instead.
        - name: HOME
          value: "$(workspaces.results.path)/.go-home"
      script: |
        #!/bin/sh
        [ -f "$(workspaces.results.path)/.extra-env" ] && . "$(workspaces.results.path)/.extra-env"
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/tests

        # gotestsum is pinned to a known release (not @latest) for
        # reproducible builds. If install fails (network blip, proxy down),
        # fall back to `go test -json` -- built into the go toolchain
        # itself, no install needed, and gotestsum's own JUnit conversion is
        # built on the exact same event stream, so this is a real fallback,
        # not a degraded one.
        GOTESTSUM_OK=false
        if go install gotest.tools/gotestsum@v1.12.0 2>/tmp/gotestsum-install.log; then
          export PATH="$HOME/go/bin:$PATH"
          GOTESTSUM_OK=true
        else
          echo "WARNING: gotestsum install failed -- falling back to 'go test -json'"
          cat /tmp/gotestsum-install.log
        fi

        RAN_OK=false
        if [ "$GOTESTSUM_OK" = "true" ]; then
          if gotestsum \
            --junitfile $(workspaces.results.path)/tests/junit.xml \
            --format standard-quiet \
            -- -coverprofile=$(workspaces.results.path)/tests/coverage.out \
            $(params.test-pattern) 2>&1; then
            RAN_OK=true
          elif [ -f $(workspaces.results.path)/tests/junit.xml ]; then
            # gotestsum exits non-zero when tests fail -- that's a normal
            # test-failure outcome, not an execution failure; the JUnit
            # report still exists and is valid.
            RAN_OK=true
          fi
        else
          if go test -v -json -coverprofile=$(workspaces.results.path)/tests/coverage.out \
            $(params.test-pattern) > $(workspaces.results.path)/tests/go-test.json 2>&1; then
            RAN_OK=true
          elif [ -s $(workspaces.results.path)/tests/go-test.json ]; then
            RAN_OK=true
          fi
        fi

        # Convert coverage.out to a text summary
        go tool cover -func=$(workspaces.results.path)/tests/coverage.out \
          > $(workspaces.results.path)/tests/coverage.txt 2>/dev/null || true

        # Parse JUnit (gotestsum path) or the go-test-json event stream
        # (fallback path) -- no python3 available as non-root in alpine.
        JUNIT="$(workspaces.results.path)/tests/junit.xml"
        JSONL="$(workspaces.results.path)/tests/go-test.json"
        PASSED=0
        FAILED=0
        if [ -f "$JUNIT" ]; then
          set -- $(awk '
            /<testsuite[^s]/ {
              match($0, /tests="[0-9]+"/); t=substr($0,RSTART+7,RLENGTH-8);
              match($0, /failures="[0-9]+"/); f=substr($0,RSTART+10,RLENGTH-11);
              match($0, /errors="[0-9]+"/); e=substr($0,RSTART+8,RLENGTH-9);
              if (t=="") t=0; if (f=="") f=0; if (e=="") e=0;
              passed += t - f - e; failed += f + e;
            }
            END { print passed+0, failed+0 }
          ' "$JUNIT")
          PASSED=$1
          FAILED=$2
        elif [ -f "$JSONL" ]; then
          # go test -json: one JSON object per line, {"Action":"pass"/"fail","Test":"..."}
          # -- only count events with a "Test" field (skip package-level summary lines).
          PASSED=$(grep -c '"Action":"pass".*"Test":"' "$JSONL" 2>/dev/null || echo 0)
          FAILED=$(grep -c '"Action":"fail".*"Test":"' "$JSONL" 2>/dev/null || echo 0)
        fi

        # Parse coverage percentage from the "total:" line
        COVERAGE="0.0"
        COVTXT="$(workspaces.results.path)/tests/coverage.txt"
        if [ -f "$COVTXT" ]; then
          C=$(awk '/^total:/{gsub(/%/,"",$NF); print $NF}' "$COVTXT")
          [ -n "$C" ] && COVERAGE="$C"
        fi

        echo -n "$PASSED" > $(results.TESTS_PASSED.path)
        echo -n "$FAILED" > $(results.TESTS_FAILED.path)
        echo -n "$COVERAGE" > $(results.COVERAGE_PCT.path)
        echo -n "$RAN_OK" > $(results.TESTS_EXECUTED.path)
        echo "Go tests: $PASSED passed, $FAILED failed, coverage ${COVERAGE}%, executed=$RAN_OK"

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        executed  = open("$(results.TESTS_EXECUTED.path)").read().strip() == "true"
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": executed and failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed, "testsExecuted": executed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        # Never fail the Tekton task/pipeline on test results -- the developer
        # and reviewer decide at the human gate what to do with an image that
        # has failing tests or low coverage, not this task. Results are
        # already persisted above via the /coverage callback regardless of
        # outcome; this only affects this step's own exit code.
        if not executed:
            print("WARNING: test runner did not produce a report -- treat as unverified, not as a clean 0-test result. Check the test step's logs above.")
        elif failed > 0:
            print(f"NOTE: {failed} test(s) failed -- proceeding; visible at the human gate for review")
        elif coverage < threshold:
            print(f"NOTE: coverage {coverage}% below threshold {threshold}% -- proceeding; visible at the human gate for review")
        else:
            print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")


