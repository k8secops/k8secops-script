# "" ESLint Security (Node.js) """""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-eslint-security
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: nodejs
spec:
  params:
    - name: build-version
      default: "20"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: eslint-security
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `npm install --global` has no writable prefix to install into.
        - name: HOME
          value: "$(workspaces.results.path)/.eslint-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        npm config set prefix "$HOME/.npm-global" 2>/dev/null || true
        export PATH="$HOME/.npm-global/bin:$PATH"
        npm install --global --silent \
          eslint eslint-plugin-security \
          eslint-plugin-no-unsanitized 2>/dev/null || true
        mkdir -p $(workspaces.results.path)/sast
        cat > /tmp/eslint-sec.json << 'EOF'
        {
          "plugins": ["security"],
          "extends": ["plugin:security/recommended"],
          "rules": {
            "security/detect-eval-with-expression": "error",
            "security/detect-non-literal-fs-filename": "error",
            "security/detect-child-process": "error",
            "security/detect-unsafe-regex": "error",
            "security/detect-pseudoRandomBytes": "error"
          }
        }
        EOF
        eslint . --ext .js,.ts \
          --format json \
          --ignore-pattern node_modules \
          --ignore-pattern dist \
          --config /tmp/eslint-sec.json \
          --no-eslintrc \
          -o $(workspaces.results.path)/sast/eslint.json \
          . 2>/dev/null || true
        COUNT=$(node -e "
        try{const d=require('$(workspaces.results.path)/sast/eslint.json');
          console.log(d.reduce((s,f)=>s+f.messages.length,0));}
        catch(e){console.log(0);}" 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "ESLint Security: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/eslint.json 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/eslint.json  ($SIZE, $COUNT findings)"

