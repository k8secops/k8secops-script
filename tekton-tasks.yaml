---
# "" gosec (Go) """"""""""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-gosec
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: go
spec:
  params:
    - name: build-version
      default: "1.22"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: gosec
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `go install`/the module cache have nowhere writable to land.
        - name: HOME
          value: "$(workspaces.results.path)/.gosec-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        go install github.com/securego/gosec/v2/cmd/gosec@latest 2>/dev/null || true
        export PATH="$HOME/go/bin:$PATH"
        mkdir -p $(workspaces.results.path)/sast
        gosec -fmt sarif -out $(workspaces.results.path)/sast/gosec.sarif \
          -nosec -quiet ./... 2>/dev/null || true
        gosec -fmt json -out $(workspaces.results.path)/sast/gosec.json \
          -nosec -quiet ./... 2>/dev/null || true
        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sast/gosec.json'))
            print(len(d.get('Issues',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "gosec: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/gosec.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/gosec.sarif  ($SIZE, $COUNT findings)"


# Source: platform/tekton/tasks/sast/lang-sast-task.yaml
---
# "" Language-specific SAST dispatcher """""""""""""""""""""
# The operator replaces this task ref with the correct one per language:
#   java   ' gitops-sast-spotbugs
#   python ' gitops-sast-bandit
#   nodejs ' gitops-sast-eslint-security
#   go     ' gitops-sast-gosec
#   dotnet ' gitops-sast-roslyn
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-language
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/role: dispatcher
spec:
  description: "Language-specific SAST. Operator replaces taskRef per language."
  params:
    - name: language
      type: string
    - name: build-tool
      type: string
    - name: build-version
      type: string
    - name: build-file
      type: string
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: route
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # This step is replaced by operator with language-specific task
        # Fallback: just mark 0 findings
        open("$(results.FINDING_COUNT.path)","w").write("0")
        print("Language SAST: using fallback (operator should patch this)")


# Source: platform/tekton/tasks/sast/roslyn-task.yaml
---
# "" Roslyn Security (.NET) """"""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-roslyn
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: dotnet
spec:
  params:
    - name: build-version
      default: "8.0"
    - name: build-file
      default: "."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: roslyn
      image: k8secops/k8secops:dotnet-sdk-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and dotnet
        # can't create ~/.dotnet, ~/.nuget, or its first-run dirs.
        - name: HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.results.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.results.path)/.dotnet-home/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "1"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/sast

        # Inject security analyzers
        if [ ! -f Directory.Build.props ]; then
        cat > Directory.Build.props << 'EOF'
        <Project>
          <ItemGroup>
            <PackageReference Include="SecurityCodeScan.VS2019" Version="5.6.7">
              <PrivateAssets>all</PrivateAssets>
              <IncludeAssets>analyzers</IncludeAssets>
            </PackageReference>
          </ItemGroup>
          <PropertyGroup>
            <EnableNETAnalyzers>true</EnableNETAnalyzers>
            <AnalysisLevel>latest</AnalysisLevel>
          </PropertyGroup>
        </Project>
        EOF
        fi

        dotnet build --no-incremental -warnaserror > $(workspaces.results.path)/sast/roslyn.txt 2>&1 || true

        COUNT=$(grep -E "SCS[0-9]+|CA[0-9]{4}" $(workspaces.results.path)/sast/roslyn.txt | grep -iE "error|warning" | wc -l)
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Roslyn Security: $COUNT findings"

