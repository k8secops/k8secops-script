# "" clippy + cargo-audit (Rust) """""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-rust
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: rust
spec:
  params:
    - name: build-version
      default: "1.81"
    - name: build-file
      default: "Cargo.toml"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: rust-sast
      image: k8secops/k8secops:rust-$(params.build-version)-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry -- `cargo install` and clippy's
        # own cache have nowhere writable to land without an explicit HOME.
        - name: HOME
          value: "$(workspaces.results.path)/.rust-sast-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/sast

        # clippy ships with the official rust image's default toolchain
        # (clippy-driver component) -- no install needed. --message-format
        # json emits one JSON object per line; findings are the lines with
        # reason=="compiler-message" and a warning/error level, so a simple
        # grep on the level field is enough without needing jq (not present
        # in the slim image) or python3 (also not present).
        cargo clippy --release --manifest-path "$(params.build-file)" \
          --message-format=json 2>/dev/null \
          > $(workspaces.results.path)/sast/clippy.json || true
        CLIPPY_COUNT=$(grep -o '"level":"\(warning\|error\)"' \
          $(workspaces.results.path)/sast/clippy.json 2>/dev/null | wc -l | tr -d ' ')

        # cargo-audit: known-vulnerable-crate advisories from the RustSec
        # database, cargo's dependency-CVE equivalent of npm audit/pip-audit.
        # Not part of the default toolchain -- installed on the fly (same
        # tradeoff as gosec-task.yaml's `go install ...@latest`: no
        # persistent cache workspace bound to this task, so every run
        # re-installs).
        cargo install cargo-audit --locked 2>/dev/null || true
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo audit --json --file "$(dirname "$(params.build-file)")/Cargo.lock" 2>/dev/null \
          > $(workspaces.results.path)/sast/cargo-audit.json \
          || cargo audit --json 2>/dev/null > $(workspaces.results.path)/sast/cargo-audit.json \
          || true
        AUDIT_COUNT=$(grep -o '"id":"RUSTSEC-[0-9-]*"' \
          $(workspaces.results.path)/sast/cargo-audit.json 2>/dev/null | wc -l | tr -d ' ')

        COUNT=$((CLIPPY_COUNT + AUDIT_COUNT))
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "clippy: $CLIPPY_COUNT findings, cargo-audit: $AUDIT_COUNT advisories (total $COUNT)"
        echo "Reports: sast/clippy.json, sast/cargo-audit.json"

