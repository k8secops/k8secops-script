---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-rust
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Rust compile -- cargo build --release. Validates compilation before image build."
  params:
    - name: build-tool
      default: "cargo"
    - name: build-version
      default: "1.81"
    - name: build-file
      default: "Cargo.toml"
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
  workspaces:
    - name: source
    - name: cargo-cache
      optional: true
      description: "Persistent Cargo registry/git cache (~/.cargo/registry, ~/.cargo/git). Shared across runs to avoid re-downloading crates."
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic pattern matching go/nodejs's own materialize-build-creds step --
    # writes Cargo's modern, stable per-registry auth file
    # (~/.cargo/credentials.toml, [registries.<name>] token = "...") rather
    # than the older CARGO_REGISTRIES_*_TOKEN env-var convention, so the
    # registry name comes from the credential's own `name`, not a
    # per-registry env var this task would have to synthesize.
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        cargo_home = home / ".cargo"
        cargo_home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            lines = []
            for cred in manifest:
                name = cred["name"]
                token = (creds_dir / f"{name}-token").read_text().strip()
                lines.append(f'[registries.{name}]\ntoken = "{token}"')
            (cargo_home / "credentials.toml").write_text("\n".join(lines) + "\n")
            print(f"Wrote {len(manifest)} Cargo registry credential(s) to {cargo_home}/credentials.toml")

        # Generic, identical for every language: export this app's declared
        # external-service credentials as a sourceable env file. No-op when
        # the workspace isn't bound or no such credentials declared.
        svc_lines: list[str] = []
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:rust-$(params.build-version)-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "1000m", memory: "1Gi"}
        limits:   {cpu: "4000m", memory: "4Gi"}
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/bin/sh
        set -e
        echo """ Rust compile: version=$(params.build-version) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file).
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          export CARGO_HTTP_CAINFO="$CUSTOM_CA_CERT_FILE"
          echo "Trusting custom CA for private Cargo registry: $CUSTOM_CA_CERT_FILE"
        fi

        # Use cargo-cache PVC when bound, otherwise fall back to source workspace --
        # same warm-within-a-run, cold-across-runs tradeoff as maven/go/npm caches.
        if [ "$(workspaces.cargo-cache.bound)" = "true" ]; then
          export CARGO_HOME="$(workspaces.cargo-cache.path)/.cargo"
        else
          export CARGO_HOME="$HOME/.cargo"
        fi
        mkdir -p "$CARGO_HOME"
        # credentials.toml was written under the ORIGINAL $HOME/.cargo above --
        # copy it into the effective CARGO_HOME if they differ (cache-workspace case).
        if [ "$CARGO_HOME" != "$HOME/.cargo" ] && [ -f "$HOME/.cargo/credentials.toml" ]; then
          cp "$HOME/.cargo/credentials.toml" "$CARGO_HOME/credentials.toml"
        fi

        # BUILD_FILE from ai-preflight is always repo-root-relative, but
        # workingDir here is already source/$BUILD_CONTEXT -- strip a leading
        # build-context/ prefix to avoid double-joining for monorepo apps
        # (same double-join bug class fixed in test-python-task.yaml's
        # _strip_ctx(), see the 2026-07-13 build-pattern coverage audit).
        BUILD_FILE="$(params.build-file)"
        BUILD_CONTEXT="$(params.build-context)"
        case "$BUILD_CONTEXT" in
          .|"") : ;;
          *) BUILD_FILE="${BUILD_FILE#"$BUILD_CONTEXT"/}" ;;
        esac

        cargo build --release --manifest-path "$BUILD_FILE"

        # Final, copyable artifact for verify-artifacts / the Dockerfile's
        # COPY step -- collect every produced binary (cargo places them flat
        # under target/release/, workspaces included) into ./bin.
        MANIFEST_DIR="$(dirname "$BUILD_FILE")"
        mkdir -p ./bin
        find "$MANIFEST_DIR/target/release" -maxdepth 1 -type f -perm -u+x \
          -exec cp {} ./bin/ \; 2>/dev/null || true
        echo """ Rust compile complete -- binaries: """
        ls -la ./bin/ 2>/dev/null || echo "(none found under target/release -- library-only crate?)"

# Source: platform/tekton/tasks/build/compile-task.yaml
---
# "" Language Compile Task """"""""""""""""""""""""""""""""""
# Compiles application source into artifacts (JAR/WAR/dist) before tests.
# Results are written to the shared `source` workspace so unit-tests and
# Kaniko (build-image-local) can consume them without recompiling.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-lang-compile
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
  steps:
    - name: compile
      # Fixed image (not $(params.build-version)): that param holds language
      # runtime versions (e.g. python 3.12, go 1.22, dotnet 10.0) which don't
      # correspond to eclipse-temurin tags. Non-maven/gradle build tools skip
      # this step's actual work (see case below), so any JDK image suffices.
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-21
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"

        echo "-- Compile stage --  build-tool=$BUILD_TOOL"

        case "$BUILD_TOOL" in
          maven)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            echo """ Maven: compiling (skip tests) """
            mvn package -DskipTests -B $EXTRA
            echo ""
            echo """ Artifacts produced: """
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          gradle)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            echo """ Gradle: assembling (skip tests) """
            ./gradlew assemble $EXTRA
            echo ""
            echo """ Artifacts produced: """
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do
                  SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
                  echo "  $SIZE  $f"
                done
            ;;
          npm)
            if command -v npm >/dev/null 2>&1; then
              echo """ npm: installing and building """
              npm install --silent && npm run build --if-present
            else
              echo """ npm compile: skipped (npm not in this image -- handled by multi-stage Dockerfile) """
            fi
            ;;
          pip|python)
            echo """ Python: no compile step -- source copied directly into image """
            ;;
          go)
            if command -v go >/dev/null 2>&1; then
              echo """ Go: building """
              go build ./...
            else
              echo """ Go compile: skipped (use multi-stage Dockerfile with RUN go build) """
            fi
            ;;
          dotnet)
            if command -v dotnet >/dev/null 2>&1; then
              echo """ .NET: publishing """
              dotnet publish -c Release -o ./publish --nologo -q
            else
              echo """ dotnet compile: skipped (dotnet not in this image -- handled by multi-stage Dockerfile) """
            fi
            ;;
          none|skip|"")
            echo """ Compile step skipped (build-tool=none) """
            ;;
          *)
            echo """ Unknown build-tool=$BUILD_TOOL -- skipping compile """
            ;;
        esac

        echo ""
        echo """ Compile stage complete """

