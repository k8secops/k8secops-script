# â”€â”€ Bearer â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-bearer
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "Bearer SAST â€” security + privacy, Apache 2.0, no token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: scan
      image: k8secops/k8secops:bearer-v1.44.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "300m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sast
        bearer scan . \
          --format sarif \
          --output $(workspaces.results.path)/sast/bearer.sarif \
          --severity critical,high,medium \
          --quiet 2>/dev/null || true
        bearer scan . \
          --format json \
          --output $(workspaces.results.path)/sast/bearer.json \
          --severity critical,high,medium \
          --quiet 2>/dev/null || true
        COUNT=$(python3 -c "
