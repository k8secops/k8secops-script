# â”€â”€ Checkov â€” IaC security scanner â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Scans Dockerfiles and Kubernetes manifests for misconfigurations,
# hardcoded secrets, insecure defaults, and CIS benchmark violations.
# Required for banking/regulated workloads before production deployment.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-checkov
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "Checkov security scanner â€” parameterised by framework. Apache 2.0. No token."
  params:
    - name: frameworks
      type: string
      default: "dockerfile"
      description: "Comma-separated Checkov frameworks to scan (e.g. dockerfile  or  terraform,kubernetes,helm)"
    - name: output-name
      type: string
      default: "checkov-dockerfile"
      description: "Output SARIF filename stem â€” must be unique per pipeline task invocation"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: scan
      image: k8secops/k8secops:checkov-3.2.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "500m", memory: "1Gi"}
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/iac
        OUT="$(workspaces.results.path)/iac/$(params.output-name).sarif"

        echo "â•â• Checkov scan â•â•"
        echo "  Frameworks: $(params.frameworks)"
        echo "  Directory : $(workspaces.source.path)"
        echo "  Output    : $OUT"
        echo ""

        checkov \
          --directory . \
          --framework $(params.frameworks) \
          --output sarif \
          --output-file-path $(workspaces.results.path)/iac \
          --soft-fail \
          2>/dev/null || true

        # Checkov writes results.sarif â€” rename to the configured output name
        if [ -f "$(workspaces.results.path)/iac/results.sarif" ]; then
          mv "$(workspaces.results.path)/iac/results.sarif" "$OUT"
        else
          printf '{"version":"2.1.0","runs":[]}' > "$OUT"
        fi

        COUNT=$(python3 -c "
        import json
        try:
            d = json.load(open('$OUT'))
            print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
        except Exception:
            print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        SIZE=$(du -sh "$OUT" 2>/dev/null | cut -f1 || echo "0B")
        echo "Checkov findings: $COUNT  ($SIZE)"
        echo "Report: iac/$(params.output-name).sarif"

