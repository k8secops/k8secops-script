    - name: test
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `go install`/the module cache have nowhere writable to land.
        # `apk add` also requires root, so python3 can't be installed --
        # results are parsed with awk/grep instead.
        - name: HOME
          value: "$(workspaces.results.path)/.go-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        mkdir -p $(workspaces.results.path)/tests

        go install gotest.tools/gotestsum@latest 2>/dev/null || true
        export PATH="$HOME/go/bin:$PATH"

        gotestsum \
          --junitfile $(workspaces.results.path)/tests/junit.xml \
          --format standard-quiet \
          -- -coverprofile=$(workspaces.results.path)/tests/coverage.out \
          $(params.test-pattern) 2>&1 || true

        # Convert coverage.out to a text summary
        go tool cover -func=$(workspaces.results.path)/tests/coverage.out \
          > $(workspaces.results.path)/tests/coverage.txt 2>/dev/null || true

        # Parse JUnit results (no python3 available as non-root in alpine)
        JUNIT="$(workspaces.results.path)/tests/junit.xml"
        PASSED=0
        FAILED=0
        if [ -f "$JUNIT" ]; then
          set -- $(awk '
            /<testsuite[^s]/ {
              match($0, /tests="[0-9]+"/); t=substr($0,RSTART+7,RLENGTH-8);
              match($0, /failures="[0-9]+"/); f=substr($0,RSTART+10,RLENGTH-11);
              match($0, /errors="[0-9]+"/); e=substr($0,RSTART+8,RLENGTH-9);
              if (t=="") t=0; if (f=="") f=0; if (e=="") e=0;
              passed += t - f - e; failed += f + e;
            }
            END { print passed+0, failed+0 }
          ' "$JUNIT")
          PASSED=$1
          FAILED=$2
        fi

        # Parse coverage percentage from the "total:" line
        COVERAGE="0.0"
        COVTXT="$(workspaces.results.path)/tests/coverage.txt"
        if [ -f "$COVTXT" ]; then
          C=$(awk '/^total:/{gsub(/%/,"",$NF); print $NF}' "$COVTXT")
          [ -n "$C" ] && COVERAGE="$C"
        fi

        echo -n "$PASSED" > $(results.TESTS_PASSED.path)
        echo -n "$FAILED" > $(results.TESTS_FAILED.path)
        echo -n "$COVERAGE" > $(results.COVERAGE_PCT.path)
        echo "Go tests: $PASSED passed, $FAILED failed, coverage ${COVERAGE}%"

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        if failed > 0:
            print(f"FAIL: {failed} test(s) failed"); sys.exit(1)
        if coverage < threshold:
            print(f"FAIL: coverage {coverage}% below threshold {threshold}%"); sys.exit(1)
        print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")

---
# "" Unit Tests dispatcher (operator patches per language) ""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-unit-tests
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/role: dispatcher
spec:
  description: "Dispatcher -- operator patches taskRef to language-specific task."
  params:
    - name: language
      type: string
    - name: build-tool
      type: string
    - name: build-version
      type: string
    - name: build-file
      type: string
    - name: coverage-threshold
      default: "80"
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: run
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # Operator patches this taskRef -- this is the fallback
        open("$(results.TESTS_PASSED.path)","w").write("0")
        open("$(results.TESTS_FAILED.path)","w").write("0")
        open("$(results.COVERAGE_PCT.path)","w").write("0")
        print("Unit test dispatcher: operator should patch this task")

