﻿---
# â”€â”€ Build image locally â€” NO push â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-build-image-local
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Builds container image using Kaniko with --no-push.
    Image is saved as a tar file in the image-tar workspace.
    Push happens ONLY after human approval in a separate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: language
      type: string
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
    - name: dockerfile-path
      default: "./Dockerfile"
    - name: context
      default: "./"
    - name: operator-api-url
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
    - name: pipeline-run-id
      default: ""
    - name: registry-mirror
      default: ""
      description: "Optional registry mirror URL for Kaniko base image pulls (e.g. kind-registry:5000). Leave empty to pull directly from Docker Hub."
  workspaces:
    - name: source
    - name: image-tar
    - name: results
    - name: kaniko-cache
    - name: registry-credentials
      description: "Docker config.json for authenticating base image pulls from Docker Hub"
  results:
    - name: IMAGE_TAR_PATH
    - name: IMAGE_FULL_REF
  steps:
    # â”€â”€ Step 1: Verify artifacts from compile stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # The dedicated compile stage (gitops-lang-compile) already ran mvn package
    # before this task. We just confirm the artifacts are present so Kaniko
    # doesn't silently build a broken image.
    - name: verify-artifacts
      image: k8secops/k8secops:python-3.12-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import subprocess, pathlib, sys

        build_tool = "$(params.build-tool)"
        source_dir = pathlib.Path("$(workspaces.source.path)")

        if build_tool in ("maven", "gradle"):
            jars = [p for p in source_dir.rglob("*.jar")
                    if ".m2" not in str(p) and "test-classes" not in str(p)
                    and "original-" not in p.name]
            if not jars:
                print("ERROR: No JAR found â€” compile stage may have failed.")
                print("       Expected mvn/gradle artifacts in target/ or build/libs/")
                sys.exit(1)
            print("â”€â”€ Build artifacts ready for Kaniko: â”€â”€")
            for j in sorted(jars):
                size_kb = j.stat().st_size // 1024
                print(f"  {size_kb} KB  {j.relative_to(source_dir)}")
        elif build_tool in ("npm",):
            dist = source_dir / "dist"
            build = source_dir / "build"
            if not dist.exists() and not build.exists():
                print("WARN: No dist/ or build/ directory found for npm project")
                print("      Kaniko will include full source â€” ensure Dockerfile handles this")
            else:
                print("â”€â”€ npm build output ready â”€â”€")
        else:
            print(f"â”€â”€ build-tool={build_tool}: artifacts managed by Dockerfile â”€â”€")

    # â”€â”€ Step 2: Validate Dockerfile COPY instructions â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Parses the Dockerfile, finds every COPY source, checks it exists.
    # Fails with a clear message if sources are missing so Kaniko doesn't
    # produce a silently broken image.
    - name: validate-dockerfile
      image: k8secops/k8secops:python-3.12-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import re, pathlib, sys, fnmatch

        source_dir = pathlib.Path("$(workspaces.source.path)")
        df_rel     = "$(params.dockerfile-path)".lstrip("./")
        df_path    = source_dir / df_rel if df_rel else source_dir / "Dockerfile"

        # â”€â”€ Generate a default Dockerfile if the repo doesn't ship one â”€â”€â”€â”€â”€â”€
        # Sample/demo repos for non-Java languages often have no Dockerfile.
        # A generic single-stage Dockerfile lets Kaniko produce a buildable
        # image without requiring the repo to be containerized.
        DEFAULT_DOCKERFILES = {
            "python": "FROM python:3.12-slim\nWORKDIR /app\nCOPY . .\n"
                      "RUN pip install --no-cache-dir -r requirements.txt 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "nodejs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN npm install --omit=dev 2>/dev/null || npm install 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "go":     "FROM golang:1.22-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN go build ./... 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "dotnet": "FROM mcr.microsoft.com/dotnet/sdk:10.0\nWORKDIR /app\nCOPY . .\n"
                      "RUN dotnet publish -c Release -o /out 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
        }

        if not df_path.exists():
            default = DEFAULT_DOCKERFILES.get("$(params.language)")
            if default:
                print(f"No Dockerfile at {df_path} â€” generating a default for language=$(params.language)")
                df_path.write_text(default)
            else:
                print(f"ERROR: Dockerfile not found at {df_path}")
                sys.exit(1)

        print(f"â”€â”€ Dockerfile: {df_path} â”€â”€")
        lines = df_path.read_text().splitlines()

        # Detect multi-stage build
        from_count = sum(1 for l in lines if re.match(r'^\s*FROM\s+', l, re.I))
        is_multistage = from_count > 1
        if is_multistage:
            print(f"  Multi-stage build detected ({from_count} FROM stages)")
            print("  Compile step inside Docker â€” no pre-existing artifacts required.")
            # Pipeline compile/test stages leave obj/, bin/, target/, dist/ etc. in the
            # source workspace. These get picked up by COPY . . and can conflict with
            # the build running inside the Dockerfile. Ensure .dockerignore excludes them.
            ignore_path = source_dir / ".dockerignore"
            additions = [
                "# gitops-platform: exclude pipeline build artifacts from Docker context",
                "obj/", "bin/",           # dotnet / C#
                "target/",                 # Java Maven / Gradle
                "build/libs/",             # Gradle
                "dist/", ".next/",         # Node.js
                "__pycache__/", "*.pyc",   # Python
                ".git/",
            ]
            existing = ignore_path.read_text() if ignore_path.exists() else ""
            new_lines = [e for e in additions if e not in existing and not e.startswith("#")]
            if new_lines:
                with ignore_path.open("a") as f:
                    f.write("\n" + additions[0] + "\n")
                    f.write("\n".join(new_lines) + "\n")
                print(f"  Added {len(new_lines)} entries to .dockerignore (obj/, bin/, target/, etc.)")
            else:
                print("  .dockerignore already covers build artifact directories")

            # â”€â”€ Diagnostic: list files that will enter the Docker context â”€â”€â”€â”€â”€â”€
            print("\n  Files in Docker context (top 60, excluding known build dirs):")
            skip = {"obj","bin","target","build","dist",".git","node_modules","__pycache__"}
            count = 0
            for p in sorted(source_dir.rglob("*")):
                if any(part in skip for part in p.parts):
                    continue
                if p.is_file():
                    rel = p.relative_to(source_dir)
                    size = p.stat().st_size
                    print(f"    {size:>8}  {rel}")
                    count += 1
                    if count >= 60:
                        print("    ... (truncated)")
                        break

            sys.exit(0)

        print("  Single-stage build â€” checking COPY sources exist in workspace:")

        missing, found = [], []
        for line in lines:
            line = line.strip()
            # Skip COPY --from= (copies from another stage, not the build context)
            if re.match(r'^COPY\s+--from=', line, re.I):
                continue
            m = re.match(r'^COPY\s+(.+)$', line, re.I)
            if not m:
                continue
            parts = m.group(1).split()
            # Last part is destination; everything before it is source
            srcs = parts[:-1] if len(parts) > 1 else []
            for src in srcs:
                if src.startswith('--'):
                    continue
                src_clean = src.lstrip('./')
                # Glob support
                if '*' in src_clean or '?' in src_clean:
                    matches = list(source_dir.glob(src_clean))
                    if matches:
                        sizes = [f"{p.stat().st_size//1024}KB  {p.relative_to(source_dir)}" for p in matches[:3]]
                        found.append(f"  âœ“ {src}  â†’  {', '.join(sizes)}")
                    else:
                        missing.append(f"  âœ— {src}  (no files match glob)")
                else:
                    full = source_dir / src_clean
                    if full.exists():
                        size = full.stat().st_size // 1024
                        found.append(f"  âœ“ {src}  ({size} KB)")
                    else:
                        # Suggest closest match
                        name = pathlib.Path(src_clean).name
                        candidates = list(source_dir.rglob(f"*{name}*"))
                        hint = ""
                        if candidates:
                            rel = candidates[0].relative_to(source_dir)
                            hint = f"  â†’ did you mean: {rel} ?"
                        missing.append(f"  âœ— {src}  â€” not found{hint}")

        for f in found:
            print(f)
        if missing:
            print("\nERROR: Dockerfile COPY sources missing from build context:")
            for m in missing:
                print(m)
            print("\nFix: update your Dockerfile's COPY paths to match the actual")
            print("build output, or use a multi-stage Dockerfile.")
            sys.exit(1)

        print(f"\nAll {len(found)} COPY source(s) verified âœ“")

    # â”€â”€ Step 2b: Hadolint â€” Dockerfile lint â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    - name: hadolint
      image: k8secops/k8secops:hadolint-v2.12.0-debian
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.results.path)/dockerfile-lint
        DF_REL=$(echo "$(params.dockerfile-path)" | sed 's|^\./||')
        DF="$(workspaces.source.path)/$DF_REL"
        OUT="$(workspaces.results.path)/dockerfile-lint/hadolint.json"

        echo "â•â• Hadolint Dockerfile lint â•â•"
        echo "  Dockerfile: $DF"

        hadolint "$DF" -f json > "$OUT" 2>/dev/null || true
        COUNT=$(grep -o '"code"' "$OUT" 2>/dev/null | wc -l | tr -d ' ')
        SIZE=$(du -sh "$OUT" 2>/dev/null | cut -f1 || echo "0B")
        echo "Hadolint findings: ${COUNT:-0}"
        echo "Report: dockerfile-lint/hadolint.json  ($SIZE, ${COUNT:-0} findings)"

    # â”€â”€ Step 3: Kaniko â€” build image and save as Docker archive â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Kaniko builds Dockerfiles inside a container without Docker daemon or
    # privileged:true. It unpacks layers into a directory and uses chroot â€”
    # no overlayfs, no daemon startup race, works under any PSA policy.
    # --snapshot-mode=redo handles .NET multi-stage builds correctly without
    # the nested overlayfs workarounds that BuildKit required.
    - name: build-local
      image: k8secops/k8secops:k8secops-gitops-builder-1.0.0
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: false
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.registry-credentials.path)
      script: |
        #!/bin/sh
        set -e

        # Strip leading ./ so paths work as absolute suffixes
        DF="$(params.dockerfile-path)"
        DF="${DF#./}"
        CTX="$(params.context)"
        CTX="${CTX#./}"

        echo "Building image: $(params.image-registry)/$(params.image-name):$(params.image-tag)"
        echo "Dockerfile:     $(workspaces.source.path)/$DF"
        echo "Context:        $(workspaces.source.path)/$CTX"

        # Build --registry-mirror flag only when a mirror is configured
        MIRROR_FLAG=""
        if [ -n "$(params.registry-mirror)" ]; then
          MIRROR_FLAG="--registry-mirror=$(params.registry-mirror)"
          echo "Using registry mirror: $(params.registry-mirror)"
        fi

        # shellcheck disable=SC2086
        /kaniko/executor \
          --dockerfile="$(workspaces.source.path)/$DF" \
          --context="dir://$(workspaces.source.path)/$CTX" \
          --destination="$(params.image-registry)/$(params.image-name):$(params.image-tag)" \
          --no-push \
          --tar-path="$(workspaces.image-tar.path)/image.tar" \
          --snapshot-mode=full \
          --cache-dir="$(workspaces.kaniko-cache.path)" \
          --log-format=text \
          --verbosity=info \
          $MIRROR_FLAG

        echo "Image saved: $(workspaces.image-tar.path)/image.tar"
    - name: record-ref
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import os, sys, urllib.request, json
        tar_path = "$(workspaces.image-tar.path)/image.tar"
        full_ref = "$(params.image-registry)/$(params.image-name):$(params.image-tag)"
        open("$(results.IMAGE_TAR_PATH.path)","w").write(tar_path)
        open("$(results.IMAGE_FULL_REF.path)","w").write(full_ref)
        if not os.path.exists(tar_path):
            print(f"ERROR: image tar not found at {tar_path}")
            print("Kaniko did not write the tar â€” check build-local step logs")
            sys.exit(1)
        size_mb = os.path.getsize(tar_path) // 1024 // 1024
        print(f"Built image: {full_ref}")
        print(f"Image tar:   {tar_path} ({size_mb} MB)")
        # Notify operator so the UI can show the built image reference immediately
        token   = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({
            "runId":    "$(params.pipeline-run-id)",
            "imageRef": full_ref,
            "sizeMb":   size_mb,
        }).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-built",
                data=payload, headers=headers, method="POST")
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image built {full_ref}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# â”€â”€ Trivy â€” scans local tar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-trivy
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: image-scan
spec:
  description: "Trivy image scan on local tar. No push required. Apache 2.0."
  params:
    - name: severity
      default: "CRITICAL,HIGH,MEDIUM"
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
    - name: vulndb-cache
  results:
    - name: CRITICAL_COUNT
    - name: HIGH_COUNT
    - name: MEDIUM_COUNT
  steps:
    - name: trivy
      image: k8secops/k8secops:trivy-0.54.1
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      env:
        - name: TRIVY_CACHE_DIR
          value: "$(workspaces.vulndb-cache.path)/trivy"
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/image-scan "$TRIVY_CACHE_DIR"
        TAR="$(workspaces.image-tar.path)/image.tar"
        IMAGE_REF="$(params.image-ref)"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")

        echo "â•â• Trivy image scan â•â•"
        echo "  Image : ${IMAGE_REF:-<unknown>}"
        echo "  Tar   : $TAR ($TAR_SIZE)"
        echo "  Rules : $(params.severity)"
        echo ""

        trivy image \
          --input "$TAR" \
          --format sarif \
          --output $(workspaces.results.path)/image-scan/trivy.sarif \
          --scanners vuln,secret,misconfig,license \
          --severity "$(params.severity)" \
          --exit-code 0 2>/dev/null || true

        trivy image \
          --input "$TAR" \
          --format json \
          --output $(workspaces.results.path)/image-scan/trivy.json \
          --scanners vuln,secret,misconfig,license \
          --exit-code 0 2>/dev/null || true

        # Count with grep â€” Trivy Alpine image has no python3
        JSON="$(workspaces.results.path)/image-scan/trivy.json"
        CRITICAL=$(grep -o '"Severity":"CRITICAL"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        HIGH=$(grep -o '"Severity":"HIGH"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        MEDIUM=$(grep -o '"Severity":"MEDIUM"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        CRITICAL=${CRITICAL:-0}; HIGH=${HIGH:-0}; MEDIUM=${MEDIUM:-0}
        printf '%s' "$CRITICAL" > $(results.CRITICAL_COUNT.path)
        printf '%s' "$HIGH"     > $(results.HIGH_COUNT.path)
        printf '%s' "$MEDIUM"   > $(results.MEDIUM_COUNT.path)
        echo "Trivy result â€” CRITICAL=$CRITICAL HIGH=$HIGH MEDIUM=$MEDIUM"
        SIZE=$(du -sh "$(workspaces.results.path)/image-scan/trivy.json" 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: image-scan/trivy.json  ($SIZE, C=$CRITICAL H=$HIGH M=$MEDIUM)"

---
# â”€â”€ Grype â€” scans local tar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# anchore/grype:latest is distroless (no /bin/sh) â€” cannot use script:.
# Step 1 creates the output dir (python:3.12-slim).
# Step 2 runs grype via command/args (no script injection).
# Step 3 parses JSON results (python:3.12-slim).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-grype
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: image-scan
spec:
  description: "Grype image scan on local tar. Apache 2.0. No token."
  params:
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
    - name: vulndb-cache
  results:
    - name: CRITICAL_COUNT
    - name: HIGH_COUNT
  steps:
    - name: setup
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/image-scan
        mkdir -p $(workspaces.vulndb-cache.path)/grype/tmp $(workspaces.vulndb-cache.path)/grype/db
        TAR="$(workspaces.image-tar.path)/image.tar"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")
        echo "â•â• Grype image scan â•â•"
        echo "  Image : $(params.image-ref)"
        echo "  Tar   : $TAR ($TAR_SIZE)"

    - name: grype-scan
      image: k8secops/k8secops:grype-v0.80.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      env:
        - name: HOME
          value: "$(workspaces.vulndb-cache.path)/grype"
        - name: TMPDIR
          value: "$(workspaces.vulndb-cache.path)/grype/tmp"
        - name: GRYPE_DB_AUTO_UPDATE
          value: "true"
        - name: GRYPE_DB_VALIDATE_AGE
          value: "false"
        - name: GRYPE_DB_CACHE_DIR
          value: "$(workspaces.vulndb-cache.path)/grype/db"
      # anchore/grype:latest is distroless â€” binary is at /grype, not on PATH
      command: ["/grype"]
      args:
        - "docker-archive:$(workspaces.image-tar.path)/image.tar"
        - "--output"
        - "json"
        - "--file"
        - "$(workspaces.results.path)/image-scan/grype.json"
        - "--add-cpes-if-none"
        - "--quiet"

    - name: parse
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, pathlib
        counts = {"Critical": 0, "High": 0}
        try:
            d = json.loads(pathlib.Path("$(workspaces.results.path)/image-scan/grype.json").read_text())
            for m in d.get("matches", []):
                sev = m.get("vulnerability", {}).get("severity", "Unknown")
                counts[sev] = counts.get(sev, 0) + 1
        except Exception as e:
            print(f"Parse warning: {e}")
        pathlib.Path("$(results.CRITICAL_COUNT.path)").write_text(str(counts["Critical"]))
        pathlib.Path("$(results.HIGH_COUNT.path)").write_text(str(counts["High"]))
        print(f"Grype result â€” Critical={counts['Critical']} High={counts['High']}")
        grype_path = pathlib.Path("$(workspaces.results.path)/image-scan/grype.json")
        size_kb = grype_path.stat().st_size // 1024 if grype_path.exists() else 0
        total = sum(counts.values())
        print(f"Report: image-scan/grype.json  ({size_kb} KB, {total} matches)")

---
# â”€â”€ Syft â€” SBOM generation from local tar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# anchore/syft:latest is distroless (no /bin/sh) â€” cannot use script:.
# Step 1 creates the output dir (python:3.12-slim).
# Step 2 runs syft via command/args (no script injection).
# Step 3 parses the CycloneDX JSON results (python:3.12-slim).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-syft
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sbom
spec:
  description: "Syft SBOM generation (CycloneDX) on local tar. Apache 2.0. No token."
  params:
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
  results:
    - name: PACKAGE_COUNT
  steps:
    - name: setup
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sbom $(workspaces.results.path)/.syft-cache
        TAR="$(workspaces.image-tar.path)/image.tar"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")
        echo "â•â• Syft SBOM generation â•â•"
        echo "  Image : $(params.image-ref)"
        echo "  Tar   : $TAR ($TAR_SIZE)"

    - name: syft-scan
      image: k8secops/k8secops:syft-v1.9.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      env:
        - name: HOME
          value: "$(workspaces.results.path)/.syft-cache"
        - name: TMPDIR
          value: "$(workspaces.results.path)/.syft-cache"
      # anchore/syft:latest is distroless â€” binary is at /syft, not on PATH
      command: ["/syft"]
      args:
        - "docker-archive:$(workspaces.image-tar.path)/image.tar"
        - "-o"
        - "cyclonedx-json=$(workspaces.results.path)/sbom/sbom.cyclonedx.json"
        - "-q"

    - name: parse
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, pathlib
        count = 0
        try:
            d = json.loads(pathlib.Path("$(workspaces.results.path)/sbom/sbom.cyclonedx.json").read_text())
            count = len(d.get("components", []))
        except Exception as e:
            print(f"Parse warning: {e}")
        pathlib.Path("$(results.PACKAGE_COUNT.path)").write_text(str(count))
        sbom_path = pathlib.Path("$(workspaces.results.path)/sbom/sbom.cyclonedx.json")
        size_kb = sbom_path.stat().st_size // 1024 if sbom_path.exists() else 0
        print(f"Syft SBOM â€” {count} components")
        print(f"Report: sbom/sbom.cyclonedx.json  ({size_kb} KB, {count} components)")

---
# â”€â”€ Image Push (only after human YES) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-image-push
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: push
spec:
  description: |
    Pushes the locally built image tar to the registry, then signs the
    pushed image with cosign (if a cosign-keys secret is present).
    Only runs after human approval from the human-gate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-run-id
      type: string
    - name: require-image-signing
      type: string
      default: "false"
  workspaces:
    - name: image-tar
    - name: registry-credentials
  results:
    - name: IMAGE_TAG
    - name: IMAGE_DIGEST
    - name: IMAGE_FULL_URL
  volumes:
    - name: cosign-keys
      secret:
        secretName: cosign-keys
        optional: true
  steps:
    - name: check-signing-requirements
      image: k8secops/k8secops:alpine-3.20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: cosign-keys
          mountPath: /cosign-keys
          readOnly: true
      script: |
        #!/bin/sh
        if [ "$(params.require-image-signing)" = "true" ] && [ ! -f /cosign-keys/cosign.key ]; then
          echo "Image signing is required for this app, but the cosign-keys secret is missing â€” refusing to push an unsigned image."
          exit 1
        fi

    - name: push
      image: k8secops/k8secops:skopeo-v1.16.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        TAR="$(workspaces.image-tar.path)/image.tar"
        CREDS_DIR="$(workspaces.registry-credentials.path)"

        # Normalise Docker Hub registry: any *.docker.com / *.docker.io â†’ index.docker.io
        REGISTRY="$(params.image-registry)"
        case "$REGISTRY" in
          *hub.docker.com*|*docker.io*|*registry-1.docker.io*) REGISTRY="index.docker.io" ;;
        esac
        FULL_REF="$REGISTRY/$(params.image-name):$(params.image-tag)"

        # Normalise config.json auth keys to match target registry
        TEMP_AUTH=/tmp/config.json
        sed "s|registry.hub.docker.com|index.docker.io|g; s|registry-1.docker.io|index.docker.io|g" \
          "$CREDS_DIR/config.json" > "$TEMP_AUTH" 2>/dev/null || cp "$CREDS_DIR/config.json" "$TEMP_AUTH"

        echo "Pushing $FULL_REF..."
        skopeo copy \
          --authfile "$TEMP_AUTH" \
          "docker-archive:$TAR" \
          "docker://$FULL_REF"

        DIGEST=$(skopeo inspect --authfile "$TEMP_AUTH" \
          "docker://$FULL_REF" 2>/dev/null | grep -o '"Digest":"[^"]*"' \
          | head -1 | cut -d'"' -f4)
        [ -z "$DIGEST" ] && DIGEST="unknown"

        printf '%s' "$(params.image-tag)" > "$(results.IMAGE_TAG.path)"
        printf '%s' "$DIGEST" > "$(results.IMAGE_DIGEST.path)"
        printf '%s' "$FULL_REF" > "$(results.IMAGE_FULL_URL.path)"
        echo "Pushed: $FULL_REF@$DIGEST"

    - name: notify-pushed
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, pathlib, os

        tag    = open("$(results.IMAGE_TAG.path)").read()
        digest = open("$(results.IMAGE_DIGEST.path)").read()
        url    = open("$(results.IMAGE_FULL_URL.path)").read()
        # imageSigned is always false here; the separate image-sign task
        # (only runs when require-image-signing=true) updates it via a
        # second call to this endpoint after signing completes.
        token  = os.environ.get("OPERATOR_API_TOKEN", "")

        payload = json.dumps({
            "runId": "$(params.pipeline-run-id)",
            "imageTag": tag,
            "imageDigest": digest,
            "imageUrl": url,
            "imageSigned": False,
            "status": "pushed"
        }).encode()

        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"

        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-pushed",
                data=payload,
                headers=headers,
                method="POST"
            )
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image pushed {url}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# â”€â”€ Image Sign (optional â€” only runs when require-image-signing=true) â”€â”€â”€â”€â”€
# This task is separate from image-push so that bitnami/cosign is NEVER
# pulled when signing is disabled. The pipeline uses a Tekton `when`
# condition to skip this task entirely when require-image-signing != true.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-image-sign
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: push
spec:
  description: |
    Signs a previously pushed image with cosign.
    Only executed when require-image-signing=true in the pipeline.
    Requires the cosign-keys Secret in tekton-pipelines namespace.
    After signing, notifies the operator to update imageSigned=true.
  params:
    - name: image-tag
      type: string
    - name: image-digest
      type: string
    - name: image-full-url
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-run-id
      type: string
  workspaces:
    - name: registry-credentials
  volumes:
    - name: cosign-keys
      secret:
        secretName: cosign-keys
        optional: true
  steps:
    - name: cosign-sign
      image: k8secops/k8secops:cosign-2.2.4
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: cosign-keys
          mountPath: /cosign-keys
          readOnly: true
      env:
        - name: DOCKER_CONFIG
          value: "$(workspaces.registry-credentials.path)"
        - name: COSIGN_PASSWORD
          value: ""
      script: |
        #!/bin/sh
        if [ ! -f /cosign-keys/cosign.key ]; then
          echo "cosign-keys secret not present â€” cannot sign (signing was required)"
          exit 1
        fi
        FULL_REF="$(params.image-full-url)"
        DIGEST="$(params.image-digest)"
        echo "Signing $FULL_REF with cosign..."
        if [ -n "$DIGEST" ] && [ "$DIGEST" != "unknown" ]; then
          cosign sign --key /cosign-keys/cosign.key --yes "$FULL_REF@$DIGEST"
        else
          cosign sign --key /cosign-keys/cosign.key --yes "$FULL_REF"
        fi
        echo "Image signed: $FULL_REF"

    - name: notify-signed
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, os
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({
            "runId":        "$(params.pipeline-run-id)",
            "imageTag":     "$(params.image-tag)",
            "imageDigest":  "$(params.image-digest)",
            "imageUrl":     "$(params.image-full-url)",
            "imageSigned":  True,
            "status":       "pushed",
        }).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-pushed",
                data=payload, headers=headers, method="POST"), timeout=10)
            print("Notified operator: image signed")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# â”€â”€ Human Gate â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-human-gate
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: human-gate
spec:
  description: |
    Pauses the pipeline and polls the operator API for human decision.
    The operator exposes the AI report to the browser UI.
    Human clicks YES or NO in the browser.
    YES â†’ pipeline continues to image-push.
    NO  â†’ task fails, pipeline stops.
    Timeout: 24h (human may not be at desk immediately).
  params:
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
  results:
    - name: DECISION
      description: "YES or NO"
  steps:
    - name: wait-for-human
      image: k8secops/k8secops:python-3.12-slim
      timeout: "24h"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, time, sys, os

        # Unbuffered output â€” always visible in Tekton logs immediately
        sys.stdout.reconfigure(line_buffering=True)

        run_id      = "$(params.pipeline-run-id)"
        api_url     = "$(params.operator-api-url)"
        poll_url    = f"{api_url}/api/v1/pipelines/{run_id}/decision"
        ready_url   = f"{api_url}/api/v1/pipelines/{run_id}/gate-ready"
        token       = os.environ.get("OPERATOR_API_TOKEN", "")
        auth_header = {"Authorization": f"Bearer {token}"} if token else {}

        # Tell operator this pipeline is waiting for human â€” retry with backoff
        # so a transient DNS hiccup doesn't silently skip the gate notification.
        for attempt in range(1, 7):
            try:
                req = urllib.request.Request(
                    ready_url, data=b"{}",
                    headers={"Content-Type": "application/json", **auth_header},
                    method="POST")
                urllib.request.urlopen(req, timeout=15)
                print(f"Gate ready (attempt {attempt}) â€” waiting for human decision on run {run_id}")
                print(f"Open the Platform UI to review findings and send for reviewer approval")
                break
            except Exception as e:
                wait = attempt * 10
                print(f"Gate-ready attempt {attempt} failed: {e} â€” retrying in {wait}s")
                if attempt < 6:
                    time.sleep(wait)
                else:
                    print("Gate-ready failed after 6 attempts â€” polling will continue")

        # Poll every 10 seconds for up to 24 hours
        polls = 0
        max_polls = 24 * 60 * 6  # 24h Ã— 60min Ã— 6 polls/min

        while polls < max_polls:
            try:
                poll_req = urllib.request.Request(poll_url, headers=auth_header)
                resp = urllib.request.urlopen(poll_req, timeout=10)
                data = json.loads(resp.read())
                decision = data.get("decision", "").upper()

                if decision == "YES":
                    open("$(results.DECISION.path)", "w").write("YES")
                    print(f"Human decision: YES â€” proceeding with image push")
                    sys.exit(0)

                elif decision == "NO":
                    open("$(results.DECISION.path)", "w").write("NO")
                    print(f"Human decision: NO â€” pipeline stopped")
                    sys.exit(1)

            except Exception as e:
                if polls % 30 == 0:  # Log every 5 min
                    print(f"Still waiting for human decision... ({polls * 10 // 60} min elapsed)")
            time.sleep(10)
            polls += 1

        print("Human gate timed out after 24h â€” stopping pipeline")
        open("$(results.DECISION.path)", "w").write("TIMEOUT")
        sys.exit(1)

---
