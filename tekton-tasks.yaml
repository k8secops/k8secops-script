---
# "" Image Push (only after human YES) """"""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-image-push
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: push
spec:
  description: |
    Pushes the locally built image tar to the registry, then signs the
    pushed image with cosign (if a cosign-keys secret is present).
    Only runs after human approval from the human-gate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-run-id
      type: string
    - name: require-image-signing
      type: string
      default: "false"
  workspaces:
    - name: image-tar
    - name: registry-credentials
  results:
    - name: IMAGE_TAG
    - name: IMAGE_DIGEST
    - name: IMAGE_FULL_URL
  volumes:
    - name: cosign-keys
      secret:
        secretName: cosign-keys
        optional: true
  steps:
    - name: check-signing-requirements
      image: k8secops/k8secops:alpine-3.20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: cosign-keys
          mountPath: /cosign-keys
          readOnly: true
      script: |
        #!/bin/sh
        if [ "$(params.require-image-signing)" = "true" ] && [ ! -f /cosign-keys/cosign.key ]; then
          echo "Image signing is required for this app, but the cosign-keys secret is missing -- refusing to push an unsigned image."
          exit 1
        fi

    - name: push
      image: k8secops/k8secops:skopeo-v1.16.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        TAR="$(workspaces.image-tar.path)/image.tar"
        CREDS_DIR="$(workspaces.registry-credentials.path)"

        # Normalise Docker Hub registry: any *.docker.com / *.docker.io ' index.docker.io
        REGISTRY="$(params.image-registry)"
        case "$REGISTRY" in
          *hub.docker.com*|*docker.io*|*registry-1.docker.io*) REGISTRY="index.docker.io" ;;
        esac
        FULL_REF="$REGISTRY/$(params.image-name):$(params.image-tag)"

        # Normalise config.json auth keys to match target registry
        TEMP_AUTH=/tmp/config.json
        sed "s|registry.hub.docker.com|index.docker.io|g; s|registry-1.docker.io|index.docker.io|g" \
          "$CREDS_DIR/config.json" > "$TEMP_AUTH" 2>/dev/null || cp "$CREDS_DIR/config.json" "$TEMP_AUTH"

        echo "Pushing $FULL_REF..."
        skopeo copy \
          --authfile "$TEMP_AUTH" \
          "docker-archive:$TAR" \
          "docker://$FULL_REF"

        DIGEST=$(skopeo inspect --authfile "$TEMP_AUTH" \
          "docker://$FULL_REF" 2>/dev/null | grep -o '"Digest":"[^"]*"' \
          | head -1 | cut -d'"' -f4)
        [ -z "$DIGEST" ] && DIGEST="unknown"

        printf '%s' "$(params.image-tag)" > "$(results.IMAGE_TAG.path)"
        printf '%s' "$DIGEST" > "$(results.IMAGE_DIGEST.path)"
        printf '%s' "$FULL_REF" > "$(results.IMAGE_FULL_URL.path)"
        echo "Pushed: $FULL_REF@$DIGEST"

    - name: notify-pushed
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, pathlib, os

        tag    = open("$(results.IMAGE_TAG.path)").read()
        digest = open("$(results.IMAGE_DIGEST.path)").read()
        url    = open("$(results.IMAGE_FULL_URL.path)").read()
        # imageSigned is always false here; the separate image-sign task
        # (only runs when require-image-signing=true) updates it via a
        # second call to this endpoint after signing completes.
        token  = os.environ.get("OPERATOR_API_TOKEN", "")

        payload = json.dumps({
            "runId": "$(params.pipeline-run-id)",
            "imageTag": tag,
            "imageDigest": digest,
            "imageUrl": url,
            "imageSigned": False,
            "status": "pushed"
        }).encode()

        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"

        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-pushed",
                data=payload,
                headers=headers,
                method="POST"
            )
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image pushed {url}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")


