---
# Hadolint -- Dockerfile lint -- own pod, onError:continue in the pipeline.
# Runs in parallel with the Kaniko build after pre-build passes so findings
# land in scan-results without adding to the critical path.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-hadolint
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: build
spec:
  params:
    - name: dockerfile-path
      default: "./Dockerfile"
  workspaces:
    - name: source
    - name: results
  steps:
    - name: hadolint
      image: k8secops/k8secops:hadolint-v2.12.0-debian
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/dockerfile-lint
        DF_REL=$(echo "$(params.dockerfile-path)" | sed 's|^\./||')
        DF="$(workspaces.source.path)/$DF_REL"
        OUT="$(workspaces.results.path)/dockerfile-lint/hadolint.json"
        echo "Hadolint: $DF"
        hadolint "$DF" -f json > "$OUT" 2>/dev/null || true
        COUNT=$(grep -o '"code"' "$OUT" 2>/dev/null | wc -l | tr -d ' ')
        echo "Findings: ${COUNT:-0}  ->  dockerfile-lint/hadolint.json"


