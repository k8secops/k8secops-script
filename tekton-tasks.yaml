apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-go
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Go compile -- go build ./... Validates compilation before image build."
  params:
    - name: build-tool
      default: "go"
    - name: build-version
      default: "1.22"
    - name: build-file
      default: "go.mod"
  workspaces:
    - name: source
  steps:
    - name: compile
      image: k8secops/k8secops:golang-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        # uid 1000 has no /etc/passwd entry. The golang image sets GOPATH=/go
        # which is root-owned -- go mod download fails writing to /go/pkg/mod.
        # Override GOPATH and GOCACHE to the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GOPATH
          value: "$(workspaces.source.path)/.gopath"
        - name: GOCACHE
          value: "$(workspaces.source.path)/.gopath/cache"
        - name: GOMODCACHE
          value: "$(workspaces.source.path)/.gopath/pkg/mod"
      script: |
        #!/bin/sh
        set -e
        echo """ Go compile: version=$(params.build-version) """

        mkdir -p "$GOPATH/pkg/mod" "$GOCACHE"

        go mod download
        go build ./...
        echo """ Go compile complete """

# Source: platform/tekton/tasks/build/compile-java-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-java
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Java compile -- Maven or Gradle (wrapper-aware). Produces JARs/WARs for image build and tests."
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
    - name: maven-cache
      optional: true
      description: "Persistent Maven local repository cache (~/.m2). Shared across runs to avoid re-downloading dependencies."
  steps:
    - name: compile
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      env:
        # uid 1000 has no /etc/passwd entry -- Maven writes local repo to
        # $HOME/.m2/repository and Gradle writes cache to $HOME/.gradle.
        # Redirect both into the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GRADLE_USER_HOME
          value: "$(workspaces.source.path)/.gradle"
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo """ Java compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        mkdir -p "$HOME/.m2" "$GRADLE_USER_HOME"

        # Use persistent cache PVC if mounted, otherwise fall back to source workspace
        if [ "$(workspaces.maven-cache.bound)" = "true" ]; then
          MVN_REPO="$(workspaces.maven-cache.path)/repository"
          mkdir -p "$MVN_REPO"
        else
          MVN_REPO="$(workspaces.source.path)/.m2/repository"
        fi
        MVN_FLAGS="-Dmaven.repo.local=$MVN_REPO -DskipTests -B"

        case "$BUILD_TOOL" in
          maven)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            # Prefer Maven Wrapper if the project ships one
            MVN="mvn"
            [ -x "./mvnw" ] && MVN="./mvnw" && echo "  (using Maven Wrapper)"
            $MVN package $MVN_FLAGS $EXTRA
            echo """ Artifacts """
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          gradle)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            # Prefer Gradle Wrapper if the project ships one
            GRADLE="gradle"
            [ -x "./gradlew" ] && GRADLE="./gradlew" && echo "  (using Gradle Wrapper)"
            $GRADLE assemble $EXTRA
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          *)
            echo "Unknown Java build-tool=$BUILD_TOOL"; exit 1 ;;
        esac
        echo """ Java compile complete """

# Source: platform/tekton/tasks/build/compile-nodejs-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-nodejs
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Node.js compile -- install deps + npm run build (if build script exists)."
  params:
    - name: build-tool
      default: "npm"
    - name: build-version
      default: "20"
    - name: build-file
      default: "package.json"
  workspaces:
    - name: source
  steps:
    - name: compile
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        # uid 1000 has no /etc/passwd entry so $HOME is empty -- npm, yarn,
        # and corepack all write cache/config to $HOME and fail without it.
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: npm_config_cache
          value: "$(workspaces.source.path)/.compile-home/.npm"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        echo """ Node.js compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        mkdir -p "$HOME"

        case "$BUILD_TOOL" in
          npm)
            npm install --silent
            npm run build --if-present
            ;;
          yarn)
            yarn install --frozen-lockfile --silent
            yarn build 2>/dev/null || true
            ;;
          pnpm)
            corepack enable && pnpm install --frozen-lockfile --silent
            pnpm run build --if-present 2>/dev/null || true
            ;;
          *)
            npm install --silent
            npm run build --if-present
            ;;
        esac
        echo """ Node.js compile complete """

# Source: platform/tekton/tasks/build/compile-python-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-python
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Python compile -- install dependencies and validate syntax (py_compile). Python is interpreted so no binary artifact is produced."
  params:
    - name: build-tool
      default: "pip"
    - name: build-version
      default: "3.12"
    - name: build-file
      default: "requirements.txt"
  workspaces:
    - name: source
  steps:
    - name: compile
      image: k8secops/k8secops:python-$(params.build-version)-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # pip install --user has nowhere writable to land. Point HOME
        # to the source workspace so --user installs land in .compile-home/.local
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo """ Python compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        mkdir -p "$HOME"

        # Always upgrade pip first -- avoids version notice noise and ensures
        # consistent behaviour across base images that ship older pip versions
        pip install --upgrade pip --quiet --user --break-system-packages 2>/dev/null || true

        # Install dependencies
        if [ -f "$BUILD_FILE" ] && [ "$BUILD_TOOL" = "pip" ]; then
          pip install -r "$BUILD_FILE" --quiet --user --break-system-packages
        elif [ "$BUILD_TOOL" = "poetry" ]; then
          pip install poetry --quiet --user --break-system-packages
          poetry install --no-interaction --quiet
        elif [ "$BUILD_TOOL" = "pdm" ]; then
          pip install pdm --quiet --user --break-system-packages
          pdm install --no-self 2>/dev/null || pdm install
        elif [ "$BUILD_TOOL" = "pipenv" ]; then
          pip install pipenv --quiet --user --break-system-packages
          pipenv install --deploy --system --quiet
        elif [ "$BUILD_TOOL" = "uv" ]; then
          pip install uv --quiet --user --break-system-packages
          uv pip install -r "${BUILD_FILE:-requirements.txt}" --system 2>/dev/null || \
            uv pip install -r "${BUILD_FILE:-requirements.txt}"
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt --quiet --user --break-system-packages \
            --no-warn-script-location
        fi

        # Syntax validation -- catches import errors and syntax mistakes early.
        # PYTHONDONTWRITEBYTECODE=1 suppresses __pycache__ creation so the
        # task does not fail on permission-denied errors in read-only dirs.
        echo """ Syntax check """
        find . -name "*.py" \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          -not -path "./*venv*/*" \
          -not -path "./.compile-home/*" \
          -not -path "./__pycache__/*" \
          | PYTHONDONTWRITEBYTECODE=1 xargs python -m py_compile 2>&1 \
          && echo "All .py files syntax-valid"

        echo """ Python compile complete """

