---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-python
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: compile
spec:
  description: >
    Python compile -- install dependencies into a copyable ./vendor
    virtualenv and validate syntax (py_compile). Python is interpreted, so
    "the artifact" is the populated virtualenv itself, which the Dockerfile
    COPYs in rather than re-running the install (see verify-artifacts).
  params:
    - name: build-tool
      default: "pip"
    - name: build-version
      default: "3.12"
    - name: build-file
      default: "requirements.txt"
    - name: build-context
      default: "."
    - name: extra-creds-manifest
      default: "[]"
      description: "JSON list of [{name, matchId}] for app-declared build-artifact-repo credentials (extra credentials feature). Empty for apps that haven't configured any."
  workspaces:
    - name: source
    - name: extra-build-creds
      optional: true
      description: "Consolidated Secret of {name}-username/{name}-token keys for this app's declared build-artifact-repo credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=both (plus legacy external-service rows), available at both compile and test time. Absent for apps with none."
    - name: extra-generic-build-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared secret-manager credentials with section=build (compile-only, never visible to the test stage). Absent for apps with none."
  steps:
    # Generic, identical script for every Python app -- writes PIP_EXTRA_INDEX_URL
    # exports (pip's own documented convention for a private package index)
    # to a file the compile step sources. No-op when extra-creds-manifest is
    # "[]" (every app that hasn't configured an extra credential).
    - name: materialize-build-creds
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/usr/bin/env python3
        import json, os, pathlib

        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            urls = []
            for cred in manifest:
                name, host = cred["name"], cred["matchId"]
                user = (creds_dir / f"{name}-username").read_text().strip()
                token = (creds_dir / f"{name}-token").read_text().strip()
                urls.append(f"https://{user}:{token}@{host}/simple/")
            env_file = home / ".pip-extra-creds.env"
            env_file.write_text(f"export PIP_EXTRA_INDEX_URL='{' '.join(urls)}'\n")
            print(f"Wrote {len(manifest)} pip private-index credential(s) to {env_file}")

        # Generic, identical for every language: export this app's declared
        # external-service credentials (DB/Redis/Kafka/curl-scp-wget targets
        # etc.) as a sourceable env file the compile step reads before
        # invoking the build tool. No-op when the workspace isn't bound or no
        # external-service credentials declared.
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time instead of embedding the value as
        # literal text into the generated export line -- the value never
        # passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-character content
        # (quotes, $(...), newlines) can never break or inject into the line.
        svc_lines: list[str] = []
        # NOTE: each $(workspaces.<name>.path) must appear literally here --
        # Tekton substitutes these as plain text before the script runs, so
        # it cannot resolve one built from a Python loop variable.
        # An unbound optional workspace substitutes to an EMPTY STRING --
        # pathlib.Path("") resolves to ".", the step's own cwd, which
        # always exists, so is_dir() alone never skips an unbound
        # workspace. Check the raw substitution for emptiness first.
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:python-$(params.build-version)-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty -- point it at
        # the source workspace for pip's own cache/config discovery.
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo """ Python compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        mkdir -p "$HOME"
        [ -f "$HOME/.pip-extra-creds.env" ] && . "$HOME/.pip-extra-creds.env"
        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        # Trust a customer's private artifact-repo CA, if declared (secret-manager
        # credential named CUSTOM_CA_CERT, Stage=Build, Secure file -- see
        # extra_credentials.html). Both env vars are natively read by pip/requests,
        # no file copy or system trust-store mutation needed.
        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          export REQUESTS_CA_BUNDLE="$CUSTOM_CA_CERT_FILE"
          export PIP_CERT="$CUSTOM_CA_CERT_FILE"
          echo "Trusting custom CA for private package index: $CUSTOM_CA_CERT_FILE"
        fi

        # Always upgrade pip first -- avoids version notice noise and ensures
        # consistent behaviour across base images that ship older pip versions
        pip install --upgrade pip --quiet --user --break-system-packages 2>/dev/null || true

        # Final, copyable artifact: a real virtualenv at ./vendor, populated
        # by whichever tool the app uses. The Dockerfile COPYs this directory
        # in and puts its bin/ on PATH -- console-script entry points
        # (uvicorn, gunicorn, flask, etc.) keep working, unlike a bare
        # PYTHONPATH-only package dump.
        python -m venv ./vendor
        . ./vendor/bin/activate

        # Each build tool's actual install logic lives in its own small,
        # focused script under scripts/python/ -- open exactly the one you
        # need to change, nothing else.
        case "$BUILD_TOOL" in
          poetry)
            pip install poetry --quiet
            poetry install --no-interaction --quiet
            ;;
          pdm)
            pip install pdm --quiet
            pdm install --no-self 2>/dev/null || pdm install
            ;;
          pipenv)
            pip install pipenv --quiet
            PIPENV_VENV_IN_PROJECT=0 pipenv install --deploy --quiet
            ;;
          uv)
            pip install uv --quiet
            uv pip install -r "${BUILD_FILE:-requirements.txt}"
            ;;
          *)
            # Also the fallback for any unrecognized/unset build-tool value -- same
            # behavior the original inline chain had.
            if [ -f "$BUILD_FILE" ]; then
              pip install -r "$BUILD_FILE" --quiet
            elif [ -f "requirements.txt" ]; then
              pip install -r requirements.txt --quiet --no-warn-script-location
            fi
            ;;
        esac
        deactivate

        # Syntax validation -- catches import errors and syntax mistakes early.
        # PYTHONPYCACHEPREFIX redirects bytecode writes to /tmp so py_compile
        # never tries to create __pycache__ dirs in the (possibly read-only) source tree.
        echo """ Syntax check """
        mkdir -p /tmp/pycache
        find . -name "*.py" \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          -not -path "./vendor/*" \
          -not -path "./.compile-home/*" \
          -not -path "*/__pycache__/*" \
          -not -path "*/__pycache__" \
          | PYTHONPYCACHEPREFIX=/tmp/pycache xargs python -m py_compile 2>&1 \
          && echo "All .py files syntax-valid"

        echo """ Python compile complete -- vendor/ ready for Dockerfile COPY """

