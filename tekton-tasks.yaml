﻿---
# â”€â”€ OWASP Dependency-Check â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sca-owasp
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sca
spec:
  description: "OWASP Dependency-Check. Apache 2.0. No token."
  params:
    - name: language
      type: string
  workspaces:
    - name: source
    - name: results
  results:
    - name: VULN_COUNT
  steps:
    - name: dep-check
      image: k8secops/k8secops:owasp-dependency-check-10.0.4
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "300m", memory: "1Gi"}
        limits:   {cpu: "1000m", memory: "3Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sca

        # OWASP Dep-Check requires its NVD database to be pre-seeded.
        # --noupdate: use existing database if present; skip cleanly if absent.
        # --scanDuration: hard wall-clock cap of 4 minutes so this task never
        #   blows the 10-minute pipeline target.  OSV-Scanner covers the gap.
        timeout 240 \
          /usr/share/dependency-check/bin/dependency-check.sh \
            --scan . \
            --format JSON \
            --format SARIF \
            --out $(workspaces.results.path)/sca \
            --project "$(params.language)-scan" \
            --noupdate \
            --disableYarnAudit \
            --disableNodeAudit \
          2>&1 | tail -5 \
        || echo "OWASP: scan skipped (database absent or timeout) â€” OSV-Scanner covers dependency CVEs"

        COUNT=$(python3 -c "
        import json, glob
        for f in glob.glob('$(workspaces.results.path)/sca/*.json'):
            try:
                d=json.load(open(f))
                vulns=[v for dep in d.get('dependencies',[])
                       for v in dep.get('vulnerabilities',[])]
                print(len(vulns))
                break
            except: pass
        else: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.VULN_COUNT.path)
        echo "OWASP Dep-Check: $COUNT vulnerabilities"
        REPORT="$(workspaces.results.path)/sca/dependency-check-report.json"
        if [ -f "$REPORT" ]; then
          SIZE=$(du -sh "$REPORT" 2>/dev/null | cut -f1 || echo "?")
          echo "Report: sca/dependency-check-report.json  ($SIZE, $COUNT vulns)"
        else
          echo "Report: none (database not available â€” re-run with NVD database seeded)"
        fi
        exit 0

---
# â”€â”€ OSV-Scanner (Google) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sca-osv
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sca
spec:
  description: "OSV-Scanner by Google. Apache 2.0. No token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: VULN_COUNT
  steps:
    - name: osv-scan
      image: k8secops/k8secops:osv-scanner-v1.8.5
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sca
        osv-scanner \
          --recursive \
          --format sarif \
          --output $(workspaces.results.path)/sca/osv.sarif \
          . 2>/dev/null || true
        osv-scanner \
          --recursive \
          --format json \
          --output $(workspaces.results.path)/sca/osv.json \
          . 2>/dev/null || true

        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sca/osv.json'))
            print(sum(len(r.get('vulnerabilities',[])) for r in d.get('results',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.VULN_COUNT.path)
        echo "OSV-Scanner: $COUNT vulnerabilities"
        SIZE=$(du -sh $(workspaces.results.path)/sca/osv.json 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sca/osv.json  ($SIZE, $COUNT vulns)  |  sca/osv.sarif"

