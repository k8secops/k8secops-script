---
# "" Rust Unit Tests """""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-rust
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: rust
spec:
  params:
    - name: build-version
      default: "1.81"
    - name: build-context
      default: "."
    - name: build-file
      default: "Cargo.toml"
    - name: coverage-threshold
      default: "80"
    - name: test-pattern
      default: "./..."
      description: "Optional 'cargo test <filter>' substring. The shared default './...' is Go's convention, not Rust's -- treated as 'no filter' below."
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
    - name: extra-test-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} for this app's declared test-env-var credentials. Absent for apps with none."
    - name: extra-service-creds
      optional: true
      description: "Consolidated Secret of {envVarName: value} pairs for this app's declared external-service credentials (DB/Redis/Kafka/curl-scp-wget targets etc.), shared with the compile task. Absent for apps with none."
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
    - name: TESTS_EXECUTED
      description: "'true' if a test runner actually produced a report, 'false' if the runner itself never ran (broken install, no test binary, etc.) -- distinguishes that from a genuine zero-test project."
  steps:
    - name: export-extra-env
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        ENVFILE="$(workspaces.results.path)/.extra-env"
        : > "$ENVFILE"
        if [ "$(workspaces.extra-test-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-test-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi
        if [ "$(workspaces.extra-service-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-service-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi

    - name: test
      image: k8secops/k8secops:rust-$(params.build-version)-slim
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "$(workspaces.results.path)/.rust-home"
      script: |
        #!/bin/sh
        [ -f "$(workspaces.results.path)/.extra-env" ] && . "$(workspaces.results.path)/.extra-env"
        mkdir -p "$HOME/.cargo"
        export CARGO_HOME="$HOME/.cargo"
        mkdir -p $(workspaces.results.path)/tests

        # Same repo-root-relative -> build-context-relative fix as compile-rust-task.yaml.
        BUILD_FILE="$(params.build-file)"
        BUILD_CONTEXT="$(params.build-context)"
        case "$BUILD_CONTEXT" in
          .|"") : ;;
          *) BUILD_FILE="${BUILD_FILE#"$BUILD_CONTEXT"/}" ;;
        esac

        # test-pattern's shared Pipeline-level default ("./...") is Go's
        # convention and means nothing to cargo -- treat it (and an empty
        # value) as "run everything", otherwise pass it through as cargo's
        # own substring test filter.
        FILTER="$(params.test-pattern)"
        if [ "$FILTER" = "./..." ] || [ -z "$FILTER" ]; then
          cargo test --release --manifest-path "$BUILD_FILE" 2>&1 | tee $(workspaces.results.path)/tests/output.txt || true
        else
          cargo test --release --manifest-path "$BUILD_FILE" -- "$FILTER" 2>&1 | tee $(workspaces.results.path)/tests/output.txt || true
        fi

        # cargo has no built-in JUnit output and no non-root-container-safe
        # coverage tool (cargo-tarpaulin/grcov need ptrace or nightly
        # instrumentation, unreliable under a restricted PSA pod) -- parse
        # pass/fail counts from cargo test's own "test result: ok. N passed;
        # M failed; ..." summary lines instead (one per test binary; a crate
        # with multiple integration-test binaries prints several).
        PASSED=$(grep -oE 'test result: [a-zA-Z]+\. [0-9]+ passed' $(workspaces.results.path)/tests/output.txt \
                   | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' \
                   | awk '{s+=$1} END {print s+0}')
        FAILED=$(grep -oE '[0-9]+ failed' $(workspaces.results.path)/tests/output.txt \
                   | grep -oE '[0-9]+' | awk '{s+=$1} END {print s+0}')

        # At least one "test result: ..." line means cargo actually ran a
        # test binary to completion -- distinguishes a genuine zero-test
        # crate from cargo failing before it ever got that far (a compile
        # error, for instance, produces 0/0 here too but with no such line).
        if grep -q 'test result:' $(workspaces.results.path)/tests/output.txt 2>/dev/null; then
          EXECUTED=true
        else
          EXECUTED=false
        fi

        echo -n "$PASSED" > $(results.TESTS_PASSED.path)
        echo -n "$FAILED" > $(results.TESTS_FAILED.path)
        # Coverage isn't collected for Rust (see comment above) -- 0.0 is
        # reported with threshold overridden to 0 in check-and-notify below
        # so this reads as "not measured", not "0% covered".
        echo -n "0.0" > $(results.COVERAGE_PCT.path)
        echo -n "$EXECUTED" > $(results.TESTS_EXECUTED.path)
        echo "Rust tests: $PASSED passed, $FAILED failed (coverage not collected), executed=$EXECUTED"

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import json, urllib.request, os
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        executed  = open("$(results.TESTS_EXECUTED.path)").read().strip() == "true"
        # threshold forced to 0 (not $(params.coverage-threshold)) -- coverage
        # is never measured for Rust, so a nonzero threshold would show every
        # run as "below threshold" regardless of actual test health.
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": 0.0,
            "threshold": 0, "passed": executed and failed == 0,
            "testsPassed": passed, "testsFailed": failed, "testsExecuted": executed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        # Never fail the Tekton task/pipeline on test results -- the human
        # gate is where a developer/reviewer decides what to do with failures.
        if not executed:
            print("WARNING: cargo test did not produce a result -- treat as unverified, not as a clean 0-test result. Check the test step's logs above.")
        elif failed > 0:
            print(f"NOTE: {failed} test(s) failed -- proceeding; visible at the human gate for review")
        else:
            print(f"PASS: {passed} tests")

