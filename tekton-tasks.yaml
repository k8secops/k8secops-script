# â”€â”€ Unit Tests dispatcher (operator patches per language) â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-unit-tests
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/role: dispatcher
spec:
  description: "Dispatcher â€” operator patches taskRef to language-specific task."
  params:
    - name: language
      type: string
    - name: build-tool
      type: string
    - name: build-version
      type: string
    - name: build-file
      type: string
    - name: coverage-threshold
      default: "80"
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: run
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        # Operator patches this taskRef â€” this is the fallback
        open("$(results.TESTS_PASSED.path)","w").write("0")
        open("$(results.TESTS_FAILED.path)","w").write("0")
        open("$(results.COVERAGE_PCT.path)","w").write("0")
        print("Unit test dispatcher: operator should patch this task")

