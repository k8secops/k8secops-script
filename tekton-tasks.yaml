# Source: platform/tekton/tasks/git/git-clone-task.yaml
---
# git-clone Task -- replaces the deprecated ClusterTask of the same name.
# Tekton v0.54+ removed ClusterTask; this Task must live in tekton-pipelines.
# API surface is kept compatible with the Tekton Hub git-clone 0.9 task so the
# pipeline's taskRef only needs kind: Task (not ClusterTask).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: clone
spec:
  params:
    - name: url
      type: string
      description: Repository URL to clone
    - name: revision
      type: string
      default: main
      description: Branch, tag, or commit SHA to check out
    - name: deleteExisting
      type: string
      default: "true"
      description: Clean workspace before cloning
    - name: depth
      type: string
      default: "1"
      description: Shallow clone depth
    - name: sslVerify
      type: string
      default: "true"
  workspaces:
    - name: output
      description: The workspace where source is cloned
    - name: git-credentials
      optional: true
      description: Secret workspace containing 'url' file with authenticated git URL
  results:
    - name: commit
      description: The exact commit SHA that was cloned
    - name: url
      description: The URL of the repository
    - name: committer-date
      description: Date of the HEAD commit
  steps:
    - name: clone
      image: k8secops/k8secops:git-v2.45.2
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 65532 has no /etc/passwd entry, so $HOME is empty and
        # `git config --global` has nowhere writable to land.
        - name: HOME
          value: "/tmp"
      script: |
        #!/bin/sh
        set -e

        # Every later pipeline task (ai-preflight, scanners, compile, etc.)
        # mounts this same workspace as a DIFFERENT UID -- clone is hardcoded
        # to 65532, compile is mostly 1000. Without this, a later step
        # creating a NEW directory under one clone created (e.g. python's
        # `./vendor` when build-context is a subdirectory, not ".") fails
        # with EACCES, since clone's default umask leaves new directories at
        # 0755 (writable only by their creating UID). A permissive umask here
        # makes everything clone creates writable by any later UID. fsGroup
        # on the PipelineRun's podTemplate (run_trigger.py) is the "real" fix
        # for clusters with a CSI driver that supports it (EBS/PD/Azure
        # Disk) -- it's a no-op on Kind's hostPath-backed local-path
        # provisioner, which is why this umask is also needed for local dev.
        umask 0000

        if [ "$(params.deleteExisting)" = "true" ]; then
          find $(workspaces.output.path) -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true
        fi

        # the workspace PVC directory is not owned by uid 65532, so git's
        # dubious-ownership check refuses to operate on it unless allow-listed.
        git config --global --add safe.directory "$(workspaces.output.path)"

        if [ "$(params.sslVerify)" = "false" ]; then
          git config --global http.sslVerify false
        fi

        git config --global init.defaultBranch main

        # Use the authenticated URL from the run-scoped credentials Secret when
        # present -- keeps the token out of PipelineRun params and TaskRun specs.
        # Fall back to the plain URL param for backward compatibility.
        CRED_FILE="$(workspaces.git-credentials.path)/url"
        if [ -f "$CRED_FILE" ]; then
          CLONE_URL=$(cat "$CRED_FILE")
        else
          CLONE_URL="$(params.url)"
        fi

        # Try shallow clone of the specific revision first; fall back to
        # cloning default branch then checking out the revision (needed for tags
        # and SHAs that aren't directly fetchable as branches).
        git clone --depth "$(params.depth)" --branch "$(params.revision)" \
          "$CLONE_URL" "$(workspaces.output.path)" 2>/dev/null \
        || ( git clone --depth "$(params.depth)" "$CLONE_URL" \
               "$(workspaces.output.path)" \
             && git -C "$(workspaces.output.path)" fetch --depth "$(params.depth)" \
               origin "$(params.revision)" \
             && git -C "$(workspaces.output.path)" checkout FETCH_HEAD )

        cd "$(workspaces.output.path)"
        RESULT_SHA="$(git rev-parse HEAD)"
        RESULT_DATE="$(git log -1 --date=iso-strict --format=%cd)"

        printf '%s' "$RESULT_SHA"   > "$(results.commit.path)"
        printf '%s' "$(params.url)" > "$(results.url.path)"
        printf '%s' "$RESULT_DATE"  > "$(results.committer-date.path)"

        echo "Cloned $(params.url) @ $(params.revision) -> $RESULT_SHA"

# Source: platform/tekton/tasks/secrets/secrets-scan.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-secrets-scan
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: secrets
spec:
  description: >
    Gitleaks (pattern-based) + TruffleHog (entropy + credential verification).
    Individual tools can be disabled via run-gitleaks / run-trufflehog params.
    At least one tool should be enabled. Findings are written to scan-results
    and passed to AI analysis. The task never hard-fails on detections.
  params:
    - name: run-gitleaks
      type: string
      default: "true"
      description: "Set to 'false' to skip Gitleaks"
    - name: run-trufflehog
      type: string
      default: "true"
      description: "Set to 'false' to skip TruffleHog"
  workspaces:
    - name: source
    - name: results
  results:
    - name: LEAK_COUNT
      type: string
    - name: VERIFIED_COUNT
      type: string
  steps:
    # "" Gitleaks """""""""""""""""""""""""""""""""""""""""""""""""""""""""""""
    # Pattern-based scanning -- catches secrets by regex across entire history.
    # --exit-code 0: findings surface in AI report, not a hard pipeline failure.
    - name: gitleaks
      image: k8secops/k8secops:gitleaks-v8.18.4
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.results.path)/secrets

        if [ "$(params.run-gitleaks)" != "true" ]; then
          echo "Gitleaks: disabled for this app -- skipping"
          echo -n "0" > $(results.LEAK_COUNT.path)
          exit 0
        fi

        gitleaks detect \
          --source . \
          --report-format sarif \
          --report-path $(workspaces.results.path)/secrets/gitleaks.sarif \
          --exit-code 0 \
          --no-git 2>/dev/null || true

        COUNT=$(python3 -c "
        import json
        try:
            d = json.load(open('$(workspaces.results.path)/secrets/gitleaks.sarif'))
            print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
        except: print(0)
        " 2>/dev/null || echo "0")

        echo -n "$COUNT" > $(results.LEAK_COUNT.path)
        echo "Gitleaks: $COUNT potential secret(s) found"
        if [ "$COUNT" -gt "0" ]; then
          echo "WARNING: detected patterns -- review AI report at human gate"
        fi

    # "" TruffleHog """""""""""""""""""""""""""""""""""""""""""""""""""""""""""
    # Entropy analysis + live credential verification. Only verified=true
    # findings (proven real credentials) are counted in VERIFIED_COUNT.
    - name: trufflehog
      image: k8secops/k8secops:trufflehog-3.95.5
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 65532 has no /etc/passwd entry -- set HOME so git works internally
        - name: HOME
          value: "$(workspaces.results.path)"
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.results.path)/secrets

        if [ "$(params.run-trufflehog)" != "true" ]; then
          echo "TruffleHog: disabled for this app -- skipping"
          echo -n "0" > $(results.VERIFIED_COUNT.path)
          exit 0
        fi

        printf '%s\n' '\.lock$' 'node_modules/' 'vendor/' '\.git/' \
          > $(workspaces.results.path)/secrets/trufflehog-exclude.txt

        trufflehog filesystem . \
          --json \
          --no-update \
          --exclude-paths=$(workspaces.results.path)/secrets/trufflehog-exclude.txt \
          > $(workspaces.results.path)/secrets/trufflehog.json 2>/dev/null || true

        VERIFIED=$(python3 -c "
        import json
        count = 0
        try:
            for line in open('$(workspaces.results.path)/secrets/trufflehog.json'):
                try:
                    if json.loads(line).get('Verified', False):
                        count += 1
                except: pass
        except: pass
        print(count)
        " 2>/dev/null || echo "0")

        echo -n "$VERIFIED" > $(results.VERIFIED_COUNT.path)
        echo "TruffleHog: $VERIFIED verified (live) secret(s)"
        if [ "$VERIFIED" -gt "0" ]; then
          echo "CRITICAL: $VERIFIED verified credential(s) found -- rotate immediately"
        fi

# Source: platform/tekton/tasks/sast/bandit-task.yaml
---
# "" Bandit (Python) """""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-bandit
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
    gitops-platform.io/language: python
spec:
  params:
    - name: build-version
      default: "3.12"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: bandit
      image: k8secops/k8secops:python-3.12-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `pip install --user` has nowhere writable to land.
        - name: HOME
          value: "$(workspaces.results.path)/.bandit-home"
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        pip install --quiet --user bandit[sarif] --break-system-packages
        mkdir -p $(workspaces.results.path)/sast
        python3 -m bandit -r . -f sarif -o $(workspaces.results.path)/sast/bandit.sarif \
          -l MEDIUM -i MEDIUM \
          --exclude .git,node_modules,vendor --exit-zero 2>/dev/null || true
        python3 -m bandit -r . -f json -o $(workspaces.results.path)/sast/bandit.json \
          -l MEDIUM -i MEDIUM \
          --exclude .git,node_modules,vendor --exit-zero 2>/dev/null || true
        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sast/bandit.json'))
            print(len(d.get('results',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Bandit: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/bandit.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/bandit.sarif  ($SIZE, $COUNT findings)"


# Source: platform/tekton/tasks/sast/bearer-task.yaml
---
# "" Bearer """"""""""""""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-bearer
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "Bearer SAST -- security + privacy, Apache 2.0, no token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: scan
      image: k8secops/k8secops:bearer-v1.44.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "300m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sast
        bearer scan . \
          --format sarif \
          --output $(workspaces.results.path)/sast/bearer.sarif \
          --severity critical,high,medium \
          --quiet 2>/dev/null || true
        bearer scan . \
          --format json \
          --output $(workspaces.results.path)/sast/bearer.json \
          --severity critical,high,medium \
          --quiet 2>/dev/null || true
        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sast/bearer.sarif'))
            print(sum(len(r.get('results',[])) for r in d.get('runs',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        echo "Bearer: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/bearer.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/bearer.sarif  ($SIZE, $COUNT findings)"


# Source: platform/tekton/tasks/sast/checkov-task.yaml
---
# "" Checkov -- IaC security scanner """"""""""""""""""""""""
# Scans Dockerfiles and Kubernetes manifests for misconfigurations,
# hardcoded secrets, insecure defaults, and CIS benchmark violations.
# Required for banking/regulated workloads before production deployment.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-checkov
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "Checkov security scanner -- parameterised by framework. Apache 2.0. No token."
  params:
    - name: frameworks
      type: string
      default: "dockerfile"
      description: "Comma-separated Checkov frameworks to scan (e.g. dockerfile  or  terraform,kubernetes,helm)"
    - name: output-name
      type: string
      default: "checkov-dockerfile"
      description: "Output SARIF filename stem -- must be unique per pipeline task invocation"
  workspaces:
    - name: source
    - name: results
  results:
    - name: FINDING_COUNT
  steps:
    - name: scan
      image: k8secops/k8secops:checkov-3.2.0
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "256Mi"}
        limits:   {cpu: "500m", memory: "1Gi"}
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/iac
        OUT="$(workspaces.results.path)/iac/$(params.output-name).sarif"

        echo "-- Checkov scan --"
        echo "  Frameworks: $(params.frameworks)"
        echo "  Directory : $(workspaces.source.path)"
        echo "  Output    : $OUT"
        echo ""

        checkov \
          --directory . \
          --framework $(params.frameworks) \
          --output sarif \
          --output-file-path $(workspaces.results.path)/iac \
          --soft-fail \
          --skip-path '.*/\.terraform/.*' \
          --skip-path '.*/\.terragrunt-cache/.*' \
          2>/dev/null || true

        # Checkov writes results.sarif -- rename to the configured output name
        if [ -f "$(workspaces.results.path)/iac/results.sarif" ]; then
          mv "$(workspaces.results.path)/iac/results.sarif" "$OUT"
        else
          printf '{"version":"2.1.0","runs":[]}' > "$OUT"
        fi

        COUNT=$(python3 -c "
        import json
        try:
            d = json.load(open('$OUT'))
            print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
        except Exception:
            print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.FINDING_COUNT.path)
        SIZE=$(du -sh "$OUT" 2>/dev/null | cut -f1 || echo "0B")
        echo "Checkov findings: $COUNT  ($SIZE)"
        echo "Report: iac/$(params.output-name).sarif"

