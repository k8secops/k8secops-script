apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-ai-analyze-sast
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: ai-analysis
spec:
  description: |
    Focuses exclusively on SAST findings (Semgrep, Bearer, Checkov, and the
    language-specific tool). Calls AI with a focused prompt and writes
    sast.json to the ai-results workspace.
  params:
    - name: language
      type: string
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
  workspaces:
    - name: scan-results
    - name: ai-results
    - name: ai-credentials
  steps:
    - name: analyse
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "100m", memory: "128Mi"}
        limits:   {cpu: "300m", memory: "256Mi"}
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import json, os, re, pathlib, time, urllib.request, urllib.error, urllib.parse

        def _sanitize(s):
            return "".join(c for c in (s or "").strip() if c.isprintable() and c not in "\r\n\t\x00")

        AI_PROVIDER = AI_API_KEY = AI_MODEL = ""
        try:
            _creds = pathlib.Path("$(workspaces.ai-credentials.path)")
            AI_PROVIDER = _sanitize((_creds / "aiProvider").read_text())
            AI_API_KEY  = _sanitize((_creds / "aiApiKey").read_text())
            _mf = _creds / "aiModel"
            AI_MODEL = _sanitize(_mf.read_text()) if _mf.exists() else ""
            if not AI_MODEL:
                AI_MODEL = {
                    "anthropic": "claude-haiku-4-5-20251001",
                    "openai":    "gpt-4o-mini",
                    "gemini":    "gemini-2.0-flash",
                }.get(AI_PROVIDER, "")
        except Exception as e:
            print(f"Credentials: {e}")

        SCAN_DIR = pathlib.Path("$(workspaces.scan-results.path)")
        OUT_DIR  = pathlib.Path("$(workspaces.ai-results.path)")
        OUT_DIR.mkdir(parents=True, exist_ok=True)
        LANGUAGE = "$(params.language)"

        # â”€â”€ Parse all SAST SARIF files â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        findings = []
        sast_dir = SCAN_DIR / "sast"
        ran = False

        def parse_sarif(path, tool):
            try:
                d = json.loads(path.read_text())
                for run in d.get("runs", []):
                    rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
                    for result in run.get("results", []):
                        rid  = result.get("ruleId", "?")
                        rule = rules.get(rid, {})
                        locs = result.get("locations", [])
                        loc  = ""
                        if locs:
                            pl  = locs[0].get("physicalLocation", {})
                            uri = pl.get("artifactLocation", {}).get("uri", "?")
                            ln  = pl.get("region", {}).get("startLine", "")
                            loc = f"{uri}:{ln}" if ln else uri
                        sev = {"error":"HIGH","warning":"MEDIUM","note":"LOW","none":"INFO"}.get(
                            result.get("level","warning").lower(), "MEDIUM").upper()
                        findings.append({"tool": tool, "severity": sev,
                            "title": rule.get("shortDescription", {}).get("text", rid)[:120],
                            "location": loc, "cve": "", "fix_version": ""})
            except Exception as e:
                print(f"SARIF parse {path}: {e}")

        for sarif_path in sast_dir.glob("*.sarif") if sast_dir.exists() else []:
            parse_sarif(sarif_path, sarif_path.stem)
            ran = True

        # Checkov (IaC) is in scan-results root level
        for sarif_path in SCAN_DIR.glob("*.sarif"):
            parse_sarif(sarif_path, sarif_path.stem)
            ran = True

        # SpotBugs XML (Java) â€” map priority attribute to severity
        # priority 1=highest risk, 5=lowest (SpotBugs convention)
        spotbugs_xml = sast_dir / "spotbugs.xml"
        if spotbugs_xml.exists():
            ran = True
            try:
                import xml.etree.ElementTree as ET
                root = ET.parse(spotbugs_xml).getroot()
                _sb_sev = {"1": "CRITICAL", "2": "HIGH", "3": "MEDIUM", "4": "LOW", "5": "LOW"}
                for bug in root.findall(".//BugInstance"):
                    priority = bug.get("priority", "3")
                    sev = _sb_sev.get(priority, "MEDIUM")
                    clazz = bug.find("Class")
                    src   = bug.find(".//SourceLine")
                    loc   = ""
                    if clazz is not None:
                        cn = clazz.get("classname", "?")
                        ln = (src.get("start", "") if src is not None else "")
                        loc = f"{cn}:{ln}" if ln else cn
                    findings.append({"tool": "spotbugs", "severity": sev,
                        "title": f"{bug.get('type','?')}: {bug.get('category','?')}",
                        "location": loc, "cve": "", "fix_version": ""})
            except Exception as e:
                print(f"SpotBugs parse: {e}")

        # ESLint Security JSON (Node.js) â€” outputs flat JSON array, no SARIF
        # severity: 2=errorâ†’HIGH, 1=warningâ†’MEDIUM
        eslint_json = sast_dir / "eslint.json"
        if eslint_json.exists():
            ran = True
            try:
                _es_sev = {2: "HIGH", 1: "MEDIUM", 0: "INFO"}
                for file_result in json.loads(eslint_json.read_text() or "[]"):
                    fpath = file_result.get("filePath", "?")
                    for msg in file_result.get("messages", []):
                        sev = _es_sev.get(msg.get("severity", 1), "MEDIUM")
                        rule = msg.get("ruleId") or "eslint"
                        line = msg.get("line", "")
                        findings.append({"tool": "eslint", "severity": sev,
                            "title": f"{rule}: {msg.get('message','')[:100]}",
                            "location": f"{fpath}:{line}" if line else fpath,
                            "cve": "", "fix_version": ""})
            except Exception as e:
                print(f"ESLint JSON parse: {e}")

        # Roslyn (dotnet) plain text
        roslyn_txt = sast_dir / "roslyn.txt"
        if roslyn_txt.exists():
            ran = True
            try:
                for line in roslyn_txt.read_text().splitlines():
                    m = re.match(r"^(.+?)\((\d+),\d+\):\s+(error|warning)\s+(CS\w+|CA\w+):\s+(.+)$", line)
                    if m:
                        sev = "HIGH" if m.group(3) == "error" else "MEDIUM"
                        findings.append({"tool": "roslyn", "severity": sev,
                            "title": f"{m.group(4)}: {m.group(5)[:80]}",
                            "location": f"{m.group(1)}:{m.group(2)}", "cve": "", "fix_version": ""})
            except Exception as e:
                print(f"Roslyn parse: {e}")

        SEV_ORDER = {"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"INFO":4,"UNKNOWN":5}
        findings.sort(key=lambda f: SEV_ORDER.get(f.get("severity","UNKNOWN"), 5))
        counts = {s.lower(): sum(1 for f in findings if f.get("severity") == s)
                  for s in ("CRITICAL","HIGH","MEDIUM","LOW")}
        print(f"SAST findings: {len(findings)} total  language={LANGUAGE}  {counts}")

        # â”€â”€ Call AI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        ai_findings = []
        summary = ""

        def call_ai(prompt):
            if not AI_PROVIDER or not AI_API_KEY:
                return None
            for attempt in range(3):
                try:
                    if AI_PROVIDER == "anthropic":
                        req = urllib.request.Request(
                            "https://api.anthropic.com/v1/messages",
                            data=json.dumps({"model": AI_MODEL, "max_tokens": 1024,
                                "messages": [{"role": "user", "content": prompt}]}).encode(),
                            headers={"x-api-key": AI_API_KEY, "anthropic-version": "2023-06-01",
                                     "content-type": "application/json"},
                            method="POST",
                        )
                    elif AI_PROVIDER == "gemini":
                        _k = urllib.parse.quote(AI_API_KEY, safe="")
                        _m = urllib.parse.quote(AI_MODEL, safe="")
                        req = urllib.request.Request(
                            f"https://generativelanguage.googleapis.com/v1beta/models/{_m}:generateContent?key={_k}",
                            data=json.dumps({"contents": [{"role": "user", "parts": [{"text": prompt}]}],
                                "systemInstruction": {"parts": [{"text": "Respond with valid JSON only."}]},
                                "generationConfig": {"maxOutputTokens": 1024}}).encode(),
                            headers={"Content-Type": "application/json"},
                            method="POST",
                        )
                    else:
                        req = urllib.request.Request(
                            "https://api.openai.com/v1/chat/completions",
                            data=json.dumps({"model": AI_MODEL, "max_tokens": 1024,
                                "messages": [{"role": "system", "content": "Respond with valid JSON only."},
                                             {"role": "user",   "content": prompt}]}).encode(),
                            headers={"Authorization": f"Bearer {AI_API_KEY}",
                                     "Content-Type": "application/json"},
                            method="POST",
                        )
                    with urllib.request.urlopen(req, timeout=60) as r:
                        data = json.loads(r.read())
                    if AI_PROVIDER == "anthropic":
                        return data["content"][0]["text"]
                    elif AI_PROVIDER == "gemini":
                        return data["candidates"][0]["content"]["parts"][0]["text"]
                    else:
                        return data["choices"][0]["message"]["content"]
                except Exception as e:
                    print(f"AI attempt {attempt+1}: {e}")
                    time.sleep(3 * (attempt + 1))
            return None

        if findings:
            prompt = (
                f"You are a static analysis expert reviewing {LANGUAGE} code. "
                "Analyse these SAST findings and return a JSON report.\n\n"
                f"FINDINGS ({len(findings)} total):\n"
                f"{json.dumps(findings[:30], indent=2)}\n\n"
                "Respond with JSON only:\n"
                '{"verdict":"BLOCK|PROCEED_WITH_CAUTION|PROCEED",'
                '"summary":"1-3 sentences on the SAST posture",'
                '"findings":['
                '{"tool":"","severity":"","title":"","location":"",'
                '"cve":"","fix_version":"","impact":"","fix_description":"","fix_code":""}'
                ']}\n\n'
                "Rules: BLOCK if injection, auth bypass, or RCE found at HIGH or CRITICAL. "
                "fix_code must be an exact corrected code snippet. "
                "Respond with valid JSON only, no markdown."
            )
            raw = call_ai(prompt)
            if raw:
                raw = re.sub(r"^```(?:json)?\s*", "", raw.strip(), flags=re.MULTILINE)
                raw = re.sub(r"\s*```$", "", raw.strip(), flags=re.MULTILINE)
                try:
                    parsed = json.loads(raw.strip())
                    ai_findings = parsed.get("findings", [])
                    summary = parsed.get("summary", "")
                except Exception as e:
                    print(f"AI JSON parse: {e}")

        if not summary:
            summary = (f"{counts['critical']} critical, {counts['high']} high SAST findings."
                       if findings else "No SAST findings detected.")

        if counts["critical"] > 0:
            verdict = "BLOCK"
        elif counts["high"] > 0:
            verdict = "PROCEED_WITH_CAUTION"
        elif findings:
            verdict = "PROCEED_WITH_CAUTION"
        else:
            verdict = "PROCEED"

        result = {
            "category": "sast",
            "ran": ran,
            "verdict": verdict,
            **counts,
            "findings": ai_findings or [
                {"tool": f["tool"], "severity": f["severity"], "title": f["title"],
                 "location": f.get("location",""), "cve": "", "fix_version": "",
                 "impact": "Security weakness â€” exploitable if deployed without fix.",
                 "fix_description": "Review the flagged code and apply secure coding pattern.",
                 "fix_code": ""}
                for f in findings[:10]
            ],
            "all_raw": [{"tool": f["tool"], "severity": f["severity"], "title": f["title"][:120],
                         "location": f.get("location","")[:200], "cve": "", "fix_version": ""}
                        for f in findings],
            "summary": summary,
        }

        (OUT_DIR / "sast.json").write_text(json.dumps(result, indent=2))
        print(f"SAST analysis written: verdict={result['verdict']}, findings={len(result['findings'])}")

