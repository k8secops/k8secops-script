        manifest = json.loads('''$(params.extra-creds-manifest)''')
        creds_dir = pathlib.Path("$(workspaces.extra-build-creds.path)")
        home = pathlib.Path(os.environ["HOME"])
        home.mkdir(parents=True, exist_ok=True)

        if not manifest:
            print("No extra build-artifact-repo credentials declared -- skipping")
        else:
            lines = []
            for cred in manifest:
                name, host = cred["name"], cred["matchId"]
                token = (creds_dir / f"{name}-token").read_text().strip()
                lines.append(f"//{host}/:_authToken={token}")
            (home / ".npmrc").write_text("\n".join(lines) + "\n")
            print(f"Wrote {len(manifest)} npm registry credential(s) to {home}/.npmrc")

        svc_lines: list[str] = []
        for raw_ws_path in ("$(workspaces.extra-service-creds.path)",
                             "$(workspaces.extra-generic-build-creds.path)"):
            if not raw_ws_path:
                continue
            svc_dir = pathlib.Path(raw_ws_path)
            if not svc_dir.is_dir():
                continue
            for f in sorted(svc_dir.iterdir()):
                if not f.is_file():
                    continue
                if f.name.startswith("FILE__"):
                    base = f.name[len("FILE__"):]
                    svc_lines.append(f"export {base}_FILE='{f}'")
                else:
                    svc_lines.append(f"export {f.name}=\"$(cat '{f}')\"")
        if svc_lines:
            (home / ".extra-service-creds.env").write_text("\n".join(svc_lines) + "\n")
            print(f"Wrote {len(svc_lines)} secret-manager credential env var(s)")

    - name: compile
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.build-context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        echo """ TypeScript compile: build-tool=$BUILD_TOOL version=$(params.build-version) """

        [ -f "$HOME/.extra-service-creds.env" ] && . "$HOME/.extra-service-creds.env"

        if [ -n "$CUSTOM_CA_CERT_FILE" ]; then
          export NODE_EXTRA_CA_CERTS="$CUSTOM_CA_CERT_FILE"
          echo "Trusting custom CA for private npm registry: $CUSTOM_CA_CERT_FILE"
        fi

        mkdir -p "$HOME"

        if [ "$(workspaces.npm-cache.bound)" = "true" ]; then
          export npm_config_cache="$(workspaces.npm-cache.path)/.npm"
        else
          export npm_config_cache="$HOME/.npm"
        fi
        mkdir -p "$npm_config_cache"

        # Per-build-tool install + explicit type-check + build, one small
        # focused script per tool under scripts/typescript/ -- same
        # SCRIPT_FILE-embedding convention as every other language.
        case "$BUILD_TOOL" in
          yarn)
            # corepack enable makes `yarn` respect a project's pinned packageManager
            # version (Yarn Berry / 2+) instead of silently falling back to the classic
            # Yarn 1.x bundled in the base image.
            corepack enable
            yarn install --frozen-lockfile --silent

            if [ -f "tsconfig.json" ]; then
              echo "-- TypeScript type-check (tsconfig.json) --"
              # npx resolves the project's own locally-installed tsc (node_modules/.bin)
              # regardless of which package manager did the install -- no yarn-specific
              # invocation needed.
              npx tsc --noEmit -p tsconfig.json
            else
              echo "-- No tsconfig.json found at $(pwd) -- skipping explicit type-check --"
            fi

            # Unlike compile-yarn.sh's nodejs counterpart, a build failure here is NOT
            # swallowed -- TypeScript's whole point is catching errors before they reach
            # the image build.
            yarn build
            ;;
          pnpm)
            corepack enable && pnpm install --frozen-lockfile --silent

            if [ -f "tsconfig.json" ]; then
              echo "-- TypeScript type-check (tsconfig.json) --"
              npx tsc --noEmit -p tsconfig.json
            else
              echo "-- No tsconfig.json found at $(pwd) -- skipping explicit type-check --"
            fi

            # Unlike compile-pnpm.sh's nodejs counterpart, a build failure here is NOT
            # swallowed -- TypeScript's whole point is catching errors before they reach
            # the image build.
            pnpm run build --if-present
            ;;
          *)
            npm install --silent

            if [ -f "tsconfig.json" ]; then
              echo "-- TypeScript type-check (tsconfig.json) --"
              npx tsc --noEmit -p tsconfig.json
            else
              echo "-- No tsconfig.json found at $(pwd) -- skipping explicit type-check --"
            fi

            npm run build --if-present
            ;;
        esac
        echo """ TypeScript compile complete """

