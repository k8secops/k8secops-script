apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-nodejs
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: nodejs
spec:
  params:
    - name: build-tool
      default: npm
    - name: build-version
      default: "20"
    - name: build-file
      default: package.json
    - name: coverage-threshold
      default: "80"
    - name: test-script
      default: "test"
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: test
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and npm
        # has no writable cache directory.
        - name: HOME
          value: "$(workspaces.results.path)/.npm-home"
      script: |
        #!/bin/sh
        mkdir -p "$HOME"
        BUILD_TOOL="$(params.build-tool)"
        ${BUILD_TOOL} ci --silent 2>/dev/null || ${BUILD_TOOL} install --silent

        mkdir -p $(workspaces.results.path)/tests

        # Run using configured test script (default: test ' npm run test / yarn test)
        TEST_SCRIPT="$(params.test-script)"
        TEST_SCRIPT="${TEST_SCRIPT:-test}"
        ${BUILD_TOOL} run "$TEST_SCRIPT" -- \
          --coverage \
          --coverageReporters=cobertura \
          --coverageDirectory=$(workspaces.results.path)/tests \
          --reporters=default \
          --reporters=jest-junit \
          --forceExit 2>&1 || true

        # Copy JUnit output
        [ -f junit.xml ] && cp junit.xml $(workspaces.results.path)/tests/ || true
        [ -f test-results.xml ] && cp test-results.xml $(workspaces.results.path)/tests/junit.xml || true

        node - << 'JSEOF'
        const fs = require('fs');
        const path = '$(workspaces.results.path)/tests';
        let passed=0, failed=0, coverage=0;
        try {
          const xml = fs.readFileSync(`${path}/junit.xml`,'utf8');
          const tp = (xml.match(/tests="(\d+)"/)||[])[1]||0;
          const tf = (xml.match(/failures="(\d+)"/)||[])[1]||0;
          const te = (xml.match(/errors="(\d+)"/)||[])[1]||0;
          failed = parseInt(tf)+parseInt(te);
          passed = parseInt(tp)-failed;
        } catch(e){}
        try {
          const cov = fs.readFileSync(`${path}/cobertura-coverage.xml`,'utf8');
          const lr = (cov.match(/line-rate="([\d.]+)"/)||[])[1]||0;
          coverage = Math.round(parseFloat(lr)*100*10)/10;
        } catch(e){}
        fs.writeFileSync('$(results.TESTS_PASSED.path)', String(passed));
        fs.writeFileSync('$(results.TESTS_FAILED.path)', String(failed));
        fs.writeFileSync('$(results.COVERAGE_PCT.path)', String(coverage));
        console.log(`Node.js tests: ${passed} passed, ${failed} failed, coverage ${coverage}%`);
        JSEOF

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        if failed > 0:
            print(f"FAIL: {failed} test(s) failed"); sys.exit(1)
        if coverage < threshold:
            print(f"FAIL: coverage {coverage}% below threshold {threshold}%"); sys.exit(1)
        print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")

