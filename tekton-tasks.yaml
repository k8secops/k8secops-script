---
# "" SonarQube (Community Edition, in-cluster, no token) """
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sast-sonarqube
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sast
spec:
  description: "SonarQube CE -- in-cluster, no external token required."
  params:
    - name: sonarqube-url
      default: "http://gitops-platform-sonarqube.gitops-tooling.svc.cluster.local:9000"
    - name: project-key
      type: string
    - name: language
      type: string
  workspaces:
    - name: source
    - name: results
  results:
    - name: QUALITY_GATE
  steps:
    - name: wait-sonarqube
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: SONAR_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitops-sonarqube-cred
              key: sonarqubeAdminPassword
      script: |
        #!/usr/bin/env python3
        import urllib.request, urllib.parse, time, sys, json, os, base64

        base_url   = "$(params.sonarqube-url)"
        configured_pass = os.environ.get("SONAR_ADMIN_PASSWORD", "admin")

        # On fresh install SonarQube always starts with admin/admin.
        # Try the configured password first; fall back to "admin" if 401.
        # This lets the first pipeline run succeed even before the password
        # has been changed by the post-install job.
        def make_auth(password):
            creds = base64.b64encode(f"admin:{password}".encode()).decode()
            return {"Authorization": f"Basic {creds}"}

        auth_hdr = make_auth(configured_pass)

        # Wait for SonarQube to be UP
        for i in range(40):
            try:
                d = json.loads(urllib.request.urlopen(f"{base_url}/api/system/status", timeout=5).read())
                if d.get("status") == "UP":
                    print("SonarQube ready"); break
            except Exception as e:
                print(f"Waiting {i+1}/40: {e}")
            time.sleep(10)
        else:
            print("SonarQube timeout -- proceeding without token")
            open("$(workspaces.results.path)/sonar-token", "w").write("")
            sys.exit(0)

        # Generate a short-lived analysis token for this pipeline run
        token_name = f"tekton-$(params.project-key)-{int(time.time())}"
        data = urllib.parse.urlencode({"name": token_name, "login": "admin"}).encode()
        token = ""
        # Try configured password first; if 401 fall back to default "admin" (fresh install)
        for try_pass in ([configured_pass] if configured_pass != "admin" else ["admin"]) + (["admin"] if configured_pass != "admin" else []):
            try:
                hdr = make_auth(try_pass)
                req = urllib.request.Request(
                    f"{base_url}/api/user_tokens/generate",
                    data=data,
                    headers={**hdr, "Content-Type": "application/x-www-form-urlencoded"},
                    method="POST",
                )
                resp = json.loads(urllib.request.urlopen(req, timeout=10).read())
                token = resp.get("token", "")
                auth_hdr = hdr  # use working password for quality gate step too
                print(f"SonarQube analysis token created: {token_name} (length: {len(token)})")
                if not token:
                    print(f"WARNING: token field missing from response: {list(resp.keys())}")
                break
            except Exception as e:
                print(f"Token creation failed with password attempt: {e}")
        open("$(workspaces.results.path)/sonar-token", "w").write(token)
        if not token:
            print("Could not create token -- scan will run unauthenticated")

    - name: sonar-scan
      image: k8secops/k8secops:sonar-scanner-cli-5.0.1
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      script: |
        #!/bin/sh
        TOKEN=$(cat $(workspaces.results.path)/sonar-token 2>/dev/null | tr -d '[:space:]' || true)
        echo "SonarQube token length: ${#TOKEN}"
        TOKEN_ARG=""
        if [ -n "$TOKEN" ]; then
          # Pass as both sonar.token (9.x+) and sonar.login (all versions) for compatibility
          TOKEN_ARG="-Dsonar.token=$TOKEN -Dsonar.login=$TOKEN"
        fi
        # -Dsonar.java.binaries=. allows Java analysis without pre-compiled classes;
        # the sensor falls back to source-only analysis instead of EXECUTION FAILURE.
        sonar-scanner \
          -Dsonar.projectKey=$(params.project-key) \
          -Dsonar.host.url=$(params.sonarqube-url) \
          -Dsonar.qualitygate.wait=false \
          -Dsonar.java.binaries=. \
          -Dsonar.coverage.exclusions="**/*test*/**,**/vendor/**" \
          $TOKEN_ARG \
          2>&1 | tee /tmp/sonar-output.txt || true
        # Record whether the scan submitted an analysis to SonarQube
        if grep -q "EXECUTION SUCCESS" /tmp/sonar-output.txt 2>/dev/null; then
          echo "submitted" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: analysis submitted"
          echo "Report: SonarQube server at $(params.sonarqube-url)/dashboard?id=$(params.project-key)"
        else
          echo "failed" > $(workspaces.results.path)/sonar-scan-status
          echo "SonarQube: scan did not submit an analysis (see output above)"
          echo "Report: none (scan failed to submit)"
        fi

    - name: get-quality-gate
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, urllib.request, urllib.error, time, sys, base64, os

        base_url   = "$(params.sonarqube-url)"
        status_file = "$(workspaces.results.path)/sonar-scan-status"
        result_path = "$(results.QUALITY_GATE.path)"

        scan_status = open(status_file).read().strip() if os.path.exists(status_file) else "unknown"
        if scan_status != "submitted":
            print(f"Scan did not submit an analysis -- skipping quality gate check")
            open(result_path, "w").write("UNKNOWN")
            sys.exit(0)

        token = open("$(workspaces.results.path)/sonar-token").read().strip()
        auth_hdr = ({"Authorization": "Basic " +
            base64.b64encode(f"{token}:".encode()).decode()} if token else {})

        url = f"{base_url}/api/qualitygates/project_status?projectKey=$(params.project-key)"
        for i in range(12):
            try:
                req = urllib.request.Request(url, headers=auth_hdr)
                d   = json.loads(urllib.request.urlopen(req, timeout=10).read())
                qg  = d.get("projectStatus", {}).get("status", "UNKNOWN")
                if qg in ("OK", "ERROR", "WARN"):
                    open(result_path, "w").write(qg)
                    icon = "OK" if qg == "OK" else "FAIL"
                    print(f"Quality gate: {qg} {icon}")
                    sys.exit(0)
                print(f"Attempt {i+1}: status={qg}, waiting")
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors="replace")
                if e.code == 404:
                    print(f"Attempt {i+1}: analysis not yet indexed (404) -- retrying")
                else:
                    print(f"Attempt {i+1}: HTTP {e.code}: {body[:120]}")
            except Exception as e:
                print(f"Attempt {i+1}: {e}")
            time.sleep(10)
        print("Quality gate check timed out -- writing UNKNOWN")
        open(result_path, "w").write("UNKNOWN")


