      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        # FILE__-prefixed keys (secret-manager deliveryMode=file -- SSH keys,
        # CA certs, kubeconfigs etc.) point {name}_FILE straight at the
        # already-mounted Secret file -- no copy needed, it's a stable path
        # for the pod's lifetime. Plain keys defer-read their value via
        # $(cat '<path>') at SOURCE time (below) instead of embedding the
        # value as literal text into the generated export line -- the value
        # never passes through shell quoting/escaping this way (only the
        # platform-controlled file path does), so multi-line content or a
        # literal quote/$( ) in the value can never break or inject into
        # the generated line.
        ENVFILE="$(workspaces.results.path)/.extra-env"
        : > "$ENVFILE"
        if [ "$(workspaces.extra-test-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-test-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
            esac
          done
        fi
        if [ "$(workspaces.extra-service-creds.bound)" = "true" ]; then
          for f in "$(workspaces.extra-service-creds.path)"/*; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              FILE__*) echo "export ${base#FILE__}_FILE='$f'" >> "$ENVFILE" ;;
              *)       echo "export $base=\"\$(cat '$f')\"" >> "$ENVFILE" ;;
