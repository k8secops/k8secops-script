---
# "" Build image locally -- NO push """""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-pre-build
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Verifies compiled artifacts exist and validates Dockerfile COPY sources
    before Kaniko runs. Runs in its own pod so a failure here is isolated --
    it does not cancel hadolint and gives a fast, clear error before spending
    time on the build.
  params:
    - name: build-tool
      default: "maven"
    - name: language
      default: "java"
    - name: dockerfile-path
      default: "./Dockerfile"
  workspaces:
    - name: source
  steps:
    - name: verify-artifacts
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import pathlib, sys

        build_tool = "$(params.build-tool)"
        source_dir = pathlib.Path("$(workspaces.source.path)")

        if build_tool in ("maven", "gradle"):
            jars = [p for p in source_dir.rglob("*.jar")
                    if ".m2" not in str(p) and "test-classes" not in str(p)
                    and "original-" not in p.name]
            if not jars:
                print("ERROR: No JAR found -- compile stage may have failed.")
                sys.exit(1)
            print("-- Build artifacts ready for Kaniko: --")
            for j in sorted(jars):
                print(f"  {j.stat().st_size // 1024} KB  {j.relative_to(source_dir)}")
        elif build_tool in ("npm",):
            dist = source_dir / "dist"
            build = source_dir / "build"
            if not dist.exists() and not build.exists():
                print("WARN: No dist/ or build/ directory found for npm project")
            else:
                print("-- npm build output ready --")
        else:
            print(f"-- build-tool={build_tool}: artifacts managed by Dockerfile --")

    - name: validate-dockerfile
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import re, pathlib, sys

        source_dir = pathlib.Path("$(workspaces.source.path)")
        df_rel     = "$(params.dockerfile-path)".lstrip("./")
        df_path    = source_dir / df_rel if df_rel else source_dir / "Dockerfile"

        DEFAULT_DOCKERFILES = {
            "python": "FROM python:3.12-slim\nWORKDIR /app\nCOPY . .\n"
                      "RUN pip install --no-cache-dir -r requirements.txt 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "nodejs": "FROM node:20-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN npm install --omit=dev 2>/dev/null || npm install 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "go":     "FROM golang:1.22-alpine\nWORKDIR /app\nCOPY . .\n"
                      "RUN go build ./... 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
            "dotnet": "FROM mcr.microsoft.com/dotnet/sdk:10.0\nWORKDIR /app\nCOPY . .\n"
                      "RUN dotnet publish -c Release -o /out 2>/dev/null || true\n"
                      "CMD [\"sh\", \"-c\", \"sleep infinity\"]\n",
        }

        if not df_path.exists():
            default = DEFAULT_DOCKERFILES.get("$(params.language)")
            if default:
                print(f"No Dockerfile at {df_path} -- generating default for $(params.language)")
                df_path.write_text(default)
            else:
                print(f"ERROR: Dockerfile not found at {df_path}")
                sys.exit(1)

        lines = df_path.read_text().splitlines()
        from_count = sum(1 for l in lines if re.match(r'^\s*FROM\s+', l, re.I))
        if from_count > 1:
            print(f"  Multi-stage build ({from_count} FROM stages) -- no pre-existing artifacts required.")
            ignore_path = source_dir / ".dockerignore"
            additions = ["obj/", "bin/", "target/", "build/libs/", "dist/", ".next/",
                         "__pycache__/", "*.pyc", ".git/"]
            existing = ignore_path.read_text() if ignore_path.exists() else ""
            new_lines = [e for e in additions if e not in existing]
            if new_lines:
                with ignore_path.open("a") as f:
                    f.write("\n# gitops-platform: exclude pipeline build artifacts\n")
                    f.write("\n".join(new_lines) + "\n")
                print(f"  Added {len(new_lines)} entries to .dockerignore")
            sys.exit(0)

        print("  Single-stage build -- checking COPY sources:")
        missing, found = [], []
        for line in lines:
            line = line.strip()
            if re.match(r'^COPY\s+--from=', line, re.I):
                continue
            m = re.match(r'^COPY\s+(.+)$', line, re.I)
            if not m:
                continue
            parts = m.group(1).split()
            for src in parts[:-1]:
                if src.startswith('--'):
                    continue
                src_clean = src.lstrip('./')
                if '*' in src_clean or '?' in src_clean:
                    matches = list(source_dir.glob(src_clean))
                    (found if matches else missing).append(
                        f"  {'OK' if matches else 'MISSING'} {src}")
                else:
                    full = source_dir / src_clean
                    if full.exists():
                        found.append(f"  OK {src}  ({full.stat().st_size // 1024} KB)")
                    else:
                        candidates = list(source_dir.rglob(f"*{pathlib.Path(src_clean).name}*"))
                        hint = f"  -> did you mean: {candidates[0].relative_to(source_dir)} ?" if candidates else ""
                        missing.append(f"  MISSING {src}{hint}")

        for f in found: print(f)
        if missing:
            print("\nERROR: Dockerfile COPY sources missing:")
            for m in missing: print(m)
            sys.exit(1)
        print(f"\nAll {len(found)} COPY source(s) verified OK")

---
# Hadolint -- Dockerfile lint -- own pod, onError:continue in the pipeline.
# Runs in parallel with the Kaniko build after pre-build passes so findings
# land in scan-results without adding to the critical path.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-hadolint
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: build
spec:
  params:
    - name: dockerfile-path
      default: "./Dockerfile"
  workspaces:
    - name: source
    - name: results
  steps:
    - name: hadolint
      image: k8secops/k8secops:hadolint-v2.12.0-debian
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/dockerfile-lint
        DF_REL=$(echo "$(params.dockerfile-path)" | sed 's|^\./||')
        DF="$(workspaces.source.path)/$DF_REL"
        OUT="$(workspaces.results.path)/dockerfile-lint/hadolint.json"
        echo "Hadolint: $DF"
        hadolint "$DF" -f json > "$OUT" 2>/dev/null || true
        COUNT=$(grep -o '"code"' "$OUT" 2>/dev/null | wc -l | tr -d ' ')
        echo "Findings: ${COUNT:-0}  ->  dockerfile-lint/hadolint.json"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-build-image-local
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: build
spec:
  description: |
    Builds container image using Kaniko with --no-push.
    Image is saved as a tar file in the image-tar workspace.
    Push happens ONLY after human approval in a separate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: language
      type: string
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
    - name: dockerfile-path
      default: "./Dockerfile"
    - name: context
      default: "./"
    - name: operator-api-url
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
    - name: pipeline-run-id
      default: ""
    - name: registry-mirror
      default: ""
      description: "Optional registry mirror URL for Kaniko base image pulls (e.g. kind-registry:5000). Leave empty to pull directly from Docker Hub."
  workspaces:
    - name: source
    - name: image-tar
    - name: kaniko-cache
    - name: registry-credentials
      description: "Docker config.json for authenticating base image pulls from Docker Hub"
  results:
    - name: IMAGE_TAR_PATH
    - name: IMAGE_FULL_REF
  steps:
    # Kaniko: build image from source and save as tar. No push.
    # Pre-build checks (verify-artifacts, validate-dockerfile) and
    # Dockerfile linting (hadolint) run in their own pods before this task.
    - name: build-local
      image: k8secops/k8secops:gitops-builder-1.0.0
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: false
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "4Gi"}
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.registry-credentials.path)
      script: |
        #!/bin/sh
        set -e

        DF="$(params.dockerfile-path)"
        DF="${DF#./}"
        CTX="$(params.context)"
        CTX="${CTX#./}"

        echo "Building image: $(params.image-registry)/$(params.image-name):$(params.image-tag)"
        echo "Dockerfile:     $(workspaces.source.path)/$DF"
        echo "Context:        $(workspaces.source.path)/$CTX"

        MIRROR_FLAG=""
        if [ -n "$(params.registry-mirror)" ]; then
          MIRROR_FLAG="--registry-mirror=$(params.registry-mirror)"
          echo "Using registry mirror: $(params.registry-mirror)"
        fi

        # shellcheck disable=SC2086
        /kaniko/executor \
          --dockerfile="$(workspaces.source.path)/$DF" \
          --context="dir://$(workspaces.source.path)/$CTX" \
          --destination="$(params.image-registry)/$(params.image-name):$(params.image-tag)" \
          --no-push \
          --tar-path="$(workspaces.image-tar.path)/image.tar" \
          --snapshot-mode=full \
          --cache-dir="$(workspaces.kaniko-cache.path)" \
          --cache-ttl=168h \
          --log-format=text \
          --verbosity=info \
          $MIRROR_FLAG

        echo "Image saved: $(workspaces.image-tar.path)/image.tar"
    - name: record-ref
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import os, sys, urllib.request, json
        tar_path = "$(workspaces.image-tar.path)/image.tar"
        full_ref = "$(params.image-registry)/$(params.image-name):$(params.image-tag)"
        open("$(results.IMAGE_TAR_PATH.path)","w").write(tar_path)
        open("$(results.IMAGE_FULL_REF.path)","w").write(full_ref)
        if not os.path.exists(tar_path):
            print(f"ERROR: image tar not found at {tar_path}")
            sys.exit(1)
        size_mb = os.path.getsize(tar_path) // 1024 // 1024
        print(f"Built image: {full_ref}  ({size_mb} MB)")
        token   = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)",
                               "imageRef": full_ref, "sizeMb": size_mb}).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-built",
                data=payload, headers=headers, method="POST")
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image built {full_ref}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# "" Trivy -- scans local tar """""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-trivy
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: image-scan
spec:
  description: "Trivy image scan on local tar. No push required. Apache 2.0."
  params:
    - name: severity
      default: "CRITICAL,HIGH,MEDIUM"
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
    - name: vulndb-cache
  results:
    - name: CRITICAL_COUNT
    - name: HIGH_COUNT
    - name: MEDIUM_COUNT
  steps:
    - name: trivy
      image: k8secops/k8secops:trivy-0.54.1
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      env:
        - name: TRIVY_CACHE_DIR
          value: "$(workspaces.vulndb-cache.path)/trivy"
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/image-scan "$TRIVY_CACHE_DIR"
        TAR="$(workspaces.image-tar.path)/image.tar"
        IMAGE_REF="$(params.image-ref)"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")

        echo " Trivy image scan "
        echo "  Image : ${IMAGE_REF:-<unknown>}"
        echo "  Tar   : $TAR ($TAR_SIZE)"
        echo "  Rules : $(params.severity)"
        echo ""

        trivy image \
          --input "$TAR" \
          --format sarif \
          --output $(workspaces.results.path)/image-scan/trivy.sarif \
          --scanners vuln,secret,misconfig,license \
          --severity "$(params.severity)" \
          --exit-code 0 2>/dev/null || true

        trivy image \
          --input "$TAR" \
          --format json \
          --output $(workspaces.results.path)/image-scan/trivy.json \
          --scanners vuln,secret,misconfig,license \
          --exit-code 0 2>/dev/null || true

        # Count with grep -- Trivy Alpine image has no python3
        JSON="$(workspaces.results.path)/image-scan/trivy.json"
        CRITICAL=$(grep -o '"Severity":"CRITICAL"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        HIGH=$(grep -o '"Severity":"HIGH"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        MEDIUM=$(grep -o '"Severity":"MEDIUM"' "$JSON" 2>/dev/null | wc -l | tr -d ' ')
        CRITICAL=${CRITICAL:-0}; HIGH=${HIGH:-0}; MEDIUM=${MEDIUM:-0}
        printf '%s' "$CRITICAL" > $(results.CRITICAL_COUNT.path)
        printf '%s' "$HIGH"     > $(results.HIGH_COUNT.path)
        printf '%s' "$MEDIUM"   > $(results.MEDIUM_COUNT.path)
        echo "Trivy result -- CRITICAL=$CRITICAL HIGH=$HIGH MEDIUM=$MEDIUM"
        SIZE=$(du -sh "$(workspaces.results.path)/image-scan/trivy.json" 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: image-scan/trivy.json  ($SIZE, C=$CRITICAL H=$HIGH M=$MEDIUM)"

---
# "" Grype -- scans local tar """""""""""""""""""""""""""""""
# anchore/grype:latest is distroless (no /bin/sh) -- cannot use script:.
# Step 1 creates the output dir (python:3.12-slim).
# Step 2 runs grype via command/args (no script injection).
# Step 3 parses JSON results (python:3.12-slim).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-grype
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: image-scan
spec:
  description: "Grype image scan on local tar. Apache 2.0. No token."
  params:
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
    - name: vulndb-cache
  results:
    - name: CRITICAL_COUNT
    - name: HIGH_COUNT
  steps:
    - name: setup
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/image-scan
        mkdir -p $(workspaces.vulndb-cache.path)/grype/tmp $(workspaces.vulndb-cache.path)/grype/db
        TAR="$(workspaces.image-tar.path)/image.tar"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")
        echo " Grype image scan "
        echo "  Image : $(params.image-ref)"
        echo "  Tar   : $TAR ($TAR_SIZE)"

    - name: grype-scan
      image: k8secops/k8secops:grype-v0.80.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "2Gi"}
      env:
        - name: HOME
          value: "$(workspaces.vulndb-cache.path)/grype"
        - name: TMPDIR
          value: "$(workspaces.vulndb-cache.path)/grype/tmp"
        - name: GRYPE_DB_AUTO_UPDATE
          value: "true"
        - name: GRYPE_DB_VALIDATE_AGE
          value: "false"
        - name: GRYPE_DB_CACHE_DIR
          value: "$(workspaces.vulndb-cache.path)/grype/db"
      # anchore/grype:latest is distroless -- binary is at /grype, not on PATH
      command: ["/grype"]
      args:
        - "docker-archive:$(workspaces.image-tar.path)/image.tar"
        - "--output"
        - "json"
        - "--file"
        - "$(workspaces.results.path)/image-scan/grype.json"
        - "--add-cpes-if-none"
        - "--quiet"

    - name: parse
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, pathlib
        counts = {"Critical": 0, "High": 0}
        try:
            d = json.loads(pathlib.Path("$(workspaces.results.path)/image-scan/grype.json").read_text())
            for m in d.get("matches", []):
                sev = m.get("vulnerability", {}).get("severity", "Unknown")
                counts[sev] = counts.get(sev, 0) + 1
        except Exception as e:
            print(f"Parse warning: {e}")
        pathlib.Path("$(results.CRITICAL_COUNT.path)").write_text(str(counts["Critical"]))
        pathlib.Path("$(results.HIGH_COUNT.path)").write_text(str(counts["High"]))
        print(f"Grype result -- Critical={counts['Critical']} High={counts['High']}")
        grype_path = pathlib.Path("$(workspaces.results.path)/image-scan/grype.json")
        size_kb = grype_path.stat().st_size // 1024 if grype_path.exists() else 0
        total = sum(counts.values())
        print(f"Report: image-scan/grype.json  ({size_kb} KB, {total} matches)")

---
# "" Syft -- SBOM generation from local tar """""""""""""""""
# anchore/syft:latest is distroless (no /bin/sh) -- cannot use script:.
# Step 1 creates the output dir (python:3.12-slim).
# Step 2 runs syft via command/args (no script injection).
# Step 3 parses the CycloneDX JSON results (python:3.12-slim).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-scan-syft
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: sbom
spec:
  description: "Syft SBOM generation (CycloneDX) on local tar. Apache 2.0. No token."
  params:
    - name: image-ref
      default: ""
      description: "Full image reference being scanned (for display only)"
  workspaces:
    - name: image-tar
    - name: results
  results:
    - name: PACKAGE_COUNT
  steps:
    - name: setup
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sbom $(workspaces.results.path)/.syft-cache
        TAR="$(workspaces.image-tar.path)/image.tar"
        TAR_SIZE=$(du -sh "$TAR" 2>/dev/null | cut -f1 || echo "?")
        echo " Syft SBOM generation "
        echo "  Image : $(params.image-ref)"
        echo "  Tar   : $TAR ($TAR_SIZE)"

    - name: syft-scan
      image: k8secops/k8secops:syft-v1.9.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "200m", memory: "512Mi"}
        limits:   {cpu: "1000m", memory: "1Gi"}
      env:
        - name: HOME
          value: "$(workspaces.results.path)/.syft-cache"
        - name: TMPDIR
          value: "$(workspaces.results.path)/.syft-cache"
      # anchore/syft:latest is distroless -- binary is at /syft, not on PATH
      command: ["/syft"]
      args:
        - "docker-archive:$(workspaces.image-tar.path)/image.tar"
        - "-o"
        - "cyclonedx-json=$(workspaces.results.path)/sbom/sbom.cyclonedx.json"
        - "-q"

    - name: parse
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import json, pathlib
        count = 0
        try:
            d = json.loads(pathlib.Path("$(workspaces.results.path)/sbom/sbom.cyclonedx.json").read_text())
            count = len(d.get("components", []))
        except Exception as e:
            print(f"Parse warning: {e}")
        pathlib.Path("$(results.PACKAGE_COUNT.path)").write_text(str(count))
        sbom_path = pathlib.Path("$(workspaces.results.path)/sbom/sbom.cyclonedx.json")
        size_kb = sbom_path.stat().st_size // 1024 if sbom_path.exists() else 0
        print(f"Syft SBOM -- {count} components")
        print(f"Report: sbom/sbom.cyclonedx.json  ({size_kb} KB, {count} components)")

---
# "" Image Push (only after human YES) """"""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-image-push
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: push
spec:
  description: |
    Pushes the locally built image tar to the registry, then signs the
    pushed image with cosign (if a cosign-keys secret is present).
    Only runs after human approval from the human-gate task.
  params:
    - name: image-registry
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-run-id
      type: string
    - name: require-image-signing
      type: string
      default: "false"
  workspaces:
    - name: image-tar
    - name: registry-credentials
  results:
    - name: IMAGE_TAG
    - name: IMAGE_DIGEST
    - name: IMAGE_FULL_URL
  volumes:
    - name: cosign-keys
      secret:
        secretName: cosign-keys
        optional: true
  steps:
    - name: check-signing-requirements
      image: k8secops/k8secops:alpine-3.20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: cosign-keys
          mountPath: /cosign-keys
          readOnly: true
      script: |
        #!/bin/sh
        if [ "$(params.require-image-signing)" = "true" ] && [ ! -f /cosign-keys/cosign.key ]; then
          echo "Image signing is required for this app, but the cosign-keys secret is missing -- refusing to push an unsigned image."
          exit 1
        fi

    - name: push
      image: k8secops/k8secops:skopeo-v1.16.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -e
        TAR="$(workspaces.image-tar.path)/image.tar"
        CREDS_DIR="$(workspaces.registry-credentials.path)"

        # Normalise Docker Hub registry: any *.docker.com / *.docker.io ' index.docker.io
        REGISTRY="$(params.image-registry)"
        case "$REGISTRY" in
          *hub.docker.com*|*docker.io*|*registry-1.docker.io*) REGISTRY="index.docker.io" ;;
        esac
        FULL_REF="$REGISTRY/$(params.image-name):$(params.image-tag)"

        # Normalise config.json auth keys to match target registry
        TEMP_AUTH=/tmp/config.json
        sed "s|registry.hub.docker.com|index.docker.io|g; s|registry-1.docker.io|index.docker.io|g" \
          "$CREDS_DIR/config.json" > "$TEMP_AUTH" 2>/dev/null || cp "$CREDS_DIR/config.json" "$TEMP_AUTH"

        echo "Pushing $FULL_REF..."
        skopeo copy \
          --authfile "$TEMP_AUTH" \
          "docker-archive:$TAR" \
          "docker://$FULL_REF"

        DIGEST=$(skopeo inspect --authfile "$TEMP_AUTH" \
          "docker://$FULL_REF" 2>/dev/null | grep -o '"Digest":"[^"]*"' \
          | head -1 | cut -d'"' -f4)
        [ -z "$DIGEST" ] && DIGEST="unknown"

        printf '%s' "$(params.image-tag)" > "$(results.IMAGE_TAG.path)"
        printf '%s' "$DIGEST" > "$(results.IMAGE_DIGEST.path)"
        printf '%s' "$FULL_REF" > "$(results.IMAGE_FULL_URL.path)"
        echo "Pushed: $FULL_REF@$DIGEST"

    - name: notify-pushed
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, pathlib, os

        tag    = open("$(results.IMAGE_TAG.path)").read()
        digest = open("$(results.IMAGE_DIGEST.path)").read()
        url    = open("$(results.IMAGE_FULL_URL.path)").read()
        # imageSigned is always false here; the separate image-sign task
        # (only runs when require-image-signing=true) updates it via a
        # second call to this endpoint after signing completes.
        token  = os.environ.get("OPERATOR_API_TOKEN", "")

        payload = json.dumps({
            "runId": "$(params.pipeline-run-id)",
            "imageTag": tag,
            "imageDigest": digest,
            "imageUrl": url,
            "imageSigned": False,
            "status": "pushed"
        }).encode()

        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"

        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-pushed",
                data=payload,
                headers=headers,
                method="POST"
            )
            urllib.request.urlopen(req, timeout=10)
            print(f"Notified operator: image pushed {url}")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# "" Image Sign (optional -- only runs when require-image-signing=true) """""
# This task is separate from image-push so that bitnami/cosign is NEVER
# pulled when signing is disabled. The pipeline uses a Tekton `when`
# condition to skip this task entirely when require-image-signing != true.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-image-sign
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: push
spec:
  description: |
    Signs a previously pushed image with cosign.
    Only executed when require-image-signing=true in the pipeline.
    Requires the cosign-keys Secret in tekton-pipelines namespace.
    After signing, notifies the operator to update imageSigned=true.
  params:
    - name: image-tag
      type: string
    - name: image-digest
      type: string
    - name: image-full-url
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-run-id
      type: string
  workspaces:
    - name: registry-credentials
  volumes:
    - name: cosign-keys
      secret:
        secretName: cosign-keys
        optional: true
  steps:
    - name: cosign-sign
      image: k8secops/k8secops:cosign-2.2.4
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: cosign-keys
          mountPath: /cosign-keys
          readOnly: true
      env:
        - name: DOCKER_CONFIG
          value: "$(workspaces.registry-credentials.path)"
        - name: COSIGN_PASSWORD
          value: ""
      script: |
        #!/bin/sh
        if [ ! -f /cosign-keys/cosign.key ]; then
          echo "cosign-keys secret not present -- cannot sign (signing was required)"
          exit 1
        fi
        FULL_REF="$(params.image-full-url)"
        DIGEST="$(params.image-digest)"
        echo "Signing $FULL_REF with cosign..."
        if [ -n "$DIGEST" ] && [ "$DIGEST" != "unknown" ]; then
          cosign sign --key /cosign-keys/cosign.key --yes "$FULL_REF@$DIGEST"
        else
          cosign sign --key /cosign-keys/cosign.key --yes "$FULL_REF"
        fi
        echo "Image signed: $FULL_REF"

    - name: notify-signed
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, os
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({
            "runId":        "$(params.pipeline-run-id)",
            "imageTag":     "$(params.image-tag)",
            "imageDigest":  "$(params.image-digest)",
            "imageUrl":     "$(params.image-full-url)",
            "imageSigned":  True,
            "status":       "pushed",
        }).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/image-pushed",
                data=payload, headers=headers, method="POST"), timeout=10)
            print("Notified operator: image signed")
        except Exception as e:
            print(f"Operator notify failed (non-fatal): {e}")

---
# "" Human Gate """"""""""""""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-human-gate
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: human-gate
spec:
  description: |
    Pauses the pipeline and polls the operator API for human decision.
    The operator exposes the AI report to the browser UI.
    Human clicks YES or NO in the browser.
    YES ' pipeline continues to image-push.
    NO  ' task fails, pipeline stops.
    Timeout: 24h (human may not be at desk immediately).
  params:
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
  results:
    - name: DECISION
      description: "YES or NO"
  steps:
    - name: wait-for-human
      image: k8secops/k8secops:python-3.12-slim
      timeout: "24h"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, time, sys, os

        # Unbuffered output -- always visible in Tekton logs immediately
        sys.stdout.reconfigure(line_buffering=True)

        run_id      = "$(params.pipeline-run-id)"
        api_url     = "$(params.operator-api-url)"
        poll_url    = f"{api_url}/api/v1/pipelines/{run_id}/decision"
        ready_url   = f"{api_url}/api/v1/pipelines/{run_id}/gate-ready"
        token       = os.environ.get("OPERATOR_API_TOKEN", "")
        auth_header = {"Authorization": f"Bearer {token}"} if token else {}

        # Tell operator this pipeline is waiting for human -- retry with backoff
        # so a transient DNS hiccup doesn't silently skip the gate notification.
        for attempt in range(1, 7):
            try:
                req = urllib.request.Request(
                    ready_url, data=b"{}",
                    headers={"Content-Type": "application/json", **auth_header},
                    method="POST")
                urllib.request.urlopen(req, timeout=15)
                print(f"Gate ready (attempt {attempt}) -- waiting for human decision on run {run_id}")
                print(f"Open the Platform UI to review findings and send for reviewer approval")
                break
            except Exception as e:
                wait = attempt * 10
                print(f"Gate-ready attempt {attempt} failed: {e} -- retrying in {wait}s")
                if attempt < 6:
                    time.sleep(wait)
                else:
                    print("Gate-ready failed after 6 attempts -- polling will continue")

        # Poll every 10 seconds for up to 24 hours
        polls = 0
        max_polls = 24 * 60 * 6  # 24h -- 60min -- 6 polls/min

        while polls < max_polls:
            try:
                poll_req = urllib.request.Request(poll_url, headers=auth_header)
                resp = urllib.request.urlopen(poll_req, timeout=10)
                data = json.loads(resp.read())
                decision = data.get("decision", "").upper()

                if decision == "YES":
                    open("$(results.DECISION.path)", "w").write("YES")
                    print(f"Human decision: YES -- proceeding with image push")
                    sys.exit(0)

                elif decision == "NO":
                    open("$(results.DECISION.path)", "w").write("NO")
                    print(f"Human decision: NO -- pipeline stopped")
                    sys.exit(1)

            except Exception as e:
                if polls % 30 == 0:  # Log every 5 min
                    print(f"Still waiting for human decision... ({polls * 10 // 60} min elapsed)")
            time.sleep(10)
            polls += 1

        print("Human gate timed out after 24h -- stopping pipeline")
        open("$(results.DECISION.path)", "w").write("TIMEOUT")
        sys.exit(1)

---
# "" Notify Status (finally task) """"""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-notify-status
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: notify
spec:
  params:
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
    - name: pipeline-status
      type: string
      default: "Unknown"
  steps:
    - name: notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import urllib.request, json, os

        token = os.environ.get("OPERATOR_API_TOKEN", "")
        payload = json.dumps({
            "runId": "$(params.pipeline-run-id)",
            "status": "$(params.pipeline-status)"
        }).encode()
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        try:
            req = urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/status",
                data=payload,
                headers=headers,
                method="POST")
            urllib.request.urlopen(req, timeout=10)
        except Exception as e:
            print(f"Status notify failed: {e}")

# Source: platform/tekton/tasks/build/compile-dotnet-task.yaml
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-dotnet
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: >
    .NET compile -- dotnet restore + build + publish.
    The SDK image version is determined by the HIGHER of (configured version) or
    (TargetFramework found in the .csproj), so a net8.0 project always gets the
    .NET 8 SDK even if the user configured 6.0. Fails fast with a clear message
    on version mismatch so developers know to update their app configuration.
  params:
    - name: build-tool
      default: "dotnet"
    - name: build-version
      default: "8.0"
    - name: build-file
      default: ""
  workspaces:
    - name: source
  steps:
    # "" Version detection """""""""""""""""""""""""""""""""""""""""""""""""""""
    # Read TargetFramework(s) from the csproj and write the required SDK major
    # version to a shared file. This runs in a minimal python image that is
    # available in all Kind clusters.
    - name: detect-version
      image: k8secops/k8secops:python-3.12-slim
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/usr/bin/env python3
        import os, re, glob, sys

        configured = "$(params.build-version)"
        build_file  = "$(params.build-file)".strip()

        # Find the .csproj to inspect
        if build_file:
            candidates = [build_file]
        else:
            candidates = glob.glob("**/*.csproj", recursive=True)
            candidates = [c for c in candidates if "test" not in c.lower()]

        if not candidates:
            print(f"No .csproj found -- using configured version {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        csproj = candidates[0]
        print(f"Inspecting: {csproj}")
        content = open(csproj).read()

        # Extract TargetFramework(s) -- handles net6.0, net8.0, netstandard2.0, etc.
        targets = re.findall(r"<TargetFrameworks?>\s*([^<]+)\s*</TargetFrameworks?>", content)
        if not targets:
            print(f"No TargetFramework found in {csproj} -- using {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        # Parse the highest .NET version required (ignore netstandard)
        versions = []
        for target_list in targets:
            for t in re.split(r'[;,\s]+', target_list.strip()):
                m = re.match(r'net(\d+)\.(\d+)$', t.strip())
                if m:
                    versions.append((int(m.group(1)), int(m.group(2)), t))

        if not versions:
            print(f"Only netstandard targets found -- using {configured}")
            open("/workspace/sdk-version.txt", "w").write(configured)
            sys.exit(0)

        # Use the highest required version (at least as high as configured)
        versions.sort(reverse=True)
        required_major, required_minor, required_label = versions[0]
        required_str = f"{required_major}.{required_minor}"

        cfg_parts = configured.split(".")
        cfg_major  = int(cfg_parts[0]) if cfg_parts else 6
        cfg_minor  = int(cfg_parts[1]) if len(cfg_parts) > 1 else 0

        if required_major > cfg_major or (required_major == cfg_major and required_minor > cfg_minor):
            print(f"WARNING: csproj targets {required_label} but app was configured for .NET {configured}.")
            print(f"  Using .NET {required_str} SDK automatically.")
            print(f"  ACTION: Edit your app in the platform UI and set .NET version to {required_str}.")
            sdk = required_str
        else:
            sdk = configured

        print(f"SDK version resolved: {sdk}")
        open("/workspace/sdk-version.txt", "w").write(sdk)

    # "" Compile """""""""""""""""""""""""""""""""""""""""""""""""""""""""""""""
    # SDK 9.0 is backward compatible: builds net6.0, net7.0, net8.0, net9.0.
    # Using the latest SDK avoids NETSDK1045 errors when the csproj targets a
    # version higher than the user-configured version (a common misconfiguration).
    - name: compile
      image: k8secops/k8secops:dotnet-sdk-9.0
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      # Run as the same user as git-clone (65532) so it owns the workspace files
      # and can create obj/ bin/ publish/ without capability tricks.
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      env:
        # 65532 has no home in /etc/passwd -- redirect all .NET/NuGet cache to workspace
        - name: HOME
          value: "$(workspaces.source.path)/.dotnet-home"
        - name: DOTNET_CLI_HOME
          value: "$(workspaces.source.path)/.dotnet-home"
        - name: NUGET_PACKAGES
          value: "$(workspaces.source.path)/.nuget/packages"
        - name: DOTNET_NOLOGO
          value: "1"
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/bash
        set -e
        BUILD_FILE="$(params.build-file)"

        echo """ .NET compile: SDK=$(params.build-version) """
        dotnet --version

        # Goal: validate that the code compiles -- NOT produce the final artifact.
        # Kaniko builds the Docker image using the Dockerfile which runs its own
        # `dotnet publish` inside a multi-stage build. Doing publish here is
        # redundant and hits permission issues creating output directories.
        if [ -n "$BUILD_FILE" ]; then
          echo """ dotnet restore: $BUILD_FILE """
          dotnet restore "$BUILD_FILE"
          echo """ dotnet build: $BUILD_FILE """
          dotnet build "$BUILD_FILE" -c Release --no-restore
        else
          echo """ dotnet restore """
          dotnet restore
          echo """ dotnet build """
          dotnet build -c Release --no-restore
        fi

        echo """ Build artifacts """
        find . -path "*/bin/Release/*.dll" -not -path "*/obj/*" 2>/dev/null \
          | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
        echo """ .NET compile complete """

