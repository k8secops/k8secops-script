# â”€â”€ Java Unit Tests â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-java
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: java
spec:
  params:
    - name: build-tool
      default: maven
    - name: build-version
      default: "21"
    - name: build-file
      default: pom.xml
    - name: coverage-threshold
      default: "80"
    - name: test-module
      default: ""
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: run-tests
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/tests
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        TEST_MODULE="$(params.test-module)"
        if [ "$BUILD_TOOL" = "maven" ]; then
          F_ARG=""
          if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ]; then
            F_ARG="-f $BUILD_FILE"
          fi
          # For multi-module projects, run tests only in the specified module
          if [ -n "$TEST_MODULE" ]; then
            mvn test -pl "$TEST_MODULE" -Dmaven.test.failure.ignore=true -B $F_ARG 2>&1 | tee /tmp/mvn-out.txt || true
            mvn jacoco:report -pl "$TEST_MODULE" -B $F_ARG 2>/dev/null || true
          else
            mvn test -Dmaven.test.failure.ignore=true -B $F_ARG 2>&1 | tee /tmp/mvn-out.txt || true
            mvn jacoco:report -B $F_ARG 2>/dev/null || true
          fi
        else
          ARGS="build test jacocoTestReport"
          if [ -n "$TEST_MODULE" ]; then
            ARGS=":${TEST_MODULE}:test :${TEST_MODULE}:jacocoTestReport"
          fi
          if [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ]; then
            ARGS="$ARGS -b $BUILD_FILE"
          fi
          ./gradlew $ARGS 2>&1 | tee /tmp/gradle-out.txt || true
        fi
        find . -name "TEST-*.xml" -exec cp {} $(workspaces.results.path)/tests/ \; 2>/dev/null || true
        find . -name "jacoco.xml" -exec cp {} $(workspaces.results.path)/tests/coverage.xml \; 2>/dev/null || true

    - name: parse-results
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "100m", memory: "128Mi"}
        limits:   {cpu: "200m", memory: "256Mi"}
      script: |
        #!/usr/bin/env python3
        import pathlib, xml.etree.ElementTree as ET

        report_dir = pathlib.Path("$(workspaces.results.path)/tests")
        passed = failed = 0
        for xml_file in report_dir.glob("TEST-*.xml"):
            try:
                ts = ET.parse(xml_file).getroot()
                passed += int(ts.get("tests",0)) - int(ts.get("failures",0)) - int(ts.get("errors",0))
                failed += int(ts.get("failures",0)) + int(ts.get("errors",0))
            except: pass

        coverage = 0.0
        cov_file = report_dir / "coverage.xml"
        if cov_file.exists():
            try:
                for counter in ET.parse(cov_file).getroot().findall(".//counter[@type='LINE']"):
                    covered = int(counter.get("covered",0))
                    total   = covered + int(counter.get("missed",0))
                    if total > 0:
                        coverage = round(covered / total * 100, 1)
            except: pass

        open("$(results.TESTS_PASSED.path)","w").write(str(passed))
        open("$(results.TESTS_FAILED.path)","w").write(str(failed))
        open("$(results.COVERAGE_PCT.path)","w").write(str(coverage))
        print(f"Java tests: {passed} passed, {failed} failed, coverage {coverage}%")

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        if failed > 0:
            print(f"FAIL: {failed} test(s) failed"); sys.exit(1)
        if coverage < threshold:
            print(f"FAIL: coverage {coverage}% below threshold {threshold}%"); sys.exit(1)
        print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")

---
# â”€â”€ Python Unit Tests â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-test-python
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: unit-tests
    gitops-platform.io/language: python
spec:
  params:
    - name: build-tool
      default: pip
    - name: build-version
      default: "3.12"
    - name: build-file
      default: requirements.txt
    - name: coverage-threshold
      default: "80"
    - name: test-dir
      default: ""
    - name: pipeline-run-id
      type: string
    - name: operator-api-url
      type: string
      default: "http://gitops-operator.gitops-core.svc.cluster.local:8080"
  workspaces:
    - name: source
    - name: results
  results:
    - name: TESTS_PASSED
    - name: TESTS_FAILED
    - name: COVERAGE_PCT
  steps:
    - name: test
      image: k8secops/k8secops:python-$(params.build-version)-slim
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        # uid 1000 has no /etc/passwd entry, so $HOME is empty and
        # `pip install --user` has nowhere writable to land.
        - name: HOME
          value: "$(workspaces.results.path)/.pytest-home"
      script: |
        #!/bin/bash
        mkdir -p "$HOME"
        pip install --quiet --user pytest pytest-cov pytest-xml --break-system-packages

        BUILD_FILE="$(params.build-file)"
        if [ -f "$BUILD_FILE" ]; then pip install --quiet --user -r "$BUILD_FILE" --break-system-packages 2>/dev/null || true; fi
        if [ -f "pyproject.toml" ]; then pip install --quiet --user -e ".[test]" --break-system-packages 2>/dev/null || true; fi

        mkdir -p $(workspaces.results.path)/tests
        # Use test-dir if provided, otherwise pytest auto-discovers from repo root
        TEST_DIR="$(params.test-dir)"
        TEST_DIR="${TEST_DIR:-.}"
        python -m pytest \
          --junitxml=$(workspaces.results.path)/tests/junit.xml \
          --cov=. \
          --cov-report=xml:$(workspaces.results.path)/tests/coverage.xml \
          --cov-report=term-missing \
          -v "$TEST_DIR" 2>&1 | tee /tmp/pytest-out.txt || true

        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET, re, pathlib

        # Parse JUnit
        passed = failed = 0
        try:
            tree = ET.parse("$(workspaces.results.path)/tests/junit.xml")
            root = tree.getroot()
            suite = root if root.tag == "testsuite" else root.find("testsuite")
            if suite is not None:
                passed = int(suite.get("tests",0)) - int(suite.get("failures",0)) - int(suite.get("errors",0))
                failed = int(suite.get("failures",0)) + int(suite.get("errors",0))
        except: pass

        # Parse coverage
        coverage = 0.0
        try:
            tree = ET.parse("$(workspaces.results.path)/tests/coverage.xml")
            coverage = round(float(tree.getroot().get("line-rate","0")) * 100, 1)
        except: pass

        open("$(results.TESTS_PASSED.path)","w").write(str(passed))
        open("$(results.TESTS_FAILED.path)","w").write(str(failed))
        open("$(results.COVERAGE_PCT.path)","w").write(str(coverage))
        print(f"Python tests: {passed} passed, {failed} failed, coverage {coverage}%")
        PYEOF

    - name: check-and-notify
      image: k8secops/k8secops:python-3.12-slim
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: OPERATOR_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitops-operator-token
              key: operatorApiToken
      script: |
        #!/usr/bin/env python3
        import sys, json, urllib.request, os
        coverage  = float(open("$(results.COVERAGE_PCT.path)").read().strip() or "0")
        passed    = int(open("$(results.TESTS_PASSED.path)").read().strip() or "0")
        failed    = int(open("$(results.TESTS_FAILED.path)").read().strip() or "0")
        threshold = int("$(params.coverage-threshold)")
        payload = json.dumps({"runId": "$(params.pipeline-run-id)", "coveragePct": coverage,
            "threshold": threshold, "passed": failed == 0 and coverage >= threshold,
            "testsPassed": passed, "testsFailed": failed}).encode()
        token = os.environ.get("OPERATOR_API_TOKEN", "")
        headers = {"Content-Type": "application/json"}
        if token: headers["Authorization"] = f"Bearer {token}"
        try:
            urllib.request.urlopen(urllib.request.Request(
                "$(params.operator-api-url)/api/v1/pipelines/$(params.pipeline-run-id)/coverage",
                data=payload, headers=headers, method="POST"), timeout=10)
        except Exception as e:
            print(f"Coverage notify failed (non-fatal): {e}")
        if failed > 0:
            print(f"FAIL: {failed} test(s) failed"); sys.exit(1)
        if coverage < threshold:
            print(f"FAIL: coverage {coverage}% below threshold {threshold}%"); sys.exit(1)
        print(f"PASS: {passed} tests, coverage {coverage}% >= {threshold}%")

