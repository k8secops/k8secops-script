        echo "Bearer: $COUNT findings"
        SIZE=$(du -sh $(workspaces.results.path)/sast/bearer.sarif 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sast/bearer.sarif  ($SIZE, $COUNT findings)"

