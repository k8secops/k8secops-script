﻿---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-java
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Java compile â€” Maven or Gradle (wrapper-aware). Produces JARs/WARs for image build and tests."
  params:
    - name: build-tool
      default: "maven"
    - name: build-version
      default: "21"
    - name: build-file
      default: "pom.xml"
  workspaces:
    - name: source
  steps:
    - name: compile
      # Use the JDK version the user selected â€” not hardcoded to 21
      image: k8secops/k8secops:maven-3.9-eclipse-temurin-$(params.build-version)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "1Gi"}
        limits:   {cpu: "2000m", memory: "3Gi"}
      env:
        # uid 1000 has no /etc/passwd entry â€” Maven writes local repo to
        # $HOME/.m2/repository and Gradle writes cache to $HOME/.gradle.
        # Redirect both into the source workspace (writable by uid 1000).
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: GRADLE_USER_HOME
          value: "$(workspaces.source.path)/.gradle"
      script: |
        #!/bin/bash
        set -e
        BUILD_TOOL="$(params.build-tool)"
        BUILD_FILE="$(params.build-file)"
        echo "â”€â”€ Java compile: build-tool=$BUILD_TOOL version=$(params.build-version) â”€â”€"

        mkdir -p "$HOME/.m2" "$GRADLE_USER_HOME"

        # Maven local repo â†’ workspace so uid 1000 can write to it
        MVN_REPO="$(workspaces.source.path)/.m2/repository"
        MVN_FLAGS="-Dmaven.repo.local=$MVN_REPO -DskipTests -B"

        case "$BUILD_TOOL" in
          maven)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "pom.xml" ] && EXTRA="-f $BUILD_FILE"
            # Prefer Maven Wrapper if the project ships one
            MVN="mvn"
            [ -x "./mvnw" ] && MVN="./mvnw" && echo "  (using Maven Wrapper)"
            $MVN package $MVN_FLAGS $EXTRA
            echo "â”€â”€ Artifacts â”€â”€"
            find . -name "*.jar" -o -name "*.war" -o -name "*.ear" 2>/dev/null \
              | grep -v "\.m2\|test-classes\|/original-" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          gradle)
            EXTRA=""
            [ -n "$BUILD_FILE" ] && [ "$BUILD_FILE" != "build.gradle" ] && EXTRA="-b $BUILD_FILE"
            # Prefer Gradle Wrapper if the project ships one
            GRADLE="gradle"
            [ -x "./gradlew" ] && GRADLE="./gradlew" && echo "  (using Gradle Wrapper)"
            $GRADLE assemble $EXTRA
            find . -name "*.jar" -o -name "*.war" 2>/dev/null \
              | grep -v "/test" | sort \
              | while read f; do echo "  $(du -sh "$f" | cut -f1)  $f"; done
            ;;
          *)
            echo "Unknown Java build-tool=$BUILD_TOOL"; exit 1 ;;
        esac
        echo "â”€â”€ Java compile complete â”€â”€"

# Source: platform/tekton/tasks/build/compile-nodejs-task.yaml
﻿---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-compile-nodejs
  namespace: tekton-pipelines
  labels:
    gitops-platform.io/stage: compile
spec:
  description: "Node.js compile â€” install deps + npm run build (if build script exists)."
  params:
    - name: build-tool
      default: "npm"
    - name: build-version
      default: "20"
    - name: build-file
      default: "package.json"
  workspaces:
    - name: source
  steps:
    - name: compile
      image: k8secops/k8secops:node-$(params.build-version)-alpine
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      computeResources:
        requests: {cpu: "500m", memory: "512Mi"}
        limits:   {cpu: "2000m", memory: "2Gi"}
      env:
        # uid 1000 has no /etc/passwd entry so $HOME is empty â€” npm, yarn,
        # and corepack all write cache/config to $HOME and fail without it.
        - name: HOME
          value: "$(workspaces.source.path)/.compile-home"
        - name: npm_config_cache
          value: "$(workspaces.source.path)/.compile-home/.npm"
      script: |
        #!/bin/sh
        set -e
        BUILD_TOOL="$(params.build-tool)"
        echo "â”€â”€ Node.js compile: build-tool=$BUILD_TOOL version=$(params.build-version) â”€â”€"

        mkdir -p "$HOME"

        case "$BUILD_TOOL" in
          npm)
            npm install --silent
            npm run build --if-present
            ;;
          yarn)
            yarn install --frozen-lockfile --silent
            yarn build 2>/dev/null || true
            ;;
          pnpm)
            corepack enable && pnpm install --frozen-lockfile --silent
            pnpm run build --if-present 2>/dev/null || true
            ;;
          *)
            npm install --silent
            npm run build --if-present
            ;;
        esac
        echo "â”€â”€ Node.js compile complete â”€â”€"

