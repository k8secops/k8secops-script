# "" OSV-Scanner (Google) """""""""""""""""""""""""""""""""""
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-sca-osv
  namespace: gitops-core
  labels:
    gitops-platform.io/stage: sca
spec:
  description: "OSV-Scanner by Google. Apache 2.0. No token."
  workspaces:
    - name: source
    - name: results
  results:
    - name: VULN_COUNT
  steps:
    - name: osv-scan
      image: k8secops/k8secops:osv-scanner-v1.8.5
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        mkdir -p $(workspaces.results.path)/sca
        osv-scanner \
          --recursive \
          --format sarif \
          --output $(workspaces.results.path)/sca/osv.sarif \
          . 2>/dev/null || true
        osv-scanner \
          --recursive \
          --format json \
          --output $(workspaces.results.path)/sca/osv.json \
          . 2>/dev/null || true

        COUNT=$(python3 -c "
        import json
        try:
            d=json.load(open('$(workspaces.results.path)/sca/osv.json'))
            print(sum(len(r.get('vulnerabilities',[])) for r in d.get('results',[])))
        except: print(0)
        " 2>/dev/null || echo "0")
        echo -n "$COUNT" > $(results.VULN_COUNT.path)
        echo "OSV-Scanner: $COUNT vulnerabilities"
        SIZE=$(du -sh $(workspaces.results.path)/sca/osv.json 2>/dev/null | cut -f1 || echo "0B")
        echo "Report: sca/osv.json  ($SIZE, $COUNT vulns)  |  sca/osv.sarif"

